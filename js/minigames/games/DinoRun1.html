<body>
    <div id="game-1-wrapper">
        <h1>DINO RUN</h1>
        <div class="info-panel">
            <div id="score-display-g1">점수: 0</div>
            <div id="highscore-display-g1">최고: 0</div>
        </div>
        <div id="game-container-g1">
            <div id="start-overlay-g1" class="overlay">
                <div class="ready-card">
                    <span class="ready-chip">CLASSIC RUN</span>
                    <strong>기본 점프 코스</strong>
                    <p>첫 타이밍만 익히면 바로 달릴 수 있는 클래식 Dino Run입니다.</p>
                    <span class="ready-controls">SPACE · CLICK · TOUCH</span>
                </div>
            </div>
            <div id="game-over-overlay-g1" class="overlay">
                <div class="result-card">
                    <span class="ready-chip">RUN OVER</span>
                    <strong>한 번 더 달려보세요</strong>
                    <div id="final-score-display-g1" class="result-score">이번 점수: 0</div>
                    <p id="global-highscore-display-g1"></p>
                    <div class="result-actions">
                        <button class="restart-btn" type="button">다시 시작 (Spacebar)</button>
                        <button class="back-btn" type="button">목록으로 돌아가기</button>
                    </div>
                </div>
            </div>
            <canvas id="game-canvas-g1" width="600" height="252"></canvas>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            function returnToMinigameHub() {
                try {
                    if (window.parent && window.parent !== window && window.parent.LivelySam?.MinigamesHub?.closeRunner) {
                        window.parent.LivelySam.MinigamesHub.closeRunner();
                        return;
                    }
                } catch {}

                window.location.href = "index.html";
            }

            const MINIGAME_ID = "dino-run-1";
            const IS_PREVIEW_MODE = new URLSearchParams(window.location.search).get("preview") === "1";

            function getLeaderboardBridge() {
                if (IS_PREVIEW_MODE) {
                    return null;
                }

                try {
                    if (window.parent && window.parent !== window && window.parent.LivelySam?.Leaderboard) {
                        return window.parent.LivelySam.Leaderboard;
                    }
                } catch {}

                return window.LivelySam?.Leaderboard || null;
            }

            let game1Instance = null;
            const body = document.body;
            const game1Wrapper = document.getElementById("game-1-wrapper");

            if (IS_PREVIEW_MODE) {
                body.classList.add("preview-mode");
            }

            function cleanupGame1Instance() {
                if (!game1Instance) {
                    return;
                }
                if (game1Instance.loop) {
                    cancelAnimationFrame(game1Instance.loop);
                    game1Instance.loop = 0;
                }
                document.removeEventListener("keydown", game1Instance.keyHandler);
                document.removeEventListener("mousedown", game1Instance.mouseHandler);
                document.removeEventListener("touchstart", game1Instance.touchHandler);
            }

            function launchGame1(username) {
                cleanupGame1Instance();

                game1Instance = {};
                const gameUsername = username;

                const canvas = game1Wrapper.querySelector("#game-canvas-g1");
                const ctx = canvas.getContext("2d");
                const scoreDisplay = game1Wrapper.querySelector("#score-display-g1");
                const highscoreDisplay = game1Wrapper.querySelector("#highscore-display-g1");
                const startOverlay = game1Wrapper.querySelector("#start-overlay-g1");
                const gameOverOverlay = game1Wrapper.querySelector("#game-over-overlay-g1");
                startOverlay.innerHTML = `
                    <div class="ready-card">
                        <span class="ready-chip">CLASSIC RUN</span>
                        <strong>\uAE30\uBCF8 \uC810\uD504 \uCF54\uC2A4</strong>
                        <p>\uCCAB \uD0C0\uC774\uBC0D\uB9CC \uC775\uD788\uBA74 \uBC14\uB85C \uB2EC\uB9B4 \uC218 \uC788\uB294 \uD074\uB798\uC2DD Dino Run\uC785\uB2C8\uB2E4.</p>
                        <span class="ready-controls">SPACE / CLICK / TOUCH</span>
                    </div>
                `;
                gameOverOverlay.innerHTML = `
                    <div class="result-card">
                        <span class="ready-chip">RUN OVER</span>
                        <strong>\uD55C \uBC88 \uB354 \uB2EC\uB824\uBCF4\uC138\uC694</strong>
                        <div id="final-score-display-g1" class="result-score">\uC774\uBC88 \uC810\uC218: 0</div>
                        <p id="global-highscore-display-g1"></p>
                        <div class="result-actions">
                            <button class="restart-btn" type="button">\uB2E4\uC2DC \uC2DC\uC791</button>
                            <button class="back-btn" type="button">\uBAA9\uB85D \uB3CC\uC544\uAC00\uAE30</button>
                        </div>
                        <div class="result-hint">SPACEBAR \uB85C \uBC14\uB85C \uC7AC\uC2DC\uC791</div>
                    </div>
                `;
                const finalScoreDisplay = game1Wrapper.querySelector("#final-score-display-g1");
                const globalHighscoreDisplay = game1Wrapper.querySelector("#global-highscore-display-g1");
                const backBtnG1 = game1Wrapper.querySelector(".back-btn");

                backBtnG1.addEventListener("click", (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    returnToMinigameHub();
                });

                const dinoIcon = "🦖";
                const cactusIcons = ["🌵", "🌵🌵"];
                const iconSize = 30;
                const groundY = canvas.height - 2;
                const playerX = IS_PREVIEW_MODE ? 92 : 50;
                const jumpForce = 12;
                const gravity = 0.7;
                const initialSpeed = 5;
                const speedIncrease = 0.001;
                const nightModeThreshold = 200;
                const ambientClouds = [
                    { baseX: 108, y: 34, scale: 1, alpha: 0.58, depth: 0.1 },
                    { baseX: 328, y: 26, scale: 0.76, alpha: 0.44, depth: 0.07 },
                    { baseX: 526, y: 42, scale: 0.92, alpha: 0.5, depth: 0.13 }
                ];
                const backgroundCacti = [
                    { baseX: 124, scale: 0.72, depth: 0.24 },
                    { baseX: 448, scale: 0.88, depth: 0.35 },
                    { baseX: 564, scale: 0.74, depth: 0.42 }
                ];

                let player;
                let obstacles = [];
                let stars = [];
                let score = 0;
                let localHighScore = 0;
                let globalHighScoreData = { score: 0, name: "N/A" };
                let gameSpeed = initialSpeed;
                let gameState = "lobby";
                let obstacleSpawnTimer = 0;
                let isNightMode = false;
                let isSubmitting = false;
                let sceneTick = 0;

                class Player {
                    constructor(x, y) {
                        this.x = x;
                        this.y = y;
                        this.width = iconSize;
                        this.height = iconSize;
                        this.dy = 0;
                        this.isJumping = false;
                    }

                    draw() {
                        ctx.save();
                        ctx.translate(this.x + (this.width / 2), this.y);
                        ctx.scale(-1, 1);
                        ctx.font = `${iconSize}px Arial`;
                        ctx.textBaseline = "bottom";
                        ctx.textAlign = "center";
                        ctx.shadowColor = isNightMode ? "rgba(15, 23, 42, 0.45)" : "rgba(148, 101, 56, 0.2)";
                        ctx.shadowBlur = 8;
                        ctx.fillText(dinoIcon, 0, 5);
                        ctx.restore();
                    }

                    update() {
                        this.dy += gravity;
                        this.y += this.dy;

                        if (this.y > groundY) {
                            this.y = groundY;
                            this.dy = 0;
                            this.isJumping = false;
                        }
                    }

                    jump() {
                        if (!this.isJumping) {
                            this.dy = -jumpForce;
                            this.isJumping = true;
                        }
                    }
                }

                class Obstacle {
                    constructor(x, y, icon) {
                        this.x = x;
                        this.y = y;
                        this.icon = icon;
                        this.width = iconSize * (icon.length / 2);
                        this.height = iconSize;
                    }

                    draw() {
                        ctx.font = `${iconSize}px Arial`;
                        ctx.textBaseline = "bottom";
                        ctx.textAlign = "start";
                        ctx.shadowColor = isNightMode ? "rgba(15, 23, 42, 0.35)" : "rgba(148, 101, 56, 0.16)";
                        ctx.shadowBlur = 6;
                        ctx.fillText(this.icon, this.x, this.y + 4);
                        ctx.shadowBlur = 0;
                    }

                    update() {
                        this.x -= gameSpeed;
                    }
                }

                class Star {
                    constructor() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * (canvas.height - 50);
                        this.radius = Math.random() * 1.5;
                        this.opacity = Math.random();
                        this.fadeDirection = Math.random() > 0.5 ? "in" : "out";
                    }

                    draw() {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                        ctx.fill();
                    }

                    update() {
                        this.x -= gameSpeed * 0.2;
                        if (this.x < 0) {
                            this.x = canvas.width;
                        }

                        if (this.fadeDirection === "in") {
                            this.opacity += 0.005;
                            if (this.opacity > 1) {
                                this.fadeDirection = "out";
                            }
                        } else {
                            this.opacity -= 0.005;
                            if (this.opacity < 0) {
                                this.fadeDirection = "in";
                            }
                        }
                    }
                }

                function drawCloud(x, y, scale, alpha = 0.55) {
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = isNightMode ? "rgba(226, 232, 240, 0.14)" : "rgba(255, 255, 255, 0.5)";
                    ctx.beginPath();
                    ctx.arc(x, y, 10 * scale, Math.PI * 0.5, Math.PI * 1.5);
                    ctx.arc(x + 12 * scale, y - 6 * scale, 13 * scale, Math.PI, Math.PI * 1.85);
                    ctx.arc(x + 26 * scale, y, 11 * scale, Math.PI * 1.5, Math.PI * 0.5);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }

                function drawMiniCactus(x, y, scale, color, alpha = 1) {
                    ctx.save();
                    ctx.translate(x, y);
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = color;
                    ctx.fillRect(-4 * scale, -24 * scale, 8 * scale, 24 * scale);
                    ctx.fillRect(-11 * scale, -17 * scale, 7 * scale, 6 * scale);
                    ctx.fillRect(4 * scale, -20 * scale, 7 * scale, 6 * scale);
                    ctx.fillRect(-11 * scale, -24 * scale, 4 * scale, 14 * scale);
                    ctx.fillRect(7 * scale, -27 * scale, 4 * scale, 13 * scale);
                    ctx.restore();
                }

                function drawDuneBand(baseY, amplitude, color, speed, alpha = 1) {
                    const offset = sceneTick * speed;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.moveTo(0, canvas.height);
                    for (let x = 0; x <= canvas.width + 24; x += 24) {
                        const y = baseY + Math.sin((x + offset) / 85) * amplitude;
                        ctx.lineTo(x, y);
                    }
                    ctx.lineTo(canvas.width, canvas.height);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }

                function drawBackdrop() {
                    const skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                    if (isNightMode) {
                        skyGradient.addColorStop(0, "#182131");
                        skyGradient.addColorStop(0.55, "#2a3547");
                        skyGradient.addColorStop(1, "#5b514c");
                    } else {
                        skyGradient.addColorStop(0, "#fbf8f4");
                        skyGradient.addColorStop(0.5, "#f3ece5");
                        skyGradient.addColorStop(0.51, "#ead6b7");
                        skyGradient.addColorStop(1, "#d8b792");
                    }

                    ctx.fillStyle = skyGradient;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    if (isNightMode) {
                        ctx.save();
                        ctx.fillStyle = "rgba(248, 250, 252, 0.78)";
                        ctx.beginPath();
                        ctx.arc(canvas.width - 82, 34, 15, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.globalCompositeOperation = "destination-out";
                        ctx.beginPath();
                        ctx.arc(canvas.width - 75, 30, 14, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    } else {
                        ctx.save();
                        ctx.fillStyle = "rgba(255, 255, 255, 0.62)";
                        ctx.beginPath();
                        ctx.arc(canvas.width - 88, 40, 18, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();

                        ambientClouds.forEach((cloud) => {
                            const span = canvas.width + 100;
                            const x = ((cloud.baseX - (sceneTick * cloud.depth)) % span + span) % span - 50;
                            drawCloud(x, cloud.y, cloud.scale, cloud.alpha);
                        });
                    }

                    drawDuneBand(canvas.height - 70, 8, isNightMode ? "#7f736d" : "#dbcdbd", 0.15, isNightMode ? 0.36 : 0.36);
                    drawDuneBand(canvas.height - 52, 12, isNightMode ? "#6a5c58" : "#c49c76", 0.28, isNightMode ? 0.7 : 0.64);

                    const cactusColor = isNightMode ? "#7b8490" : "#6f7f63";
                    backgroundCacti.forEach((deco) => {
                        const span = canvas.width + 90;
                        const x = ((deco.baseX - (sceneTick * deco.depth)) % span + span) % span - 45;
                        drawMiniCactus(x, groundY + 2, deco.scale, cactusColor, isNightMode ? 0.2 : 0.2);
                    });

                    ctx.save();
                    ctx.strokeStyle = isNightMode ? "rgba(226, 232, 240, 0.58)" : "rgba(114, 88, 63, 0.34)";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(0, groundY + 0.5);
                    ctx.lineTo(canvas.width, groundY + 0.5);
                    ctx.stroke();
                    ctx.restore();
                }

                async function fetchGlobalHighScore() {
                    const leaderboard = getLeaderboardBridge();
                    if (!leaderboard?.getTopEntry) {
                        return { score: 0, name: "N/A" };
                    }

                    try {
                        const topEntry = await leaderboard.getTopEntry({ gameId: MINIGAME_ID });
                        if (topEntry) {
                            return {
                                score: topEntry.score || 0,
                                name: topEntry.nickname || "Unknown"
                            };
                        }
                    } catch (error) {
                        console.error("Dino Run 1 최고 점수 조회 실패:", error);
                    }

                    return { score: 0, name: "N/A" };
                }

                async function updateGlobalHighScore() {
                    globalHighScoreData = await fetchGlobalHighScore();
                }

                function seedPreviewScene() {
                    obstacles = [
                        new Obstacle(canvas.width - 168, groundY, cactusIcons[0])
                    ];
                    obstacleSpawnTimer = 84;
                }

                function setReadyPreviewScene() {
                    obstacles = [
                        new Obstacle(canvas.width - 220, groundY, cactusIcons[0]),
                        new Obstacle(canvas.width - 126, groundY, cactusIcons[1])
                    ];
                }

                function initGame() {
                    localHighScore =
                        localStorage.getItem("minigameLocalHighScore:dino-run-1") ||
                        localStorage.getItem("dinoLocalHighScore_g1") ||
                        0;

                    highscoreDisplay.textContent = `최고: ${Math.floor(localHighScore)}`;
                    player = new Player(playerX, groundY);
                    obstacles = [];
                    stars = [];
                    score = 0;
                    gameSpeed = initialSpeed;
                    gameState = IS_PREVIEW_MODE ? "preview" : "ready";
                    obstacleSpawnTimer = 100;
                    isNightMode = false;
                    isSubmitting = false;
                    sceneTick = 0;

                    for (let i = 0; i < 50; i += 1) {
                        stars.push(new Star());
                    }

                    applyNightMode(false);

                    if (IS_PREVIEW_MODE) {
                        seedPreviewScene();
                        body.classList.remove("is-ready-screen");
                        startOverlay.style.display = "none";
                    } else {
                        setReadyPreviewScene();
                        body.classList.add("is-ready-screen");
                        startOverlay.style.display = "flex";
                    }

                    gameOverOverlay.style.display = "none";

                    if (!game1Instance.loop) {
                        game1Instance.loop = requestAnimationFrame(animate);
                    }

                    drawBackdrop();
                    obstacles.forEach((obstacle) => obstacle.draw());
                    player.draw();
                    scoreDisplay.textContent = "점수: 0";
                }

                function startGame() {
                    if ((gameState === "ready" || gameState === "gameOver") && !isSubmitting) {
                        if (gameState === "gameOver") {
                            initGame();
                        }

                        body.classList.remove("is-ready-screen");
                        obstacles = [];
                        gameState = "playing";
                        startOverlay.style.display = "none";
                        gameOverOverlay.style.display = "none";
                    }
                }

                function spawnObstacle() {
                    const icon = cactusIcons[Math.floor(Math.random() * cactusIcons.length)];
                    obstacles.push(new Obstacle(canvas.width + 50, groundY, icon));
                    obstacleSpawnTimer = (Math.random() * 100 + 50) * (initialSpeed / gameSpeed);
                }

                function applyNightMode(enable) {
                    isNightMode = enable;
                    if (enable) {
                        body.classList.add("night-mode");
                    } else {
                        body.classList.remove("night-mode");
                    }
                }

                function updateObstacleField() {
                    obstacleSpawnTimer -= 1;
                    if (obstacleSpawnTimer <= 0) {
                        spawnObstacle();
                    }

                    for (let i = obstacles.length - 1; i >= 0; i -= 1) {
                        const obstacle = obstacles[i];
                        obstacle.update();
                        obstacle.draw();
                        if (obstacle.x + obstacle.width < 0) {
                            obstacles.splice(i, 1);
                        }
                    }
                }

                function runPreviewAutoplay() {
                    const nextObstacle = obstacles.find((obstacle) => obstacle.x + obstacle.width >= player.x + 8);
                    if (!player.isJumping && nextObstacle) {
                        const distance = nextObstacle.x - player.x;
                        if (distance <= 90 && distance >= 42) {
                            player.jump();
                        }
                    }
                }

                function animate() {
                    if (!game1Instance) {
                        return;
                    }

                    sceneTick += (gameState === "playing" || gameState === "preview") ? gameSpeed * 0.45 : 0.35;
                    drawBackdrop();

                    if (isNightMode) {
                        stars.forEach((star) => {
                            star.update();
                            star.draw();
                        });
                    }

                    if (gameState === "playing") {
                        score += 0.1;
                        gameSpeed += speedIncrease;
                        scoreDisplay.textContent = `점수: ${Math.floor(score)}`;

                        const scoreBlock = Math.floor(score / nightModeThreshold);
                        const shouldBeNight = scoreBlock % 2 === 1;
                        if (shouldBeNight && !isNightMode) {
                            applyNightMode(true);
                        } else if (!shouldBeNight && isNightMode) {
                            applyNightMode(false);
                        }

                        updateObstacleField();
                        player.update();
                        player.draw();
                        checkCollisions();
                    } else if (gameState === "preview") {
                        runPreviewAutoplay();
                        updateObstacleField();
                        player.update();
                        player.draw();
                    } else {
                        player.draw();
                        obstacles.forEach((obstacle) => obstacle.draw());
                    }

                    game1Instance.loop = requestAnimationFrame(animate);
                }

                function checkCollisions() {
                    for (const obstacle of obstacles) {
                        const padding = 5;
                        const playerTop = player.y - player.height;
                        const playerBottom = player.y;
                        const obstacleTop = obstacle.y - obstacle.height;
                        const obstacleBottom = obstacle.y;

                        if (
                            player.x < obstacle.x + obstacle.width - padding &&
                            player.x + player.width - padding > obstacle.x &&
                            playerTop < obstacleBottom &&
                            playerBottom > obstacleTop
                        ) {
                            triggerGameOver();
                            break;
                        }
                    }
                }

                function triggerGameOver() {
                    gameState = "gameOver";
                    gameOverOverlay.style.display = "flex";
                    const finalScore = Math.floor(score);

                    finalScoreDisplay.textContent = `이번 점수: ${finalScore}`;

                    if (finalScore > localHighScore) {
                        localHighScore = finalScore;
                        localStorage.setItem("minigameLocalHighScore:dino-run-1", localHighScore);
                        highscoreDisplay.textContent = `최고: ${localHighScore}`;
                    }

                    globalHighscoreDisplay.textContent = "";

                    if (finalScore >= 200) {
                        isSubmitting = true;
                        globalHighscoreDisplay.textContent = "200점 이상 기록, 점수 전송 중...";
                        submitAndFetchScores(finalScore, globalHighscoreDisplay);
                    } else {
                        isSubmitting = false;
                        globalHighscoreDisplay.textContent = "200점 미만 기록은 저장되지 않습니다.";
                    }
                }

                async function submitScore(finalScore) {
                    const leaderboard = getLeaderboardBridge();
                    if (!leaderboard?.submitScore) {
                        throw new Error("Firebase leaderboard bridge unavailable");
                    }

                    await leaderboard.submitScore({
                        gameId: MINIGAME_ID,
                        nickname: gameUsername,
                        score: finalScore
                    });
                }

                async function fetchAndDisplayGlobalScore(targetElement, prefixText = "") {
                    const leaderboard = getLeaderboardBridge();
                    if (!leaderboard?.getTopEntry) {
                        targetElement.textContent = `${prefixText}명예의 전당 연결을 사용할 수 없습니다.`;
                        return;
                    }

                    try {
                        const topEntry = await leaderboard.getTopEntry({ gameId: MINIGAME_ID });
                        if (topEntry) {
                            globalHighScoreData.score = topEntry.score || 0;
                            globalHighScoreData.name = topEntry.nickname || gameUsername;

                            const rawName = topEntry.nickname || gameUsername;
                            const maskedName = leaderboard.maskNickname
                                ? leaderboard.maskNickname(rawName)
                                : `${rawName.substring(0, 2)}${"*".repeat(Math.max(0, rawName.length - 2))}`;

                            targetElement.textContent = `${prefixText}전체 최고 점수: ${globalHighScoreData.score} (${maskedName})`;
                        } else {
                            targetElement.textContent = `${prefixText}아직 등록된 기록이 없습니다.`;
                        }
                    } catch (error) {
                        console.error("Dino Run 1 최고 점수 조회 실패:", error);
                        targetElement.textContent = `${prefixText}최고 점수 연결 오류`;
                    }
                }

                async function submitAndFetchScores(finalScore, targetElement) {
                    let prefixText = "";

                    try {
                        await submitScore(finalScore);
                        prefixText = "점수 등록 완료! ";
                    } catch (error) {
                        console.error("Dino Run 1 점수 전송 실패:", error);
                        prefixText = "점수 등록 실패. ";
                    } finally {
                        await fetchAndDisplayGlobalScore(targetElement, prefixText);
                        isSubmitting = false;
                    }
                }

                function handleGameAction() {
                    if (gameState === "playing") {
                        player.jump();
                    } else {
                        startGame();
                    }
                }

                function handleInput(event) {
                    if (event.key === " " || event.code === "Space") {
                        event.preventDefault();
                        handleGameAction();
                    }
                }

                function handleMouseInput(event) {
                    if (event.target.closest(".back-btn")) {
                        return;
                    }

                    event.preventDefault();
                    handleGameAction();
                }

                function handleTouchInput(event) {
                    if (event.target.closest(".back-btn")) {
                        return;
                    }

                    event.preventDefault();
                    handleGameAction();
                }

                game1Instance.keyHandler = handleInput;
                game1Instance.mouseHandler = handleMouseInput;
                game1Instance.touchHandler = handleTouchInput;

                document.addEventListener("keydown", game1Instance.keyHandler);
                document.addEventListener("mousedown", game1Instance.mouseHandler);
                document.addEventListener("touchstart", game1Instance.touchHandler, { passive: false });

                updateGlobalHighScore();
                initGame();
            }

            window.addEventListener("beforeunload", cleanupGame1Instance);

            function resolveGameNickname() {
                try {
                    const parentNickname = window.parent && window.parent !== window && window.parent.LivelySam?.MinigamesHub?.getNickname?.();
                    if (parentNickname) {
                        return String(parentNickname).trim();
                    }
                } catch {}

                try {
                    const nickname = localStorage.getItem("minigameNickname");
                    if (nickname) {
                        return String(nickname).trim();
                    }
                } catch {}

                try {
                    const legacyNickname = localStorage.getItem("j_game_username");
                    if (legacyNickname) {
                        return String(legacyNickname).trim();
                    }
                } catch {}

                return "Guest";
            }

            launchGame1(resolveGameNickname());
        });
    </script>
