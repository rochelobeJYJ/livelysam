<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dino Jump 2</title>
    <meta name="livelysam:minigame:id" content="dino-run-2">
    <meta name="livelysam:minigame:title" content="Dino Run 2">
    <meta name="livelysam:minigame:icon" content="🦕">
    <meta name="livelysam:minigame:status" content="ready">
    <meta name="livelysam:minigame:series-id" content="dino-run">
    <meta name="livelysam:minigame:series-title" content="Dino Run">
    <meta name="livelysam:minigame:series-description" content="기본, 확장, 하드 모드를 순서대로 즐길 수 있습니다.">
    <meta name="livelysam:minigame:series-icon" content="🦖">
    <meta name="livelysam:minigame:description" content="장애물 패턴이 확장된 Dino Run 2입니다.">
    <meta name="livelysam:minigame:score-label" content="생존 점수">
    <meta name="livelysam:minigame:leaderboard-mode" content="personal-best">
    <meta name="livelysam:minigame:tags" content="firebase,hall-of-fame">
    <meta name="livelysam:minigame:sort-order" content="20">
    <style>
        /* --- 1. 글로벌 스타일 --- */
        html {
            font-size: clamp(12px, calc(10px + 0.5vw), 16px);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
                Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(-45deg, #e6f7ff, #fff0f0, #f0f8ff, #f0fff0);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            color: #555;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            margin: 0;
            touch-action: none; 
            transition: background 0.5s ease;
            overflow: hidden; 
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        body.night-mode {
            background: #222;
            color: #ccc;
        }
        body.night-mode h1,
        body.night-mode h2 {
            color: #eee;
        }
        @keyframes dazzlingBG {
            0% { background-position: 0% 50%; filter: hue-rotate(0deg) saturate(1.5); }
            25% { background-position: 50% 50%; filter: hue-rotate(90deg) saturate(2); }
            50% { background-position: 100% 50%; filter: hue-rotate(180deg) saturate(1.5); }
            75% { background-position: 50% 50%; filter: hue-rotate(270deg) saturate(2); }
            100% { background-position: 0% 50%; filter: hue-rotate(360deg) saturate(1.5); }
        }
        body.dazzling {
            animation: dazzlingBG 5s ease infinite; 
            background: linear-gradient(-45deg, #e6f7ff, #fff0f0, #f0f8ff, #f0fff0);
            background-size: 400% 400%;
        }
        body.preview-mode #game-2-wrapper > h1,
        body.preview-mode #game-2-wrapper .info-panel,
        body.preview-mode #start-overlay-g2,
        body.preview-mode #game-over-overlay-g2 {
            display: none !important;
        }
        body.preview-mode #game-container-g2 {
            width: min(600px, 100vw);
            max-width: 100vw;
            max-height: none;
        }
        body.preview-mode {
            justify-content: flex-start;
            align-items: center;
            padding: 0;
        }
        body.preview-mode #game-2-wrapper {
            width: 100%;
            transform: translateY(-32px);
        }
        
        h1 { font-size: 2.5rem; color: #333; margin-bottom: 10px; transition: color 0.5s ease; }
        h2 { font-size: 3rem; color: #333; margin: 0 0 10px 0; }
        h3 { font-size: 1.5rem; color: #333; margin: 10px 0; border-bottom: 2px solid #ccc; padding-bottom: 5px;}
        body.night-mode h3 { color: #eee; border-color: #555;}

        /* --- 버튼 공통 스타일 --- */
        .restart-btn, .back-btn {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            border: none;
            padding: 14px 0;
            width: 100%; 
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
            margin-bottom: 15px; 
            line-height: 1.3;
        }
        .restart-btn:hover, .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        
        .restart-btn {
            background: linear-gradient(145deg, #007aff, #0056b3);
            margin-top: 15px;
            margin-bottom: 5px; 
            width: 80%;
            max-width: 280px;
        }
        
        .back-btn {
            background: #888;
            margin-top: 5px;
            margin-bottom: 0;
            width: 80%;
            max-width: 280px;
        }
        .back-btn:hover { background: #666; }


        /* --- 3. Game 2 (DinoGame_2) 스타일 --- */
        #game-2-wrapper { 
            display: flex;
            flex-direction: column; 
            align-items: center; 
        }
        body.is-ready-screen #game-2-wrapper > h1,
        #game-2-wrapper > h1 {
            width: 600px;
            max-width: 90vw;
            margin: 0 0 10px 0;
            font-size: 1.15rem;
            letter-spacing: 0.24em;
            color: #475569;
        }
        body.is-ready-screen #game-2-wrapper .info-panel,
        #game-2-wrapper .info-panel {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            width: 600px;
            max-width: 90vw;
            margin-bottom: 12px;
            font-size: 1rem;
            font-weight: 700;
        }
        body.is-ready-screen #game-2-wrapper .info-panel > div,
        #game-2-wrapper .info-panel > div {
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.84);
            box-shadow: 0 12px 28px rgba(148, 163, 184, 0.16);
        }
        body.is-ready-screen #highscore-display-g2,
        #highscore-display-g2 {
            text-align: left;
        }
        #score-display-g2 { color: #334155; transition: color 0.5s ease; }
        #highscore-display-g2 { color: #64748b; transition: color 0.5s ease; }
        body.night-mode #game-2-wrapper .info-panel > div {
            background: rgba(15, 23, 42, 0.48);
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.26);
        }
        body.night-mode #score-display-g2 { color: #e2e8f0; }
        body.night-mode #highscore-display-g2 { color: #cbd5e1; }
        
        #game-container-g2 {
            position: relative; width: 600px; height: 200px;
            max-width: 90vw; max-height: 40vh;
        }
        body.is-ready-screen #game-container-g2 {
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.62);
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.14);
            background:
                radial-gradient(130px 48px at 20% 100%, rgba(224, 234, 241, 0.94) 98%, transparent 100%),
                radial-gradient(180px 60px at 56% 100%, rgba(242, 247, 250, 0.96) 98%, transparent 100%),
                radial-gradient(140px 54px at 86% 100%, rgba(210, 223, 233, 0.92) 98%, transparent 100%),
                radial-gradient(circle at 76% 18%, rgba(255, 255, 255, 0.94) 0 22px, transparent 23px),
                radial-gradient(circle at 16% 20%, rgba(255, 255, 255, 0.58) 0 16px, transparent 17px),
                radial-gradient(circle at 22% 16%, rgba(255, 255, 255, 0.38) 0 12px, transparent 13px),
                linear-gradient(180deg, #fcfeff 0%, #edf6fb 46%, #f3f9fc 47%, #dfeaf2 100%);
        }
        #game-canvas-g2 { background-color: transparent; width: 100%; height: 100%; box-sizing: border-box; }
        body.is-ready-screen #game-canvas-g2 {
            border-bottom: 3px solid rgba(62, 112, 47, 0.38);
        }
        
        #game-2-wrapper .overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; 
            font-weight: bold; color: #333;
            text-align: center; font-size: 2rem;
            padding: 18px;
            box-sizing: border-box;
            transition: color 0.5s ease;
        }
        body.is-ready-screen #start-overlay-g2 {
            justify-content: flex-end;
        }
        #game-2-wrapper .ready-card {
            width: min(280px, calc(100% - 36px));
            padding: 16px 18px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.84);
            box-shadow: 0 18px 38px rgba(148, 163, 184, 0.18);
            backdrop-filter: blur(10px);
        }
        #game-2-wrapper .ready-chip {
            display: inline-flex;
            margin-bottom: 10px;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(13, 148, 136, 0.1);
            color: #0f766e;
            font-size: 0.72rem;
            letter-spacing: 0.14em;
        }
        #game-2-wrapper .ready-card strong {
            display: block;
            margin-bottom: 8px;
            font-size: 1.15rem;
            color: #1e293b;
        }
        #game-2-wrapper .ready-card p {
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #475569;
        }
        #game-2-wrapper .ready-controls {
            display: inline-block;
            margin-top: 12px;
            font-size: 0.74rem;
            letter-spacing: 0.12em;
            color: #64748b;
        }
        body.night-mode #game-2-wrapper .overlay { color: #eee; }
        body.night-mode #game-2-wrapper .overlay p { color: #aaa; }
        #start-overlay-g2 { display: none; } 
        #game-over-overlay-g2 { display: none; }
        #global-highscore-display-g2 {
            font-size: 1.2rem; color: #007aff;
            margin-top: 10px; font-weight: bold;
        }
        body.night-mode #global-highscore-display-g2 { color: #33aaff; }

        body {
            padding: 24px;
            box-sizing: border-box;
        }

        body * {
            box-sizing: border-box;
        }

        #game-container-g2 {
            height: 252px;
            max-height: 52vh;
        }

        #game-canvas-g2 {
            display: block;
            border-bottom: 3px solid rgba(64, 107, 55, 0.36);
            transition: border-color 0.5s ease;
        }

        body.is-ready-screen #game-canvas-g2 {
            border-bottom-color: rgba(64, 107, 55, 0.36);
        }

        body.night-mode #game-canvas-g2 {
            border-bottom-color: rgba(226, 232, 240, 0.54);
        }

        #game-2-wrapper .result-card {
            width: min(350px, calc(100% - 32px));
            padding: 16px 16px 14px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.18);
            backdrop-filter: blur(14px);
        }

        #game-2-wrapper .result-card strong {
            display: block;
            margin-bottom: 6px;
            font-size: 1.16rem;
            color: #134e4a;
        }

        #game-2-wrapper .result-score {
            margin: 8px 0 10px;
            padding: 8px 12px;
            border-radius: 14px;
            background: rgba(13, 148, 136, 0.1);
            color: #0f766e;
            font-size: 0.98rem;
            font-weight: 700;
        }

        #game-2-wrapper .result-actions {
            margin-top: 10px;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            width: 100%;
        }

        #game-2-wrapper .result-actions .restart-btn,
        #game-2-wrapper .result-actions .back-btn {
            width: 100%;
            max-width: none;
            margin: 0;
            padding: 12px 0;
            border-radius: 14px;
            font-size: 0.98rem;
        }

        #game-2-wrapper .result-hint {
            margin-top: 8px;
            font-size: 0.76rem;
            font-weight: 600;
            color: #5b7c84;
            letter-spacing: 0.03em;
        }

        #global-highscore-display-g2 {
            font-size: 0.86rem;
            color: #335c67;
            margin-top: 0;
            font-weight: 600;
            line-height: 1.35;
            letter-spacing: -0.02em;
        }

        body.night-mode #global-highscore-display-g2 {
            color: #a7f3d0;
        }

        @media (max-width: 680px) {
            body {
                padding: 16px;
            }

            #game-container-g2 {
                height: 228px;
            }

            body.is-ready-screen #game-2-wrapper > h1 {
                letter-spacing: 0.18em;
                font-size: 1rem;
            }

            #game-2-wrapper .ready-card,
            #game-2-wrapper .result-card {
                width: calc(100% - 24px);
                padding: 16px 18px;
            }

            #game-2-wrapper .result-actions {
                grid-template-columns: 1fr;
            }
        }

    </style>
</head>
<body>

    <div id="game-2-wrapper">
        <h1>DINO RUN 2</h1>
        <div class="info-panel">
            <div id="score-display-g2">점수: 0</div>
            <div id="highscore-display-g2">최고: 0</div>
        </div>
        <div id="game-container-g2">
            <div id="start-overlay-g2" class="overlay">
                <div class="ready-card">
                    <span class="ready-chip">PATTERN PLUS</span>
                    <strong>장애물 패턴 확장</strong>
                    <p>선인장에 아이템과 새까지 더해진 다이노런 2의 홈 화면입니다.</p>
                    <span class="ready-controls">SPACE · CLICK · TOUCH</span>
                </div>
            </div>
            <div id="game-over-overlay-g2" class="overlay">
                <div>게임 오버</div>
                <p id="global-highscore-display-g2"></p>
                <button class="restart-btn">재시작 (Spacebar)</button>
                <button class="back-btn">로비로 돌아가기</button> </div>
            <canvas id="game-canvas-g2" width="600" height="252"></canvas>
        </div>
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            function returnToMinigameHub() {
                try {
                    if (window.parent && window.parent !== window && window.parent.LivelySam?.MinigamesHub?.closeRunner) {
                        window.parent.LivelySam.MinigamesHub.closeRunner();
                        return;
                    }
                } catch {}
                window.location.href = 'index.html';
            }

	    // --- 0. Game 2 URL ---
            const MINIGAME_ID = 'dino-run-2';
            const IS_PREVIEW_MODE = new URLSearchParams(window.location.search).get('preview') === '1';

            function getLeaderboardBridge() {
                if (IS_PREVIEW_MODE) {
                    return null;
                }
                try {
                    if (window.parent && window.parent !== window && window.parent.LivelySam?.Leaderboard) {
                        return window.parent.LivelySam.Leaderboard;
                    }
                } catch {}
                return window.LivelySam?.Leaderboard || null;
            }

            // --- 1. 글로벌 변수 및 공통 요소 ---
            let game2Instance = null; 
            const body = document.body;
            const game2Wrapper = document.getElementById('game-2-wrapper');
            if (IS_PREVIEW_MODE) {
                body.classList.add('preview-mode');
            }

            function cleanupGame2Instance() {
                if (!game2Instance) {
                    return;
                }
                if (game2Instance.loop) {
                    cancelAnimationFrame(game2Instance.loop);
                    game2Instance.loop = 0;
                }
                document.removeEventListener('keydown', game2Instance.keyHandler);
                document.removeEventListener('mousedown', game2Instance.mouseHandler);
                document.removeEventListener('touchstart', game2Instance.touchHandler);
            }
            
            // --- 4. Game 2 (DinoGame_2) 실행 함수 ---
            function launchGame2(username) {
                cleanupGame2Instance();
                game2Instance = {}; 
                const gameUsername = username; 
                
                const canvas = game2Wrapper.querySelector('#game-canvas-g2');
                const ctx = canvas.getContext('2d');
                
                const scoreDisplay = game2Wrapper.querySelector('#score-display-g2');
                const highscoreDisplay = game2Wrapper.querySelector('#highscore-display-g2');
                const startOverlay = game2Wrapper.querySelector('#start-overlay-g2');
                const gameOverOverlay = game2Wrapper.querySelector('#game-over-overlay-g2');
                startOverlay.innerHTML = `
                    <div class="ready-card">
                        <span class="ready-chip">PATTERN PLUS</span>
                        <strong>\uD328\uD134 \uD655\uC7A5 \uCF54\uC2A4</strong>
                        <p>\uC7A5\uC560\uBB3C\uACFC \uBCF4\uB108\uC2A4\uAC00 \uD568\uAED8 \uB4F1\uC7A5\uD558\uB294 \uD655\uC7A5\uD615 Dino Run 2\uC785\uB2C8\uB2E4.</p>
                        <span class="ready-controls">SPACE / CLICK / TOUCH</span>
                    </div>
                `;
                gameOverOverlay.innerHTML = `
                    <div class="result-card">
                        <span class="ready-chip">RUN OVER</span>
                        <strong>\uD328\uD134\uC744 \uB2E4\uC2DC \uACF5\uB7B5\uD574\uBCF4\uC138\uC694</strong>
                        <div id="final-score-display-g2" class="result-score">\uC774\uBC88 \uC810\uC218: 0</div>
                        <p id="global-highscore-display-g2"></p>
                        <div class="result-actions">
                            <button class="restart-btn" type="button">\uB2E4\uC2DC \uC2DC\uC791</button>
                            <button class="back-btn" type="button">\uBAA9\uB85D \uB3CC\uC544\uAC00\uAE30</button>
                        </div>
                        <div class="result-hint">SPACEBAR \uB85C \uBC14\uB85C \uC7AC\uC2DC\uC791</div>
                    </div>
                `;
                const finalScoreDisplay = game2Wrapper.querySelector('#final-score-display-g2');
                const globalHighscoreDisplay = game2Wrapper.querySelector('#global-highscore-display-g2'); 
                
                // (수정) 뒤로가기 버튼 리스너 -> index.html로 이동
                const backBtnG2 = game2Wrapper.querySelector('.back-btn');
                backBtnG2.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    returnToMinigameHub();
                });

                const dinoIcon = '🦖';
                const cactusIcons = ['🌵', '🌵', '🌵', '🌵🌵', '🌵🌵', '🌵🌵🌵'];
                const meatIcon = '🥩'; 
                const birdIcon = '🕊️'; 

                const iconSize = 30;
                const groundY = canvas.height - 2; 
                const playerX = IS_PREVIEW_MODE ? 92 : 50;
                const jumpForce = 12; 
                const gravity = 0.7;
                
                const initialSpeed = 6.354;
                const speedIncrease = 0.0012; 
                const nightModeThreshold = 200;
                const ambientClouds = [
                    { baseX: 96, y: 36, scale: 0.96, alpha: 0.54, depth: 0.1 },
                    { baseX: 286, y: 30, scale: 0.74, alpha: 0.4, depth: 0.08 },
                    { baseX: 512, y: 44, scale: 0.88, alpha: 0.5, depth: 0.13 }
                ];
                const backgroundTufts = [
                    { baseX: 102, scale: 0.74, depth: 0.16 },
                    { baseX: 328, scale: 0.92, depth: 0.24 },
                    { baseX: 548, scale: 0.8, depth: 0.32 }
                ];

                let player;
                let obstacles = [], stars = [], items = [], hazards = [], effects = [], weatherParticles = []; 
                let score = 0, localHighScore = 0; 
                let globalHighScoreData = { score: 0, name: 'N/A' }; 
                let gameSpeed = initialSpeed;
                let gameState = 'lobby'; 
                let obstacleSpawnTimer = 0, itemSpawnTimer = 0, hazardSpawnTimer = 0;
                let lastWeatherSpawn = 0, scoreMilestone = 500; 
                let gameLoop; 
                let isNightMode = false, isSubmitting = false; 
                let combo = 0;
                let sceneTick = 0;

                // --- 클래스 정의 (Player, Obstacle, Item, Hazard, Effect, Star, WeatherParticle) ---
                class Player {
                    constructor(x, y) {
                        this.x = x; this.y = y; this.width = iconSize; this.height = iconSize;
                        this.dy = 0; this.isJumping = false; this.jumpForce = jumpForce; 
                    }
                    draw() {
                        ctx.save(); ctx.translate(this.x + (this.width / 2), this.y); ctx.scale(-1, 1);
                        ctx.fillStyle = isNightMode ? '#eee' : '#555'; ctx.font = `${iconSize}px Arial`;
                        ctx.textBaseline = 'bottom'; ctx.textAlign = 'center'; ctx.fillText(dinoIcon, 0, 5); ctx.restore(); 
                    }
                    update() {
                        this.dy += gravity; this.y += this.dy;
                        if (this.y > groundY) { this.y = groundY; this.dy = 0; this.isJumping = false; }
                    }
                    jump() { if (!this.isJumping) { this.dy = -this.jumpForce; this.isJumping = true; } }
                }
                class Obstacle { 
                    constructor(x, y, icon) {
                        this.x = x; this.y = y; this.icon = icon;
                        this.width = iconSize * (icon.length / 2); this.height = iconSize;
                    }
                    draw() {
                        ctx.fillStyle = isNightMode ? '#eee' : '#555'; ctx.font = `${iconSize}px Arial`;
                        ctx.textBaseline = 'bottom'; ctx.textAlign = 'start'; ctx.fillText(this.icon, this.x, this.y+4);
                    }
                    update() { this.x -= gameSpeed; }
                }
                class Item { 
                    constructor(x, y, icon, data, size) {
                        this.x = x; this.y = y; this.icon = icon; this.type = data.type; this.effect = data.effect;
                        this.value = data.value; this.size = size || iconSize; 
                        this.width = this.size; this.height = this.size; this.isHit = false; 
                    }
                    draw() {
                        ctx.fillStyle = isNightMode ? '#eee' : '#555'; ctx.font = `${this.size}px Arial`; 
                        ctx.textBaseline = 'bottom'; ctx.textAlign = 'start'; ctx.fillText(this.icon, this.x, this.y + 4);
                    }
                    update() { this.x -= gameSpeed; }
                }
                class Hazard { 
                    constructor(x, y, icon, points) {
                        this.x = x; this.baseY = y; this.y = y; this.icon = icon; this.points = points;
                        this.width = iconSize; this.height = iconSize;
                        this.animationTimer = Math.random() * 20; this.iconFrames = ['🕊️', '🦢']; this.isHit = false; 
                    }
                    draw() {
                        ctx.fillStyle = isNightMode ? '#eee' : '#555'; ctx.font = `${iconSize}px Arial`;
                        ctx.textBaseline = 'bottom'; ctx.textAlign = 'start'; ctx.fillText(this.icon, this.x, this.y); 
                    }
                    update() {
                        this.x -= gameSpeed; this.animationTimer++;
                        this.y = this.baseY + Math.sin(this.animationTimer * 0.1) * 5; 
                        this.icon = this.iconFrames[Math.floor(this.animationTimer / 10) % this.iconFrames.length];
                    }
                }
                class Effect {
                    constructor(x, y, text, color) {
                        this.x = x; this.y = y; this.text = text; this.color = color;
                        this.opacity = 1.0; this.duration = 60; 
                    }
                    update() { this.y -= 0.5; this.opacity -= 1.0 / this.duration; this.duration--; }
                    draw() {
                        ctx.save(); ctx.globalAlpha = this.opacity; ctx.fillStyle = this.color;
                        ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center';
                        ctx.fillText(this.text, this.x, this.y); ctx.restore();
                    }
                }
                class Star { 
                    constructor() {
                        this.x = Math.random() * canvas.width; this.y = Math.random() * (canvas.height - 50);
                        this.radius = Math.random() * 1.5; this.opacity = Math.random();
                        this.fadeDirection = (Math.random() > 0.5) ? 'in' : 'out';
                    }
                    draw() {
                        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`; ctx.fill();
                    }
                    update() { 
                        this.x -= (gameSpeed * 0.2); 
                        if (this.x < 0) this.x = canvas.width;
                        if (this.fadeDirection === 'in') { this.opacity += 0.005; if (this.opacity > 1) this.fadeDirection = 'out';
                        } else { this.opacity -= 0.005; if (this.opacity < 0) this.fadeDirection = 'in'; }
                    }
                }
                class WeatherParticle { 
                    constructor() {
                        this.x = Math.random() * canvas.width; this.y = -10; this.icon = '❄️'; 
                        this.speed = Math.random() * 1 + 1; this.size = 5 + Math.random() * 5; 
                    }
                    update() {
                        this.y += this.speed; this.x -= (gameSpeed * 0.1); 
                        if (this.x < -10) this.x = canvas.width + 10;
                    }
                    draw() { ctx.font = `${this.size}px Arial`; ctx.fillText(this.icon, this.x, this.y); }
                }
                
                // --- 핵심 함수 ---
                function drawCloud(x, y, scale, alpha = 0.55) {
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = isNightMode ? 'rgba(226, 232, 240, 0.16)' : 'rgba(255, 255, 255, 0.5)';
                    ctx.beginPath();
                    ctx.arc(x, y, 10 * scale, Math.PI * 0.5, Math.PI * 1.5);
                    ctx.arc(x + 12 * scale, y - 6 * scale, 13 * scale, Math.PI, Math.PI * 1.85);
                    ctx.arc(x + 26 * scale, y, 11 * scale, Math.PI * 1.5, Math.PI * 0.5);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }

                function drawHillBand(baseY, amplitude, color, speed, alpha = 1) {
                    const offset = sceneTick * speed;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.moveTo(0, canvas.height);
                    for (let x = 0; x <= canvas.width + 24; x += 24) {
                        const y = baseY + Math.sin((x + offset) / 92) * amplitude;
                        ctx.lineTo(x, y);
                    }
                    ctx.lineTo(canvas.width, canvas.height);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }

                function drawGrassTuft(x, y, scale, color, alpha = 1) {
                    ctx.save();
                    ctx.translate(x, y);
                    ctx.globalAlpha = alpha;
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 2 * scale;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(-7 * scale, 0);
                    ctx.lineTo(-3 * scale, -14 * scale);
                    ctx.moveTo(0, 0);
                    ctx.lineTo(1 * scale, -18 * scale);
                    ctx.moveTo(7 * scale, 0);
                    ctx.lineTo(4 * scale, -13 * scale);
                    ctx.stroke();
                    ctx.restore();
                }

                function drawBackdrop() {
                    const skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                    if (isNightMode) {
                        skyGradient.addColorStop(0, '#102235');
                        skyGradient.addColorStop(0.55, '#1e3a4a');
                        skyGradient.addColorStop(1, '#314452');
                    } else {
                        skyGradient.addColorStop(0, '#ffffff');
                        skyGradient.addColorStop(0.48, '#f1f8fc');
                        skyGradient.addColorStop(0.49, '#eff6fb');
                        skyGradient.addColorStop(1, '#dce9f2');
                    }

                    ctx.fillStyle = skyGradient;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    if (isNightMode) {
                        ctx.save();
                        ctx.fillStyle = 'rgba(248, 250, 252, 0.76)';
                        ctx.beginPath();
                        ctx.arc(canvas.width - 82, 34, 15, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.globalCompositeOperation = 'destination-out';
                        ctx.beginPath();
                        ctx.arc(canvas.width - 75, 30, 14, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    } else {
                        ctx.save();
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.64)';
                        ctx.beginPath();
                        ctx.arc(canvas.width - 88, 38, 18, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();

                        ambientClouds.forEach((cloud) => {
                            const span = canvas.width + 100;
                            const x = ((cloud.baseX - (sceneTick * cloud.depth)) % span + span) % span - 50;
                            drawCloud(x, cloud.y, cloud.scale, cloud.alpha);
                        });
                    }

                    drawHillBand(canvas.height - 88, 8, isNightMode ? '#465665' : '#f7fbfd', 0.14, isNightMode ? 0.34 : 0.78);
                    drawHillBand(canvas.height - 68, 12, isNightMode ? '#33414d' : '#d7e4ed', 0.26, isNightMode ? 0.72 : 0.94);

                    const grassColor = isNightMode ? '#8ea1b2' : '#bcccd8';
                    backgroundTufts.forEach((tuft) => {
                        const span = canvas.width + 80;
                        const x = ((tuft.baseX - (sceneTick * tuft.depth)) % span + span) % span - 40;
                        drawGrassTuft(x, groundY + 1, tuft.scale, grassColor, isNightMode ? 0.18 : 0.1);
                    });

                    ctx.save();
                    ctx.strokeStyle = isNightMode ? 'rgba(226, 232, 240, 0.56)' : 'rgba(147, 163, 184, 0.34)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(0, groundY + 0.5);
                    ctx.lineTo(canvas.width, groundY + 0.5);
                    ctx.stroke();
                    ctx.restore();
                }
                async function fetchGlobalHighScore() {
                    const leaderboard = getLeaderboardBridge();
                    if (!leaderboard?.getTopEntry) {
                        return { score: 0, name: 'N/A' };
                    }

                    try {
                        const topEntry = await leaderboard.getTopEntry({ gameId: MINIGAME_ID });
                        if (topEntry) {
                            return {
                                score: topEntry.score || 0,
                                name: topEntry.nickname || 'Unknown'
                            };
                        }
                    } catch (error) {
                        console.error("G2: 최고 점수 불러오기 실패:", error);
                    }

                    return { score: 0, name: 'N/A' }; 
                }
                async function updateGlobalHighScore() {
                    globalHighScoreData = await fetchGlobalHighScore();
                }
                function setThumbnailShowcaseScene() {
                    obstacles = [
                        new Obstacle(canvas.width - 168, groundY, cactusIcons[3])
                    ];
                    items = [
                        new Item(canvas.width - 278, groundY - 34, meatIcon, { type: 'preview', effect: 'preview', value: 0 }, 24)
                    ];
                    hazards = [
                        new Hazard(canvas.width - 118, groundY - 68, birdIcon, 0)
                    ];
                    obstacleSpawnTimer = 96;
                    itemSpawnTimer = 210;
                    hazardSpawnTimer = 170;
                }
                function setReadyPreviewScene() {
                    obstacles = [
                        new Obstacle(canvas.width - 228, groundY, cactusIcons[4])
                    ];
                    items = [
                        new Item(canvas.width - 304, groundY - 34, meatIcon, { type: 'preview', effect: 'preview', value: 0 }, 24)
                    ];
                    hazards = [
                        new Hazard(canvas.width - 156, groundY - 66, birdIcon, 0)
                    ];
                    obstacleSpawnTimer = 108;
                    itemSpawnTimer = 250;
                    hazardSpawnTimer = 180;
                }
                function initGame() {
      localHighScore = localStorage.getItem('minigameLocalHighScore:dino-run-2')
        || localStorage.getItem('dinoLocalHighScore_g2')
        || 0;
                    highscoreDisplay.textContent = `최고: ${Math.floor(localHighScore)}`;
                    player = new Player(playerX, groundY);
                    obstacles = []; stars = []; items = [];
                    hazards = []; effects = []; weatherParticles = [];
                    score = 0; gameSpeed = initialSpeed; gameState = IS_PREVIEW_MODE ? 'preview' : 'ready';
                    obstacleSpawnTimer = 95; itemSpawnTimer = 400; hazardSpawnTimer = 180;
                    scoreMilestone = 500; isNightMode = false; isSubmitting = false; combo = 0; sceneTick = 0;
                    for (let i=0; i < 50; i++) stars.push(new Star());
                    applyNightMode(false); body.classList.remove('dazzling'); 
                    if (IS_PREVIEW_MODE) {
                        setThumbnailShowcaseScene();
                        body.classList.remove('is-ready-screen');
                        startOverlay.style.display = 'none';
                    } else {
                        setReadyPreviewScene();
                        body.classList.add('is-ready-screen');
                        startOverlay.style.display = 'flex';
                    }
                    gameOverOverlay.style.display = 'none';
                    if (!game2Instance.loop) { game2Instance.loop = requestAnimationFrame(animate); }
                    drawBackdrop();
                    obstacles.forEach(obs => obs.draw());
                    items.forEach(item => item.draw());
                    hazards.forEach(haz => haz.draw());
                    player.draw();
                    scoreDisplay.textContent = `점수: 0`;
                }
                function startGame() {
                    if ((gameState === 'ready' || gameState === 'gameOver') && !isSubmitting) {
                        if (gameState === 'gameOver') initGame(); 
                        body.classList.remove('is-ready-screen');
                        obstacles = [];
                        items = [];
                        hazards = [];
                        effects = [];
                        weatherParticles = [];
                        gameState = 'playing'; 
                        startOverlay.style.display = 'none';
                        gameOverOverlay.style.display = 'none';
                    }
                }
                function spawnObstacle() { 
                    const icon = cactusIcons[Math.floor(Math.random() * cactusIcons.length)]; 
                    obstacles.push(new Obstacle(canvas.width + 50, groundY, icon));
                    obstacleSpawnTimer = (Math.random() * 100 + 70) * (initialSpeed / gameSpeed);
                }
                function spawnItem() { 
                    const meatData = { type: 'points', effect: 'score', value: 10 };
                    items.push(new Item(canvas.width + 100, groundY, meatIcon, meatData, 25)); 
                    itemSpawnTimer = (Math.random() * 285 + 225) * (initialSpeed / gameSpeed); 
                }
                function spawnHazard() { 
                    const birdY = (Math.random() > 0.5) ? groundY - 35 : groundY - 65; 
                    hazards.push(new Hazard(canvas.width + 50, birdY, birdIcon, -50)); 
                    hazardSpawnTimer = (Math.random() * 210 + 170) * (initialSpeed / gameSpeed);
                }
                function applyNightMode(enable) {
                    isNightMode = enable;
                    if (enable) body.classList.add('night-mode');
                    else body.classList.remove('night-mode');
                }
                function triggerDazzlingEffect() {
                    body.classList.add('dazzling');
                    setTimeout(() => { body.classList.remove('dazzling'); }, 5000); 
                }
                function updatePlayfield() {
                    obstacleSpawnTimer--; if (obstacleSpawnTimer <= 0) spawnObstacle();
                    itemSpawnTimer--; if (itemSpawnTimer <= 0) spawnItem();
                    hazardSpawnTimer--; if (hazardSpawnTimer <= 0) spawnHazard();

                    for (let i = obstacles.length - 1; i >= 0; i--) {
                        let obs = obstacles[i]; obs.update(); obs.draw();
                        if (obs.x + obs.width < 0) obstacles.splice(i, 1);
                    }
                    for (let i = items.length - 1; i >= 0; i--) {
                        let item = items[i]; item.update(); item.draw();
                        if (item.x + item.width < 0) items.splice(i, 1);
                    }
                    for (let i = hazards.length - 1; i >= 0; i--) {
                        let haz = hazards[i]; haz.update(); haz.draw();
                        if (haz.x + haz.width < 0) hazards.splice(i, 1);
                    }
                }
                function runPreviewAutoplay() {
                    const nextObstacle = obstacles.find((obstacle) => obstacle.x + obstacle.width >= player.x + 8);
                    if (!player.isJumping && nextObstacle) {
                        const distance = nextObstacle.x - player.x;
                        if (distance <= 96 && distance >= 44) {
                            player.jump();
                        }
                    }
                }
                function animate() {
                    if (!game2Instance) return; 
                    sceneTick += (gameState === 'playing' || gameState === 'preview') ? gameSpeed * 0.42 : 0.32;
                    drawBackdrop();
                    for (let i = weatherParticles.length - 1; i >= 0; i--) {
                        let p = weatherParticles[i]; p.update(); p.draw();
                        if (p.y > canvas.height + 10) weatherParticles.splice(i, 1); 
                    }
                    if (isNightMode) { stars.forEach(star => { star.update(); star.draw(); }); }
                    if (gameState === 'playing') {
                        score += 0.1; gameSpeed += speedIncrease; 
                        scoreDisplay.textContent = `점수: ${Math.floor(score)}`;
                        const scoreBlockWeather = Math.floor(score / 100);
                        const shouldShowLeaves = (scoreBlockWeather % 2 === 1); 
                        if (shouldShowLeaves) {
                            lastWeatherSpawn++;
                            if (lastWeatherSpawn > 20) { weatherParticles.push(new WeatherParticle()); lastWeatherSpawn = 0; }
                        } else { if (weatherParticles.length > 0) weatherParticles = []; }
                        if (score > scoreMilestone) { triggerDazzlingEffect(); scoreMilestone += 500; }
                        const scoreBlock = Math.floor(score / nightModeThreshold);
                        const shouldBeNight = (scoreBlock % 2 === 1); 
                        if (shouldBeNight && !isNightMode) applyNightMode(true);
                        else if (!shouldBeNight && isNightMode) applyNightMode(false);
                        updatePlayfield();
                        player.update(); player.draw();
                        for (let i = effects.length - 1; i >= 0; i--) {
                            let effect = effects[i]; effect.update(); effect.draw();
                            if (effect.duration <= 0) effects.splice(i, 1);
                        }
                        checkCollisions(); 
                    } else if (gameState === 'preview') {
                        runPreviewAutoplay();
                        updatePlayfield();
                        player.update();
                        player.draw();
                    } else { 
                        player.draw(); obstacles.forEach(obs => obs.draw());
                        items.forEach(item => item.draw()); hazards.forEach(haz => haz.draw());
                        effects.forEach(effect => effect.draw()); weatherParticles.forEach(p => p.draw());
                    }
                    game2Instance.loop = requestAnimationFrame(animate); 
                }
                function isColliding(player, obj, padding) {
                    let playerTop = player.y - player.height; let playerBottom = player.y;
                    let objTop = obj.y - obj.height; let objBottom = obj.y;
                    if (obj instanceof Hazard) { objTop = obj.y - obj.height; objBottom = obj.y; }       
                    else { objTop = obj.y - obj.height; objBottom = obj.y; }
                    return ( player.x < obj.x + obj.width - padding &&
                             player.x + player.width - padding > obj.x &&
                             playerTop < objBottom && playerBottom > objTop );
                }
                function showEffect(x, y, text, color) { effects.push(new Effect(x, y, text, color)); }
                function checkCollisions() {
                    const padding = 5; 
                    for (let i = obstacles.length - 1; i >= 0; i--) {
                        let obs = obstacles[i];
                        if (isColliding(player, obs, padding)) {
                            showEffect(player.x, player.y - player.height, '쿵!', '#ff3300');
                            triggerGameOver(); return; 
                        }
                    }
                    for (let i = items.length - 1; i >= 0; i--) {
                        let item = items[i];
                        if (!item.isHit && isColliding(player, item, padding)) {
                            item.isHit = true; 
                            if (item.type === 'points') {
                                combo++; const pointsEarned = 10 * combo; score += pointsEarned; 
                                showEffect(player.x, player.y - player.height, `+${pointsEarned} (x${combo})`, '#00cc66');
                            }
                            scoreDisplay.textContent = `점수: ${Math.floor(score)}`; items.splice(i, 1); 
                        }
                    }
                    for (let i = hazards.length - 1; i >= 0; i--) {
                        let haz = hazards[i];
                        if (!haz.isHit && isColliding(player, haz, padding)) {
                            haz.isHit = true; score += haz.points; combo = 0; 
                            if (score < 0) { 
                                score = 0; scoreDisplay.textContent = `점수: 0`;
                                showEffect(player.x, player.y - player.height, 'GAME OVER', '#ff3300');
                                triggerGameOver(); return; 
                            }
                            scoreDisplay.textContent = `점수: ${Math.floor(score)}`;
                            showEffect(player.x, player.y - player.height, `${haz.points}`, '#ff3300');
                            hazards.splice(i, 1); 
                        }
                    }
                }
                function triggerGameOver() {
                    if (gameState === 'gameOver') return; 
                    gameState = 'gameOver';
                    gameOverOverlay.style.display = 'flex';
                    body.classList.remove('dazzling'); 
                    const finalScore = Math.floor(score);
                    finalScoreDisplay.textContent = `\uC774\uBC88 \uC810\uC218: ${finalScore}`;
                    if (finalScore > localHighScore) {
                        localHighScore = finalScore;
          localStorage.setItem('minigameLocalHighScore:dino-run-2', localHighScore);
                        highscoreDisplay.textContent = `최고: ${localHighScore}`;
                    }
                    
                    const pElement = gameOverOverlay.querySelector('p#global-highscore-display-g2');
                    pElement.textContent = ''; 

                    if (finalScore >= 200) {
                        isSubmitting = true; 
                        pElement.textContent = '200점 이상! 점수 전송 중...';
                        pElement.textContent = '\uAE30\uB85D\uC744 \uC800\uC7A5\uD558\uB294 \uC911\uC785\uB2C8\uB2E4.';
                        submitAndFetchScores(finalScore, pElement); 
                    } else {
                        isSubmitting = false; 
                        pElement.textContent = '\u0032\u0030\u0030\uC810 \uBBF8\uB9CC \uAE30\uB85D\uC740 \uC800\uC7A5\uB418\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.';
                        pElement.textContent = '200점 미만은 기록되지 않습니다.';
                    }
                    if (finalScore < 200) {
                        pElement.textContent = '\u0032\u0030\u0030\uC810 \uBBF8\uB9CC \uAE30\uB85D\uC740 \uC800\uC7A5\uB418\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.';
                    }
                }
                async function submitScore(finalScore) {
                    const leaderboard = getLeaderboardBridge();
                    if (!leaderboard?.submitScore) {
                        throw new Error('Firebase leaderboard bridge unavailable');
                    }

                    await leaderboard.submitScore({
                        gameId: MINIGAME_ID,
                        nickname: gameUsername,
                        score: finalScore
                    });
                }
                async function fetchAndDisplayGlobalScore(pElement, prefixText = '') {
                    const leaderboard = getLeaderboardBridge();
                    if (!leaderboard?.getTopEntry) {
                        pElement.textContent = prefixText + '명예의 전당 연결을 사용할 수 없습니다.';
                        return;
                    }

                    try {
                        const topEntry = await leaderboard.getTopEntry({ gameId: MINIGAME_ID });
                        if (topEntry) {
                            globalHighScoreData.score = topEntry.score || 0;
                            globalHighScoreData.name = topEntry.nickname || gameUsername;

                            const rawName = topEntry.nickname || gameUsername;
                            const maskedName = leaderboard.maskNickname
                                ? leaderboard.maskNickname(rawName)
                                : (rawName.substring(0, 2) + '*'.repeat(Math.max(0, rawName.length - 2)));

                            pElement.textContent = prefixText + `역대 최고 점수: ${globalHighScoreData.score} (${maskedName})`;
                            pElement.textContent = prefixText + `\uC804\uCCB4 \uCD5C\uACE0 \uC810\uC218: ${globalHighScoreData.score} (${maskedName})`;
                        } else {
                            pElement.textContent = prefixText + '아직 등록된 기록이 없습니다.';
                            pElement.textContent = prefixText + '\uC544\uC9C1 \uB4F1\uB85D\uB41C \uAE30\uB85D\uC774 \uC5C6\uC2B5\uB2C8\uB2E4.';
                        }
                    } catch (error) {
                        console.error("G2 최고 점수 불러오기 실패:", error);
                        pElement.textContent = prefixText + '최고 점수 연결 오류';
                    }
                }
                async function submitAndFetchScores(finalScore, pElement) { 
                    let prefixText = '';

                    try {
                        await submitScore(finalScore);
                        prefixText = '점수 등록 완료! ';
                    } catch (error) {
                        console.error("G2 점수 전송 중 오류:", error);
                        prefixText = '점수 등록 실패. ';
                        prefixText = '\uAE30\uB85D \uC800\uC7A5 \uC2E4\uD328. ';
                    } finally {
                        if (!prefixText.includes('\uC2E4\uD328')) {
                            prefixText = '\uAE30\uB85D \uC800\uC7A5 \uC644\uB8CC. ';
                        }
                        await fetchAndDisplayGlobalScore(pElement, prefixText);
                        isSubmitting = false;
                    }
                }
                
                // --- 이벤트 리스너 ---
                function handleGameAction() {
                    if (gameState === 'playing') player.jump();
                    else startGame(); 
                }
                function handleInput(e) {
                    if (e.key === ' ' || e.code === 'Space') {
                        e.preventDefault(); handleGameAction(); 
                    }
                }
                function handleMouseInput(e) {
                    if (e.target.closest('.back-btn')) { // (수정)
                        return;
                    }
                    e.preventDefault(); handleGameAction();
                }
                function handleTouchInput(e) {
                    if (e.target.closest('.back-btn')) { // (수정)
                        return;
                    }
                    e.preventDefault(); handleGameAction(); 
                }
                
                game2Instance.keyHandler = handleInput;
                game2Instance.mouseHandler = handleMouseInput;
                game2Instance.touchHandler = handleTouchInput;

                document.addEventListener('keydown', game2Instance.keyHandler);
                document.addEventListener('mousedown', game2Instance.mouseHandler); 
                document.addEventListener('touchstart', game2Instance.touchHandler, { passive: false }); 
                
                updateGlobalHighScore(); 
                initGame(); 
            }

            window.addEventListener('beforeunload', cleanupGame2Instance);

            
            function resolveGameNickname() {
                try {
                    const parentNickname = window.parent && window.parent !== window && window.parent.LivelySam?.MinigamesHub?.getNickname?.();
                    if (parentNickname) return String(parentNickname).trim();
                } catch {}
                try {
                    const nickname = localStorage.getItem('minigameNickname');
                    if (nickname) return String(nickname).trim();
                } catch {}
                try {
                    const legacyNickname = localStorage.getItem('j_game_username');
                    if (legacyNickname) return String(legacyNickname).trim();
                } catch {}
                return 'Guest';
            }

            // --- (수정) 5. 자동 실행 로직 ---
            // 허브 닉네임 원문을 우선 사용합니다.
            const gameUsername = resolveGameNickname();
            console.log(gameUsername + "님이 Game 2를 시작합니다.");
            
            // launchGame2 함수를 즉시 호출합니다.
            launchGame2(gameUsername);

        }); 
    </script>
</body>
