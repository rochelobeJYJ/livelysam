    <script>
        // --- 초기 설정 ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const WIDTH = canvas.width;
        const HEIGHT = canvas.height;

	// --- (추가) 1. 사용자 이름 및 서버 URL 설정 ---
const MINIGAME_ID = 'wing-boss';
const IS_PREVIEW_MODE = new URLSearchParams(window.location.search).get('preview') === '1';
function resolveGameNickname() {
    try {
        const parentNickname = window.parent && window.parent !== window && window.parent.LivelySam?.MinigamesHub?.getNickname?.();
        if (parentNickname) return String(parentNickname).trim();
    } catch {}
    try {
        const nickname = localStorage.getItem('minigameNickname');
        if (nickname) return String(nickname).trim();
    } catch {}
    try {
        const legacyNickname = localStorage.getItem('j_game_username');
        if (legacyNickname) return String(legacyNickname).trim();
    } catch {}
    return 'Guest';
}
const gameUsername = resolveGameNickname();
console.log(gameUsername + "님이 윙보스를 시작합니다.");

const GAME_ID = "game3"; // [!! 중요 !!] 윙보스는 "game3" (시트 3)로 설정

function returnToMinigameHub() {
    try {
        if (window.parent && window.parent !== window && window.parent.LivelySam?.MinigamesHub?.closeRunner) {
            window.parent.LivelySam.MinigamesHub.closeRunner();
            return;
        }
    } catch {}
    window.location.href = 'index.html';
}

function getLeaderboardBridge() {
    if (IS_PREVIEW_MODE) {
        return null;
    }
    try {
        if (window.parent && window.parent !== window && window.parent.LivelySam?.Leaderboard) {
            return window.parent.LivelySam.Leaderboard;
        }
    } catch {}
    return window.LivelySam?.Leaderboard || null;
}

// ... (다른 색상, 폰트 상수들) ...

// --- (추가) 게임오버 화면 버튼 영역 ---
const RESTART_BTN_RECT = { x: WIDTH/2 - 141, y: HEIGHT/2 + 150, w: 280, h: 50 };
const LOBBY_BTN_RECT = { x: WIDTH/2 - 141, y: HEIGHT/2 + 210, w: 280, h: 50 };

        // --- 색상 ---
        const WHITE = '#FFFFFF';
        const BLACK = '#000000';
        
        // UI 및 비행기
        const PLANE_RED = '#D91E18'; 
        const PLANE_BLUE = '#3498db'; 
        const PLANE_YELLOW = '#f1c40f'; 
        const PLANE_GREY = '#A9A9A9';
        const THRUST_YELLOW = '#FFDF00';
        const THRUST_ORANGE = '#FFA500';
        const GAME_OVER_RED = '#FF4500';
        const FUEL_GREEN = '#00FF00';
        const FUEL_RED = '#FF0000';
        const SHIELD_BLUE = '#00BFFF'; 
        const SHIELD_BLUE_DARK = '#0080FF'; 
        const MAGNET_RED = '#e74c3c'; 

        // 무기 및 보스 색상
        const MISSILE_BODY = '#555555';
        const MISSILE_BODY_B = '#9A0000';
        const ROCKET_BODY = '#8B4513';
        const ROCKET_FLAME = '#FFD700';
        const LASER_CHARGE = 'rgba(255, 0, 0, 0.5)';
        const LASER_ACTIVE = '#FFFFFF';
        // [신규] 펄스 오브 레인보우
        const RAINBOW_COLORS = ['#FF0000', '#00FF00', '#FFFF00', '#FFFFFF', '#0000FF'];
        
        const BOSS_BODY = '#4A4A4A';
        const BOSS_BODY_DARK = '#333333';
        const BOSS_HIGHLIGHT = '#666666';
        const BOSS_TURRET_BASE = '#2F4F4F';
        const BOSS_TURRET_BARREL = '#808080';
        const NIGHT_SKY_TOP = '#000033'; 

        // --- 폰트 ---
        const FONT_24 = 'bold 24px consolas';
        const FONT_30 = 'bold 30px consolas';
        const FONT_70 = 'bold 70px consolas';
        const FONT_18 = 'bold 18px consolas';

        // --- 난이도 조절 상수 ---
        const BASE_GAME_SPEED = 3.5;  
        const MAX_GAME_SPEED = 12;
        
        const FUEL_SPAWN_RATE = 238; 
        const POWERUP_SPAWN_RATE = 600; 
        const MISSILE_FUEL_DAMAGE = 30; 
        const ROCKET_FUEL_DAMAGE = 50;  
        const LASER_FUEL_DAMAGE = 2;    
        const ORB_FUEL_DAMAGE = 10;
        const FUEL_COLLISION_TOLERANCE = 10; 
        const POWERUP_COLLISION_TOLERANCE = 15; 
        const MAGNET_PULL_RADIUS = 150; 

        // 보스 공격 주기 상수
        const BOSS_MISSILE_SPAWN_RATE = 180;
        const BOSS_ROCKET_SPAWN_RATE = 350;  
        const BOSS_LASER_SPAWN_RATE = 500;   
        const BOSS_ORB_SPAWN_RATE = 600; // [변경] 살보(salvo) 간격
        const BOSS_ORB_SALVO_DELAY = 30; // [신규] 살보 내 발사 간격
        const MAX_BOSS_TURRETS = 5;

        // --- 기체 데이터베이스 ---
        const PLANE_TYPES = [
            {
                key: 'basic',
                name: '윙탭 (기본)',
                color: PLANE_RED,
                gravity: 0.5,
                thrust: -8.0,
                maxFuel: 120, 
                eyeType: 'normal',
                bodyPoly: [[0, 10], [15, 0], [55, 5], [60, 20], [55, 35], [15, 40], [0, 30]],
                tailPoly: [[0, 10], [0, 30], [-15, 35], [-15, 5]],
            },
            {
                key: 'jet',
                name: '제트 (고속)',
                color: PLANE_BLUE,
                gravity: 0.7, 
                thrust: -10.0, 
                maxFuel: 100, 
                eyeType: 'angry',
                bodyPoly: [[0, 10], [15, 0], [60, 5], [65, 20], [60, 35], [15, 40], [0, 30]],
                tailPoly: [[0, 10], [0, 30], [-20, 40], [-20, 0]],
            },
            {
                key: 'glider',
                name: '글라이더 (활공)',
                color: PLANE_YELLOW,
                gravity: 0.35, 
                thrust: -6.5, 
                maxFuel: 140, 
                eyeType: 'gentle',
                bodyPoly: [[0, 10], [10, 0], [50, 5], [55, 20], [50, 35], [10, 40], [0, 30]],
                tailPoly: [[0, 10], [0, 30], [-10, 30], [-10, 10]],
            }
        ];

        // --- 게임 변수 ---
        let plane;
        let boss;
        let particles;
        let stars; 
        let fuelItems; 
        let missiles;
        let powerUps; 
        let rockets; 
        let lasers;  
        let orbs;
        
        let score;
        let fuelItemTimer, powerUpTimer; 
        let explosionDone;
        let framesElapsed; 
        
        let gameState = 'menu';
        let currentPlaneIndex = 0; 
        
        let mouseX = 0; 
        let mouseY = 0; 

        let highScore = 0;
        let currentGameSpeed;
        let scoreSubmitted; 

	// --- (추가) 서버 통신 및 버튼 잠금용 변수 ---
	let isSubmitting = false; 
	let serverStatusMessage = "";

        // --- 클래스 정의 ---

        class Plane {
            constructor(x, y, typeKey) {
                const type = PLANE_TYPES.find(p => p.key === typeKey);
                
                this.x = x;
                this.y = y;
                this.yVel = 0;
                this.scale = 0.7; // [변경] 0.9 -> 0.7
                this.width = 60 * this.scale;
                this.height = 40 * this.scale;
                this.tilt = 0;

                this.type = type;
                this.gravity = type.gravity;
                this.thrust = type.thrust;
                this.maxFuel = type.maxFuel;
                this.fuel = type.maxFuel;

                this.hasShield = false;
                this.magnetCharges = 0;
                this.hitTimer = 0; 
            }

            applyThrust() {
                if (this.fuel > 0) {
                    this.yVel = this.thrust;
                    this.fuel = Math.max(0, this.fuel - 1.8); 
                    return true;
                }
                return false;
            }

            addFuel(amount) {
                this.fuel = Math.min(this.maxFuel, this.fuel + amount);
            }

            takeDamage(fuelAmount) {
                this.fuel = Math.max(0, this.fuel - fuelAmount);
                this.hitTimer = 30; 
            }
            
            update() {
                if (gameState === 'playing') { 
                    this.yVel += this.gravity;
                    if (this.yVel > 15) this.yVel = 15; 
                    this.y += this.yVel;
                    this.tilt = Math.min(25, Math.max(-45, -this.yVel * 3));
                    
                    if (this.hitTimer > 0) { 
                        this.hitTimer--;
                    }

                } else if (gameState === 'menu') {
                    this.y = (HEIGHT / 2) + Math.sin(framesElapsed * 0.05) * 10;
                    this.tilt = 0;
                } else if (gameState === 'dying') { 
                    this.yVel += this.gravity;
                    if (this.yVel > 15) this.yVel = 15; 
                    this.y += this.yVel;
                    this.tilt = Math.max(-90, this.tilt - 5); 
                }
            }

            draw(ctx) {
                const centerX = this.x + (this.width / this.scale / 2) - 10;
                const centerY = this.y + (this.height / this.scale / 2);

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(-this.tilt * Math.PI / 180);
                ctx.scale(this.scale, this.scale); 

                ctx.fillStyle = PLANE_GREY;
                ctx.beginPath();
                ctx.moveTo(this.type.tailPoly[0][0], this.type.tailPoly[0][1]);
                for (let i = 1; i < this.type.tailPoly.length; i++) {
                    ctx.lineTo(this.type.tailPoly[i][0], this.type.tailPoly[i][1]);
                }
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = this.type.color;
                ctx.beginPath();
                ctx.moveTo(this.type.bodyPoly[0][0], this.type.bodyPoly[0][1]);
                for (let i = 1; i < this.type.bodyPoly.length; i++) {
                    ctx.lineTo(this.type.bodyPoly[i][0], this.type.bodyPoly[i][1]);
                }
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = WHITE;
                ctx.beginPath();
                ctx.arc(30, 0, 8, 0, Math.PI * 2);
                ctx.fill();
                
                if (gameState === 'dying' || gameState === 'gameOver' || this.hitTimer > 0) {
                    ctx.strokeStyle = BLACK;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(27, -3); ctx.lineTo(33, 3);
                    ctx.moveTo(33, -3); ctx.lineTo(27, 3);
                    ctx.stroke();
                }
                else if (this.type.eyeType === 'angry') {
                    ctx.fillStyle = this.type.color; 
                    ctx.beginPath();
                    ctx.arc(30, 0, 8, Math.PI, 0); 
                    ctx.fill();
                    ctx.fillStyle = BLACK;
                    ctx.beginPath();
                    ctx.arc(32, -1, 3, 0, Math.PI * 2); 
                    ctx.fill();
                } else if (this.type.eyeType === 'gentle') {
                    ctx.fillStyle = BLACK;
                    ctx.beginPath();
                    ctx.arc(32, 2, 5, 0, Math.PI * 2); 
                    ctx.fill();
                } else {
                    ctx.fillStyle = BLACK;
                    ctx.beginPath();
                    ctx.arc(32, 0, 3, 0, Math.PI * 2); 
                    ctx.fill();
                }
                
                if (this.hasShield) {
                    const shieldCenterX = 55; 
                    const shieldAngle = Math.PI / 2.2; 
                    ctx.lineWidth = 3 / this.scale;
                    
                    ctx.strokeStyle = SHIELD_BLUE;
                    ctx.beginPath();
                    ctx.arc(shieldCenterX, 20, 30, -shieldAngle, shieldAngle);
                    ctx.stroke();

                    ctx.strokeStyle = WHITE;
                    ctx.beginPath();
                    ctx.arc(shieldCenterX, 20, 25, -shieldAngle, shieldAngle);
                    ctx.stroke();
                    
                    ctx.strokeStyle = SHIELD_BLUE;
                    ctx.beginPath();
                    ctx.arc(shieldCenterX, 20, 20, -shieldAngle, shieldAngle);
                    ctx.stroke();
                }

                ctx.restore();
            }

            getRect() {
                const paddingX = 5 * this.scale; 
                const paddingY = 3 * this.scale; 
                return { 
                    x: this.x + paddingX, 
                    y: this.y + paddingY, 
                    width: this.width - 2 * paddingX, 
                    height: this.height - 2 * paddingY 
                };
            }
        }

        class Particle {
            // (기존 Particle 클래스 코드와 동일 - 변경 없음)
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.radius = 0;

                if (type === 'thrust') {
                    this.vx = -currentGameSpeed - (Math.random() * 2 + 1);
                    this.vy = Math.random() * 2 - 1;
                    this.color = [THRUST_YELLOW, THRUST_ORANGE, WHITE][Math.floor(Math.random() * 3)];
                    this.radius = Math.floor(Math.random() * 5) + 4;
                    this.life = 20; 
                } else if (type === 'explosion') { 
                    this.vx = Math.random() * 20 - 10;
                    this.vy = Math.random() * 20 - 10;
                    this.color = [THRUST_ORANGE, PLANE_RED, BLACK][Math.floor(Math.random() * 3)];
                    this.radius = Math.floor(Math.random() * 11) + 5;
                    this.life = 20; 
                } else if (type === 'missileTrail') { 
                    this.vx = 0.5; 
                    this.vy = Math.random() * 1 - 0.5;
                    this.color = [MISSILE_BODY, THRUST_ORANGE][Math.floor(Math.random() * 2)];
                    this.radius = Math.floor(Math.random() * 2) + 1;
                    this.life = 15;
                } else if (type === 'missileHit') { 
                    this.vx = Math.random() * 8 - 4;
                    this.vy = Math.random() * 8 - 4;
                    this.color = [GAME_OVER_RED, MISSILE_BODY, BLACK][Math.floor(Math.random() * 3)];
                    this.radius = Math.floor(Math.random() * 5) + 3;
                    this.life = 15;
                } else if (type === 'fuelGet') { 
                    this.vx = Math.random() * 6 - 3; 
                    this.vy = Math.random() * 6 - 3;
                    this.color = [FUEL_GREEN, WHITE, THRUST_YELLOW][Math.floor(Math.random() * 3)];
                    this.radius = Math.floor(Math.random() * 6) + 3;
                    this.life = 25;
                } else if (type === 'shieldBreak') { 
                    this.vx = Math.random() * 10 - 5;
                    this.vy = Math.random() * 10 - 5;
                    this.color = [SHIELD_BLUE, '#87CEFA', WHITE][Math.floor(Math.random() * 3)];
                    this.radius = Math.floor(Math.random() * 7) + 4;
                    this.life = 30;
                } else if (type === 'magnetPull') { 
                    this.vx = 0; this.vy = 0; 
                    this.color = [THRUST_YELLOW, WHITE][Math.floor(Math.random() * 2)];
                    this.radius = Math.random() * 2 + 1;
                    this.life = 10; 
                }
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                if (['explosion', 'thrust', 'fuelGet', 'shieldBreak', 'missileHit'].includes(this.type)) {
                     if (this.radius > 0) this.radius -= 0.5;
                }
                this.life -= 1;
            }

            draw(ctx) {
                if (this.radius > 0) {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // [변경] 대포 클래스 (크기 증가)
        class Turret {
            constructor(boss, yOffset, level) {
                this.boss = boss;
                this.yOffset = yOffset;
                this.level = level;
                
                this.baseX = this.boss.x + 60; 
                this.baseY = this.boss.y + this.yOffset;
                this.angle = 0; 
                this.barrelLength = 40; // [변경] 포신 길이 증가

                this.fireTimer = Math.random() * BOSS_MISSILE_SPAWN_RATE;
            }

            update() {
                this.baseY = this.boss.y + this.yOffset;
                
                if (plane) {
                    const dx = plane.x - this.baseX;
                    const dy = plane.y - this.baseY;
                    this.angle = Math.atan2(dy, dx);
                }
                
                this.fireTimer++;
                if (this.fireTimer > BOSS_MISSILE_SPAWN_RATE) {
                    this.fireMissile();
                    this.fireTimer = 0;
                }
            }

            fireMissile() {
                const endX = this.baseX + Math.cos(this.angle) * this.barrelLength;
                const endY = this.baseY + Math.sin(this.angle) * this.barrelLength;
                missiles.push(new EnemyMissile(endX, endY, this.level));
            }

            draw(ctx) {
                // 1. 대포 고정부 (몸체에 붙은 원)
                ctx.fillStyle = BOSS_TURRET_BASE;
                ctx.beginPath();
                ctx.arc(this.baseX, this.baseY, 30, 0, Math.PI * 2); // [변경] 크기 증가
                ctx.fill();

                // 2. 포신 (회전)
                ctx.save();
                ctx.translate(this.baseX, this.baseY);
                ctx.rotate(this.angle);
                
                ctx.fillStyle = BOSS_TURRET_BARREL;
                ctx.fillRect(0, -8, this.barrelLength, 16); // [변경] 크기 증가
                ctx.fillStyle = BLACK;
                ctx.fillRect(this.barrelLength - 5, -6, 5, 12); // [변경] 크기 증가
                
                ctx.restore();
            }
        }

        // [변경] 보스 클래스
        class Boss {
            constructor() {
                this.width = 140; 
                this.x = WIDTH - this.width;
                this.y = HEIGHT / 2;
                this.baseY = HEIGHT / 2; 
                this.moveTimer = 0;      
                
                this.turrets = [];
                this.turretCount = 0;

                this.rocketTimer = 0;
                this.laserTimer = 0;
                this.orbTimer = 0; 
                
                // [신규] 펄스 오브 살보(salvo) 로직용 변수
                this.orbFireCount = 0; // 현재 점수에서 쏴야 할 총알 수
                this.currentOrbFireIndex = 0; // 현재 몇 번째 총알을 쏘는 중인지

                
                this.rocketYOffset = 0;
                this.laserYOffset = 100;
                this.orbYOffset = 250; // [변경] 하단으로 이동
            }

            addTurret() {
                if (this.turretCount >= MAX_BOSS_TURRETS) return; 

                this.turretCount++;
                let yOffset = 0;
                
                if (this.turretCount === 1) yOffset = -100; 
                else if (this.turretCount === 2) yOffset = -200;
                else if (this.turretCount === 3) yOffset = 200;
                else if (this.turretCount === 4) yOffset = -300;
                else if (this.turretCount === 5) yOffset = 300;
                
                this.turrets.push(new Turret(this, yOffset, this.turretCount));
            }

            update() {
                // 1. 보스 움직임
                this.moveTimer += 0.02;
                this.y = this.baseY + Math.sin(this.moveTimer) * (HEIGHT / 4);

                // 2. 대포 업데이트
                this.turrets.forEach(turret => turret.update());

                // 3. 로켓 발사
                this.rocketTimer++;
                if (this.rocketTimer > BOSS_ROCKET_SPAWN_RATE) {
                    rockets.push(new Rocket(this.x + 30, this.y + this.rocketYOffset));
                    this.rocketTimer = 0;
                }

                // 4. 레이저 발사
                this.laserTimer++;
                if (this.laserTimer > BOSS_LASER_SPAWN_RATE) {
                    lasers.push(new LaserBeam(this.y + this.laserYOffset));
                    this.laserTimer = 0;
                }

                // 5. [변경] 펄스 오브 (살보 시스템)
                if (plane) {
                    // 현재 점수(100점당 1)에 따라 쏴야 할 총알 수 업데이트
                    this.orbFireCount = Math.floor(score / 100); 
                    
                    if (this.orbFireCount > 0) {
                        this.orbTimer++;
                        
                        // 1. 살보를 쏠 시간이 되었고 (600프레임),
                        // 2. 아직 이번 살보에서 쏠 총알이 남았는지 (current < total)
                        if (this.orbTimer > BOSS_ORB_SPAWN_RATE && 
                            this.currentOrbFireIndex < this.orbFireCount) 
                        {
                            // 발사! (비행기 위치 조준)
                            orbs.push(new PulsingOrb(this.x + 70, this.y + this.orbYOffset, plane));
                            this.currentOrbFireIndex++; // 쏜 총알 인덱스 +1
                            
                            // 다음 총알을 쏠 수 있도록 타이머를 살짝(30프레임)만 되돌림
                            this.orbTimer = BOSS_ORB_SPAWN_RATE - BOSS_ORB_SALVO_DELAY;
                        }

                        // 3. 이번 살보를 다 쐈다면 (current >= total)
                        if (this.currentOrbFireIndex >= this.orbFireCount) {
                            this.orbTimer = 0; // 메인 타이머 초기화 (다음 600프레임 대기)
                            this.currentOrbFireIndex = 0; // 살보 인덱스 초기화
                        }
                    }
                }
            }

            // [변경] 보스 그리기 (레이어 순서 수정)
            draw(ctx) {
                const bossY = this.y;
                
                // [변경] 그리기 순서: 1.몸체 -> 2.디테일 -> 3.고정무기 -> 4.회전포탑

                // 1. 주 본체 (각진 다각형)
                ctx.fillStyle = BOSS_BODY;
                ctx.beginPath();
                ctx.moveTo(WIDTH, 0);
                ctx.lineTo(this.x, 0);
                ctx.lineTo(this.x + 30, 50);
                ctx.lineTo(this.x + 30, HEIGHT - 50);
                ctx.lineTo(this.x, HEIGHT);
                ctx.lineTo(WIDTH, HEIGHT);
                ctx.closePath();
                ctx.fill();

                // 2. 메카닉 디테일 (패널, 볼트, 벤트)
                this.drawDetails(ctx);

                // 3. 로켓/레이저/오브 발사기 (고정 무기) - (디테일 위에 그림)
                this.drawRocketLauncher(ctx, this.x + 110, bossY + this.rocketYOffset);
                this.drawLaserLauncher(ctx, this.x + 30, bossY + this.laserYOffset);
                this.drawOrbEmitter(ctx, this.x + 70, bossY + this.orbYOffset);
                
                // 4. 대포 그리기 (가장 위에)
                this.turrets.forEach(turret => turret.draw(ctx));
            }

            // [변경] 로켓 발사기 그리기 (왼쪽 바라봄)
            drawRocketLauncher(ctx, x, y) {
                ctx.fillStyle = BOSS_BODY_DARK; 
                ctx.fillRect(x - 70, y - 30, 70, 60);
                ctx.fillStyle = BOSS_TURRET_BASE; 
                ctx.beginPath();
                ctx.arc(x - 20, y, 25, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = BOSS_TURRET_BARREL; 
                ctx.fillRect(x - 70, y - 10, 50, 20);
                ctx.fillStyle = BLACK; 
                ctx.fillRect(x - 80, y - 12, 10, 24);
                ctx.fillStyle = BOSS_HIGHLIGHT; 
                ctx.fillRect(x - 60, y - 15, 40, 5);
            }

            // [변경] 레이저 발사기 그리기 (왼쪽 바라봄)
            drawLaserLauncher(ctx, x, y) {
                ctx.fillStyle = BOSS_BODY_DARK;
                ctx.beginPath();
                ctx.moveTo(x, y - 40);
                ctx.lineTo(x - 70, y - 30);
                ctx.lineTo(x - 70, y + 30);
                ctx.lineTo(x, y + 40);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = BOSS_TURRET_BASE;
                ctx.fillRect(x - 80, y - 20, 70, 40);
                ctx.fillStyle = BLACK;
                ctx.fillRect(x - 80, y - 10, 60, 20);
                ctx.fillStyle = GAME_OVER_RED;
                ctx.fillRect(x - 80, y - 5, 60, 10);
                ctx.fillStyle = LASER_CHARGE;
                ctx.fillRect(x - 80, y - 2, 60, 4);
            }
            
            // [신규] 오브 발사기 그리기
            drawOrbEmitter(ctx, x, y) {
                ctx.fillStyle = BOSS_HIGHLIGHT;
                ctx.beginPath();
                ctx.arc(x, y, 20, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = BLACK;
                ctx.beginPath();
                ctx.arc(x, y, 15, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#ADFF2F'; // Green-Yellow
                ctx.beginPath();
                ctx.arc(x, y, 10, 0, Math.PI * 2);
                ctx.fill();
            }

            // [변경] 메카닉 디테일 (음영, 새 장식 추가, 볼트 제거)
            drawDetails(ctx) {
                ctx.strokeStyle = BOSS_HIGHLIGHT;
                ctx.lineWidth = 2;
                
                // Panel 1 (top) [변경] - 오른쪽으로 이동
                ctx.beginPath();
                ctx.moveTo(this.x + 90, 50);
                ctx.lineTo(this.x + 130, 70);
                ctx.lineTo(this.x + 130, 150);
                ctx.lineTo(this.x + 90, 130);
                ctx.closePath();
                ctx.fillStyle = 'rgba(0,0,0,0.2)'; // [신규] Shading
                ctx.fill();
                ctx.stroke();

                // Panel 2 (bottom) [변경] - 오른쪽으로 이동
                ctx.beginPath();
                ctx.moveTo(this.x + 90, HEIGHT - 50);
                ctx.lineTo(this.x + 130, HEIGHT - 70);
                ctx.lineTo(this.x + 130, HEIGHT - 150);
                ctx.lineTo(this.x + 90, HEIGHT - 130);
                ctx.closePath();
                ctx.fillStyle = 'rgba(0,0,0,0.2)'; // [신규] Shading
                ctx.fill();
                ctx.stroke();
                
                // Panel 3 (middle) [변경] - 오른쪽으로 이동
                ctx.beginPath();
                ctx.moveTo(this.x + 100, this.y - 50);
                ctx.lineTo(this.x + 130, this.y - 30);
                ctx.lineTo(this.x + 130, this.y + 30);
                ctx.lineTo(this.x + 100, this.y + 50);
                ctx.closePath();
                ctx.fillStyle = 'rgba(0,0,0,0.2)'; // [신규] Shading
                ctx.fill();
                ctx.stroke();

                // [신규] Vents (Decoration) [변경] - 왼쪽으로 이동
                ctx.strokeStyle = BOSS_BODY_DARK;
                ctx.lineWidth = 4;
                this.drawVent(ctx, this.x + 40, 50);
                this.drawVent(ctx, this.x + 40, HEIGHT - 50);


                // Draw bolts [변경] - 패널 위치 따라 이동
                ctx.fillStyle = BOSS_BODY_DARK;
                this.drawBolt(ctx, this.x + 90, 50);
                this.drawBolt(ctx, this.x + 130, 150);
                this.drawBolt(ctx, this.x + 90, HEIGHT - 130);
                this.drawBolt(ctx, this.x + 130, HEIGHT - 70);
                // [제거] 의미 없는 볼트 2개
                this.drawBolt(ctx, this.x + 130, this.y); // Panel 3 볼트
            }

            drawBolt(ctx, x, y) {
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // [신규] 벤트 그리기 헬퍼
            drawVent(ctx, x, y) {
                ctx.beginPath();
                ctx.moveTo(x, y - 20); ctx.lineTo(x, y + 20);
                ctx.moveTo(x + 10, y - 20); ctx.lineTo(x + 10, y + 20);
                ctx.moveTo(x + 20, y - 20); ctx.lineTo(x + 20, y + 20);
                ctx.stroke();
            }
        }
        
        class FuelItem {
             // (기존 FuelItem 클래스 코드와 동일 - 변경 없음)
            constructor() {

                this.width = 30;
                this.height = 30;
                this.angle = 0;
                this.value = 50; 
            }

            update() {
                if (plane && plane.magnetCharges > 0) {
                    const dx = (plane.x + plane.width / 2) - (this.x + this.width / 2);
                    const dy = (plane.y + plane.height / 2) - (this.y + this.height / 2);
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < MAGNET_PULL_RADIUS) {
                        const pullSpeed = 8;
                        this.x += (dx / dist) * pullSpeed;
                        this.y += (dy / dist) * pullSpeed;
                        if (framesElapsed % 4 === 0) {
                            particles.push(new Particle(this.x + this.width / 2, this.y + this.height / 2, 'magnetPull'));
                        }
                    } else {
                        this.x -= currentGameSpeed; 
                    }
                } else {
                    this.x -= currentGameSpeed; 
                }
                this.angle += 0.05;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                ctx.rotate(this.angle);

                const w = this.width;
                const h = this.height;
                const halfW = w / 2;
                const halfH = h / 2;
                const capHeight = 5;

                ctx.fillStyle = THRUST_YELLOW;
                ctx.fillRect(-halfW, -halfH + capHeight, w, h - capHeight*2);
                ctx.fillStyle = '#E6C300'; 
                ctx.beginPath();
                ctx.ellipse(0, -halfH + capHeight, halfW, capHeight, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#D4AF00'; 
                ctx.beginPath();
                ctx.ellipse(0, halfH - capHeight, halfW, capHeight, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = BLACK;
                ctx.font = 'bold 24px consolas';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('F', 0, 2); 

                ctx.restore();
            }

            getRect() {
                return { x: this.x, y: this.y, width: this.width, height: this.height };
            }

            getForgivingRect() {
                return { 
                    x: this.x - FUEL_COLLISION_TOLERANCE, 
                    y: this.y - FUEL_COLLISION_TOLERANCE, 
                    width: this.width + 2 * FUEL_COLLISION_TOLERANCE, 
                    height: this.height + 2 * FUEL_COLLISION_TOLERANCE 
                };
            }
        }

                        homingStrength = Math.abs(targetY - this.y) > 100 ? 0.02 : 0.01;
                    } else {
                        homingStrength = Math.abs(targetY - this.y) > 100 ? 0.05 : 0.03;
                    }

                    this.y += this.yVel;

                ctx.lineTo(this.x + this.width, this.y + this.height); 
                ctx.closePath();
                ctx.fill();

        // [신규] 레이저 빔 클래스
        class LaserBeam {
            constructor(startY) {
                this.y = startY;
                this.chargeTimer = 90; 
                this.activeTimer = 60; 
                this.state = 'charging';
                this.width = 10; 
            }

            update() {
                if (this.state === 'charging') {
                    this.chargeTimer--;
                    this.width = Math.max(1, 10 - (this.chargeTimer / 9)); 
                    if (this.chargeTimer <= 0) {
                        this.state = 'active';
                    }
                } else if (this.state === 'active') {
                    this.activeTimer--;
                    this.width = 25; 
                    if (this.activeTimer <= 0) {
                        this.state = 'fading';
                    }
                }
            }

            draw(ctx) {
                if (this.state === 'charging') {
                    ctx.fillStyle = LASER_CHARGE;
                    ctx.fillRect(0, this.y - this.width / 2, WIDTH - boss.width, this.width); 
                } else if (this.state === 'active') {
                    ctx.fillStyle = LASER_ACTIVE;
                    ctx.fillRect(0, this.y - this.width / 2, WIDTH - boss.width, this.width);
                    ctx.fillStyle = LASER_CHARGE;
                    ctx.fillRect(0, this.y - (this.width + 10) / 2, WIDTH - boss.width, this.width + 10);
                }
            }

            getRect() {
                if (this.state === 'active') {
                    return { x: 0, y: this.y - this.width / 2, width: WIDTH - boss.width, height: this.width };
                }
                return null;
            }
            
            isDone() {
                return this.state === 'fading';
            }
        }

        // [변경] 펄스 오브 클래스 (탄도, 색상)
        class PulsingOrb {
            constructor(x, y, targetPlane) {
                this.x = x;
                this.y = y;
                
                // [변경] 고정 각도 계산
                const dx = targetPlane.x + targetPlane.width / 2 - this.x;
                const dy = targetPlane.y + targetPlane.height / 2 - this.y;
                this.angle = Math.atan2(dy, dx);
                this.speed = currentGameSpeed * 0.5; // 느린 속도
                this.vx = Math.cos(this.angle) * this.speed;
                this.vy = Math.sin(this.angle) * this.speed;
                
                this.baseRadius = 15;
                this.pulseRadius = 0;
                this.maxPulseRadius = 25;
                this.pulseSpeed = 1.5;
                this.isExpanding = true;
            }
            update() {
                this.x += this.vx; // [변경] 고정 각도로 이동
                this.y += this.vy;
                
                if (this.isExpanding) {
                    this.pulseRadius += this.pulseSpeed;
                    if (this.pulseRadius >= this.maxPulseRadius) this.isExpanding = false;
                } else {
                    this.pulseRadius -= this.pulseSpeed;
                    if (this.pulseRadius <= 0) this.isExpanding = true;
                }
            }
            draw(ctx) {
                let totalRadius = this.baseRadius + this.pulseRadius;
                
                // [변경] 휘황찬란한 색상
                const colorIndex = Math.floor(framesElapsed / 3) % RAINBOW_COLORS.length;
                const dynamicColor = RAINBOW_COLORS[colorIndex];
                
                // Outer glow (반투명)
                ctx.fillStyle = dynamicColor.substring(0, 7) + '55'; // '55' = 33% alpha
                ctx.beginPath();
                ctx.arc(this.x, this.y, totalRadius, 0, Math.PI * 2);
                ctx.fill();
                // Inner core (불투명)
                ctx.fillStyle = dynamicColor;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.baseRadius, 0, Math.PI * 2);
                ctx.fill();
            }
            getRect() {
                let r = this.baseRadius + this.pulseRadius;
                return { x: this.x - r, y: this.y - r, width: r * 2, height: r * 2 };
            }
        }

        // --- 헬퍼 함수 ---

        function hexToRgb(hex) {
            let r = 0, g = 0, b = 0;
            if (hex.length == 7) {
                r = parseInt(hex.substring(1, 3), 16);
                g = parseInt(hex.substring(3, 5), 16);
                b = parseInt(hex.substring(5, 7), 16);
            }
            return [r, g, b];
        }

        function lerp(a, b, t) {
            return a + (b - a) * t;
        }

        function drawTextWithShadow(ctx, text, font, color, x, y, textAlign = 'left', textBaseline = 'top') {
            ctx.font = font;
            ctx.fillStyle = color;
            ctx.shadowColor = BLACK;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 3;
            ctx.shadowBlur = 4;
            
            ctx.textAlign = textAlign;
            ctx.textBaseline = textBaseline;

            ctx.fillText(text, x, y);

            ctx.shadowColor = 'transparent';
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            ctx.shadowBlur = 0;
            
            ctx.textAlign = 'left'; 
            ctx.textBaseline = 'top';
        }

	// --- (추가) WingTap2의 멀티라인 텍스트 함수 ---
function drawMultilineTextWithShadow(ctx, text, font, color, x, y, textAlign = 'left', textBaseline = 'top', lineHeight = 30) {
    const lines = text.split('\n');

    let startY = y;
    if (textBaseline === 'middle') {
        startY -= (lines.length - 1) * lineHeight / 2;
    } else if (textBaseline === 'bottom') {
        startY -= (lines.length - 1) * lineHeight;
    }

    lines.forEach((line, index) => {
        drawTextWithShadow(ctx, line, font, color, x, startY + (index * lineHeight), textAlign, textBaseline);
    });
}

        function drawFuelBar(ctx, x, y, width, height, fuel, maxFuel) {
            const percent = fuel / maxFuel;
            const barWidth = width * percent;
            const color = percent > 0.3 ? FUEL_GREEN : FUEL_RED;

            ctx.fillStyle = '#333';
            ctx.fillRect(x, y, width, height);
            ctx.strokeStyle = WHITE;
            ctx.strokeRect(x, y, width, height);
            ctx.fillStyle = color;
            ctx.fillRect(x, y, barWidth, height);
            ctx.fillStyle = WHITE;
            ctx.font = 'bold 16px consolas';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(`연료: ${Math.ceil(fuel)}`, x + width / 2, y + height / 2 + 2);
        }

        function drawShieldIcon(x, y) {

            const halfW = 10;
            const halfH = 10;
            const shieldW = halfW * 0.9;
            const shieldH = halfH * 0.9;
            
            ctx.fillStyle = SHIELD_BLUE;
            ctx.beginPath();
            ctx.moveTo(0, -shieldH); ctx.lineTo(shieldW, -shieldH * 0.8);
            ctx.lineTo(shieldW, shieldH * 0.5); ctx.lineTo(0, shieldH);
            ctx.closePath(); ctx.fill();
            
            ctx.fillStyle = SHIELD_BLUE_DARK;
            ctx.beginPath();
            ctx.moveTo(0, -shieldH); ctx.lineTo(-shieldW, -shieldH * 0.8);
            ctx.lineTo(-shieldW, shieldH * 0.5); ctx.lineTo(0, shieldH);
            ctx.closePath(); ctx.fill();

            ctx.strokeStyle = WHITE;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, -shieldH); ctx.lineTo(shieldW, -shieldH * 0.8);
            ctx.lineTo(shieldW, shieldH * 0.5); ctx.lineTo(0, shieldH);
            ctx.lineTo(-shieldW, shieldH * 0.5); ctx.lineTo(-shieldW, -shieldH * 0.8);
            ctx.closePath(); ctx.stroke();

            ctx.restore();
        }

        function drawMagnetIcon(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(0.7, 0.7); 

            const halfW = 10;
            const halfH = 10;
            
            ctx.strokeStyle = MAGNET_RED;
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(-halfW + 4, -halfH); 
            ctx.lineTo(-halfW + 4, halfH - 6); 
            ctx.quadraticCurveTo(0, halfH + 3, halfW - 4, halfH - 6); 
            ctx.lineTo(halfW - 4, -halfH); 
            ctx.stroke();

            ctx.fillStyle = WHITE;
            ctx.fillRect(-halfW - 1, -halfH - 2, 6, 3);
            ctx.fillRect(halfW - 5, -halfH - 2, 6, 3);

            ctx.restore();
        }


        function checkCollision(obj1, objOrRect2) {
            const rect1 = obj1.getRect();
            
            const rect2 = typeof objOrRect2.getRect === 'function' ? objOrRect2.getRect() : objOrRect2;
            if (!rect1 || !rect2) return false;
            
            return (
                rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y
            );
        }

async function submitScore(finalScore) {
    const leaderboard = getLeaderboardBridge();
    if (!leaderboard?.submitScore) {
        throw new Error('Firebase leaderboard bridge unavailable');
    }

    await leaderboard.submitScore({
        gameId: MINIGAME_ID,
        nickname: gameUsername,
        score: finalScore
    });
}

/**
 * '역대 최고' 기록을 '조회'하고 '표시' (변수 업데이트)
 */
async function fetchAndDisplayGlobalScore(prefixText = "") {
    const leaderboard = getLeaderboardBridge();
    if (!leaderboard?.getTopEntry) {
        serverStatusMessage = prefixText + '명예의 전당 연결을 사용할 수 없습니다.';
        return;
    }

    try {
        const topEntry = await leaderboard.getTopEntry({ gameId: MINIGAME_ID });
        if (topEntry) {
            const rawName = topEntry.nickname || "Unknown";
            const maskedName = leaderboard.maskNickname
                ? leaderboard.maskNickname(rawName)
                : (rawName.substring(0, 2) + '*'.repeat(Math.max(0, rawName.length - 2)));

            serverStatusMessage = prefixText + `서버 최고: ${topEntry.score || 0} (${maskedName})`;
        } else {
            serverStatusMessage = prefixText + '아직 등록된 기록이 없습니다.';
        }
    } catch (error) {
        console.error("WingBoss 최고 점수 불러오기 실패:", error);
        serverStatusMessage = prefixText + '최고 점수 연결 오류';
    }
}

        function changePlane(direction) {
            if (gameState !== 'menu') return;
            currentPlaneIndex = (currentPlaneIndex + direction + PLANE_TYPES.length) % PLANE_TYPES.length;
            plane = new Plane(75, HEIGHT / 2, PLANE_TYPES[currentPlaneIndex].key); // [변경] 시작 X좌표
        }

        // --- 메인 게임 로직 ---

        function startGame() {
            gameState = 'menu'; 
            plane = new Plane(75, HEIGHT / 2, PLANE_TYPES[currentPlaneIndex].key); // [변경] 시작 X좌표
            
            boss = new Boss();
            boss.addTurret(); 
            
            particles = [];
            stars = []; 
            fuelItems = []; 
            missiles = [];
            powerUps = []; 
            rockets = []; 
            lasers = [];  
            orbs = []; // [신규]

            for (let i = 0; i < 100; i++) {
                stars.push(new Star());
            }
            
            score = 0; 
            fuelItemTimer = 0; 
            powerUpTimer = 0; 
            
            explosionDone = false;
            framesElapsed = 0; 
            scoreSubmitted = false;
            
            highScore = parseInt(localStorage.getItem('minigameLocalHighScore:wing-boss')) || 0;
            
            currentGameSpeed = BASE_GAME_SPEED;
        }

        function gameLoop() {
            
            // --- 업데이트 로직 ---
            framesElapsed++; 

            if (gameState === 'playing') {
                currentGameSpeed = Math.min(MAX_GAME_SPEED, BASE_GAME_SPEED + Math.floor(framesElapsed / 75) * 0.15); 
            
                plane.update();
                boss.update(); 
                
                for (let i = fuelItems.length - 1; i >= 0; i--) {
                    fuelItems[i].update();
                    if (fuelItems[i].x < -fuelItems[i].width) fuelItems.splice(i, 1);
                }

                for (let i = missiles.length - 1; i >= 0; i--) {
                    missiles[i].update();
                    if (missiles[i].x < -missiles[i].width) missiles.splice(i, 1);
                }
                
                for (let i = rockets.length - 1; i >= 0; i--) {
                    rockets[i].update();
                    if (rockets[i].x < -rockets[i].width - 15) rockets.splice(i, 1);
                }

                for (let i = lasers.length - 1; i >= 0; i--) {
                    lasers[i].update();
                    if (lasers[i].isDone()) lasers.splice(i, 1);
                }
                
                // [신규] 펄스 오브 업데이트
                for (let i = orbs.length - 1; i >= 0; i--) {
                    orbs[i].update();
                    if (orbs[i].x < -orbs[i].baseRadius - orbs[i].maxPulseRadius || orbs[i].x > WIDTH + orbs[i].baseRadius + orbs[i].maxPulseRadius || orbs[i].y < 0 || orbs[i].y > HEIGHT) {
                        orbs.splice(i, 1);
                    }
                }

                for (let i = powerUps.length - 1; i >= 0; i--) {
                    powerUps[i].update();
                    if (powerUps[i].x < -powerUps[i].width) powerUps.splice(i, 1);
                }
                
                stars.forEach(star => star.update()); 
                
                score = Math.floor(framesElapsed / 10); 

                // [신규] 보스 진화 (대포 추가) 로직
                const targetTurretCount = Math.floor(score / 200) + 1;
                if (targetTurretCount > boss.turretCount && boss.turretCount < MAX_BOSS_TURRETS) {
                    boss.addTurret();
                }

                // --- 스포너 (아이템만) ---
                fuelItemTimer++; 
                if (fuelItemTimer > FUEL_SPAWN_RATE) { 
                    fuelItems.push(new FuelItem());
                    fuelItemTimer = 0;
                }

                powerUpTimer++; 
                if (powerUpTimer > POWERUP_SPAWN_RATE) {
                    const type = Math.random() > 0.5 ? 'shield' : 'magnet';
                    powerUps.push(new PowerUp(type));
                    powerUpTimer = 0;
                }
                
                // --- 충돌 감지 ---
                let isDead = false;
                if (plane.y < 0 || plane.y + plane.height > HEIGHT) isDead = true;
                
                if (isDead) {
                    gameState = 'dying'; 
                } else {
                    // 연료 아이템 충돌
                    for (let i = fuelItems.length - 1; i >= 0; i--) {
                        if (checkCollision(plane, fuelItems[i].getForgivingRect())) {
                            plane.addFuel(fuelItems[i].value);
                            for (let p = 0; p < 15; p++) {
                                particles.push(new Particle(plane.getRect().x + plane.getRect().width / 2, plane.getRect().y + plane.getRect().height / 2, 'fuelGet'));
                            }
                            if (plane.magnetCharges > 0) plane.magnetCharges--;
                            
                            fuelItems.splice(i, 1);
                        }
                    }

                    // 유도 미사일 충돌
                    for (let i = missiles.length - 1; i >= 0; i--) {
                        if (checkCollision(plane, missiles[i])) {
                            if (plane.hasShield) {
                                plane.hasShield = false; 
                                for(let p=0; p < 20; p++) {
                                    particles.push(new Particle(missiles[i].x, missiles[i].y + missiles[i].height/2, 'shieldBreak'));
                                }
                            } else {
                                plane.takeDamage(MISSILE_FUEL_DAMAGE); 
                                for(let p=0; p < 10; p++) {
                                    particles.push(new Particle(missiles[i].x, missiles[i].y + missiles[i].height/2, 'missileHit'));
                                }
                            }
                            missiles.splice(i, 1); 
                        }
                    }
                    
                    // 로켓 충돌
                    for (let i = rockets.length - 1; i >= 0; i--) {
                        if (checkCollision(plane, rockets[i])) {
                            if (plane.hasShield) {
                                plane.hasShield = false; 
                                for(let p=0; p < 20; p++) {
                                    particles.push(new Particle(rockets[i].x, rockets[i].y + rockets[i].height/2, 'shieldBreak'));
                                }
                            } else {
                                plane.takeDamage(ROCKET_FUEL_DAMAGE); 
                                for(let p=0; p < 15; p++) {
                                    particles.push(new Particle(rockets[i].x, rockets[i].y + rockets[i].height/2, 'missileHit'));
                                }
                            }
                            rockets.splice(i, 1); 
                        }
                    }
                    
                    // 레이저 충돌
                    for (let i = lasers.length - 1; i >= 0; i--) {
                        if (lasers[i].state === 'active' && checkCollision(plane, lasers[i])) {
                            if (plane.hasShield) {
                                plane.hasShield = false;
                                for(let p=0; p < 20; p++) {
                                    particles.push(new Particle(plane.getRect().x + plane.getRect().width / 2, plane.getRect().y + plane.getRect().height / 2, 'shieldBreak'));
                                }
                            } else {
                                plane.takeDamage(LASER_FUEL_DAMAGE); 
                            }
                        }
                    }
                    
                    // [신규] 펄스 오브 충돌
                    for (let i = orbs.length - 1; i >= 0; i--) {
                        if (checkCollision(plane, orbs[i])) {
                            if (plane.hasShield) {
                                plane.hasShield = false; 
                                for(let p=0; p < 15; p++) {
                                    particles.push(new Particle(orbs[i].x, orbs[i].y, 'shieldBreak'));
                                }
                            } else {
                                plane.takeDamage(ORB_FUEL_DAMAGE); 
                                for(let p=0; p < 5; p++) {
                                    particles.push(new Particle(orbs[i].x, orbs[i].y, 'missileHit'));
                                }
                            }
                            orbs.splice(i, 1); // Orb is destroyed on impact
                        }
                    }


                    // 파워업 아이템 충돌
                    for (let i = powerUps.length - 1; i >= 0; i--) {
                        if (checkCollision(plane, powerUps[i].getForgivingRect())) { 
                            if (plane.magnetCharges > 0) {
                                plane.magnetCharges--;
                            }
                            if (powerUps[i].type === 'shield') {
                                plane.hasShield = true; 
                            } else if (powerUps[i].type === 'magnet') {
                                plane.magnetCharges += 3; 
                            }
                            powerUps.splice(i, 1);
                        }
                    }
                }

            } else if (gameState === 'menu') {
                plane.update(); 
                stars.forEach(star => star.update());
            } else if (gameState === 'dying') { 
                plane.update(); 
                boss.update(); 

                if (!explosionDone) {
                    // 1. 폭발 효과 (기존과 동일)
                    const planeRect = plane.getRect();
                    for (let i = 0; i < 30; i++) {
                        particles.push(new Particle(planeRect.x + planeRect.width / 2, planeRect.y + planeRect.height / 2, 'explosion'));
                    }
                    explosionDone = true;
                    
                    // 2. (추가) 서버 로직을 처리할 비동기 함수
                    async function handleGameOverLogic() {
                        const finalScore = score;

                        // 3. 로컬 최고 점수 저장 (기존과 동일)
                        if (finalScore > highScore) {
                            highScore = finalScore;
                localStorage.setItem('minigameLocalHighScore:wing-boss', highScore.toString());
                        }

                        let prefixText = "";

                        // 4. 점수 전송 (300점 이상일 때)
                        if (finalScore >= 300 && !scoreSubmitted) {

                            scoreSubmitted = true;
                            serverStatusMessage = '300점+! 점수 전송 중...';

                            try {
                                await submitScore(finalScore); // 전송이 끝날 때까지 대기

                                prefixText = "전송 실패. ";
                            }
                        } else {
                            isSubmitting = false; // 300점 미만이면 바로 잠금 해제
                            if (finalScore < 300) {
                                prefixText = "300점 미만은 전송되지 않습니다.\n\n";
                            }
                        }

                        // 5. '역대 최고' 기록 조회 (항상 실행)
                        await fetchAndDisplayGlobalScore(prefixText);
                        isSubmitting = false; // (중요) 잠금 해제
                    }

                    // 6. (추가) 비동기 함수 실행
                    handleGameOverLogic();
                }
            }




            if (gameState !== 'menu') {
                for (let i = particles.length - 1; i >= 0; i--) {
                    particles[i].update(); 
                    if (particles[i].life <= 0 || particles[i].radius <= 0) {
                        particles.splice(i, 1);
                    }
                }

                 if (particles.length === 0 || plane.y > HEIGHT + 50) {

                particles.forEach(p => p.draw(ctx));

                if (plane.magnetCharges > 0) {

            } else if (gameState === 'dying') {

                particles.forEach(p => p.draw(ctx)); 
                
                plane.draw(ctx); 

                drawTextWithShadow(ctx, `최고: ${highScore}`, FONT_30, WHITE, WIDTH - 20, 30, 'right', 'top');

                missiles.forEach(m => m.draw(ctx));
                rockets.forEach(r => r.draw(ctx)); 
                lasers.forEach(l => l.draw(ctx));  
                orbs.forEach(o => o.draw(ctx)); // [신규]
                powerUps.forEach(p => p.draw(ctx));
                particles.forEach(p => p.draw(ctx)); 
                
                plane.draw(ctx); 
                
                drawTextWithShadow(ctx, "게임 오버", FONT_70, GAME_OVER_RED, WIDTH / 2, HEIGHT / 2 - 80, 'center', 'middle');
                drawTextWithShadow(ctx, "SCORE: " + score, FONT_30, WHITE, WIDTH / 2, HEIGHT / 2, 'center', 'middle'); // [Y좌표 살짝 수정]

                // --- (추가) WingTap2의 버튼 및 서버 메시지 그리기 ---

                                    mouseY > RESTART_BTN_RECT.y && mouseY < RESTART_BTN_RECT.y + RESTART_BTN_RECT.h);
                const lobbyHover = (mouseX > LOBBY_BTN_RECT.x && mouseX < LOBBY_BTN_RECT.x + LOBBY_BTN_RECT.w &&

                // [WingBoss 폰트 스타일에 맞게 FONT_24 사용, Y좌표 조정]
                drawMultilineTextWithShadow(ctx, serverStatusMessage, FONT_24, THRUST_YELLOW, WIDTH / 2, HEIGHT / 2 + 80, 'center', 'middle', 20);
            }

            if (gameDisposed) return;
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // --- 이벤트 리스너 ---
        // (모든 이벤트 리스너 기존과 동일)
        let animationFrameId = 0;
        let gameDisposed = false;
        
        const handleInput = (e) => {
	     if (isSubmitting) return;
             if (gameState === 'playing') { 
                if(plane.applyThrust()) { 
                    particles.push(new Particle(plane.x, plane.y + plane.height / 2, 'thrust'));
                }
            } else if (gameState === 'gameOver') { 
                startGame(); 
            }
            if (e) e.preventDefault(); 
        };
        
        const handleWindowMousemove = (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = (e.clientX - rect.left) * (WIDTH / rect.width);
            mouseY = (e.clientY - rect.top) * (HEIGHT / rect.height);
        };

        const startNewGame = (e) => {

            framesElapsed = 0; 
            score = 0;
            plane.yVel = 0;
            if (plane.applyThrust()) {
                particles.push(new Particle(plane.x, plane.y + plane.height / 2, 'thrust'));
            }
            if(e) e.preventDefault();
        };

        const handleWindowKeydown = (e) => {
            if (e.code === 'Space') {
                if (gameState === 'menu') {
                    startNewGame(e);
                } else {
                    handleInput(e);
                }
            }
            if (gameState === 'menu') {
                if (e.code === 'ArrowLeft') changePlane(-1);
                else if (e.code === 'ArrowRight') changePlane(1);
            }
        };
        
        const handleMenuClick = (clickX, clickY) => {
            if (gameState !== 'menu') return false;

            const leftChangeHitbox = { x: WIDTH/2 - 250, y: HEIGHT/2 + 40, w: 150, h: 80 };
            const rightChangeHitbox = { x: WIDTH/2 + 100, y: HEIGHT/2 + 40, w: 150, h: 80 };

            const leftHit = (clickX > leftChangeHitbox.x && clickX < leftChangeHitbox.x + leftChangeHitbox.w &&
                             clickY > leftChangeHitbox.y && clickY < leftChangeHitbox.y + leftChangeHitbox.h);
            const rightHit = (clickX > rightChangeHitbox.x && clickX < rightChangeHitbox.x + rightChangeHitbox.w &&
                              clickY > rightChangeHitbox.y && clickY < rightChangeHitbox.y + rightChangeHitbox.h);
            
            if (leftHit) {
                changePlane(-1);
                return true; 
            } else if (rightHit) {
                changePlane(1);
                return true; 
            }
            
            return false; 
        };

        const handleWindowMousedown = (e) => {
    if (e) e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const clickX = (e.clientX - rect.left) * (WIDTH / rect.width);
    const clickY = (e.clientY - rect.top) * (HEIGHT / rect.height);

    if (gameState === 'menu') {
        const arrowClicked = handleMenuClick(clickX, clickY);
        if (!arrowClicked) {
            startNewGame(e);
        }
    } else if (gameState === 'playing') {
         // 'playing' 상태일 때만 handleInput 호출 (연료 분사)
         handleInput(e); 
    } else if (gameState === 'gameOver') {
        // 'gameOver' 상태일 때는 버튼 로직만 직접 처리

        if (isSubmitting) return; // 전송 중이면 아무것도 안 함

        // RESTART 버튼 클릭 확인
        if (clickX > RESTART_BTN_RECT.x && clickX < RESTART_BTN_RECT.x + RESTART_BTN_RECT.w &&
            clickY > RESTART_BTN_RECT.y && clickY < RESTART_BTN_RECT.y + RESTART_BTN_RECT.h) {
            startGame(); // 버튼을 눌렀을 때만 재시작
        }

        // LOBBY 버튼 클릭 확인
        if (clickX > LOBBY_BTN_RECT.x && clickX < LOBBY_BTN_RECT.x + LOBBY_BTN_RECT.w &&
            clickY > LOBBY_BTN_RECT.y && clickY < LOBBY_BTN_RECT.y + LOBBY_BTN_RECT.h) {
            returnToMinigameHub();
        }
    }
};
        
        const handleWindowTouchstart = (e) => {
    if (e) e.preventDefault(); 

    const rect = canvas.getBoundingClientRect();
    const touchX = (e.touches[0].clientX - rect.left) * (WIDTH / rect.width);
    const touchY = (e.touches[0].clientY - rect.top) * (HEIGHT / rect.height);

    if (gameState === 'menu') {
        const arrowTouched = handleMenuClick(touchX, touchY);
        if (!arrowTouched) { // [지난번 수정한 부분]
            startNewGame(e);
        }
    } else if (gameState === 'playing') {
         // 'playing' 상태일 때만 handleInput 호출 (연료 분사)
         handleInput(e);
    } else if (gameState === 'gameOver') {
        // 'gameOver' 상태일 때는 버튼 로직만 직접 처리

        if (isSubmitting) return; // 전송 중이면 아무것도 안 함

        // RESTART 버튼 터치 확인
        if (touchX > RESTART_BTN_RECT.x && touchX < RESTART_BTN_RECT.x + RESTART_BTN_RECT.w &&
            touchY > RESTART_BTN_RECT.y && touchY < RESTART_BTN_RECT.y + RESTART_BTN_RECT.h) {
            startGame(); // 버튼을 눌렀을 때만 재시작
        }

        // LOBBY 버튼 터치 확인
        if (touchX > LOBBY_BTN_RECT.x && touchX < LOBBY_BTN_RECT.x + LOBBY_BTN_RECT.w &&
            touchY > LOBBY_BTN_RECT.y && touchY < LOBBY_BTN_RECT.y + LOBBY_BTN_RECT.h) {
            returnToMinigameHub();
        }
    }
};

        // 화면 크기 조정
        function resizeCanvas() {
            const aspectRatio = WIDTH / HEIGHT; // 800 / 600
            let newWidth = window.innerWidth;
            let newHeight = window.innerHeight;
            const windowAspectRatio = newWidth / newHeight;

            if (windowAspectRatio > aspectRatio) {
                canvas.style.height = '100%';
                canvas.style.width = `${newHeight * aspectRatio}px`;
            } else {
                canvas.style.width = '100%';
                canvas.style.height = `${newWidth / aspectRatio}px`;
            }
        }
        function cleanupGame() {
            gameDisposed = true;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = 0;
            }
            window.removeEventListener('mousemove', handleWindowMousemove);
            window.removeEventListener('keydown', handleWindowKeydown);
            window.removeEventListener('mousedown', handleWindowMousedown);
            window.removeEventListener('touchstart', handleWindowTouchstart);
            window.removeEventListener('resize', resizeCanvas);
            window.removeEventListener('beforeunload', cleanupGame);
        }

        window.addEventListener('mousemove', handleWindowMousemove);
        window.addEventListener('keydown', handleWindowKeydown);
        window.addEventListener('mousedown', handleWindowMousedown);
        window.addEventListener('touchstart', handleWindowTouchstart, { passive: false });
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('beforeunload', cleanupGame);
        resizeCanvas(); 

        // --- 게임 시작 ---
        startGame();
        gameLoop();
    </script>
</body>
</html>
