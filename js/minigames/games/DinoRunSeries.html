    <script>
        (function () {
            'use strict';

            const params = new URLSearchParams(window.location.search);
            const isPreviewMode = params.get('preview') === '1';

            const MODES = {
                base: {
                    title: 'DINO RUN',
                    sourceId: 'source-base'
                },
                extended: {
                    title: 'DINO RUN 2',
                    sourceId: 'source-extended'
                },
                hard: {
                    title: 'DINO RUN HARD',
                    sourceId: 'source-hard'
                }
            };

            const home = document.getElementById('series-home');
            const player = document.getElementById('series-player');
            const frame = document.getElementById('game-frame');
            const triggers = Array.from(document.querySelectorAll('[data-mode]'));

            function getOuterLeaderboard() {
                try {
                    if (window.parent && window.parent !== window && window.parent.LivelySam?.Leaderboard) {
                        return window.parent.LivelySam.Leaderboard;
                    }
                } catch {}
                return window.LivelySam?.Leaderboard || null;
            }

            function getSource(modeKey) {
                const mode = MODES[modeKey];
                if (!mode) return '';
                return document.getElementById(mode.sourceId)?.value || '';
            }

            function replaceStorageReference(source, storageExpr) {
                return source.replace(/\blocalStorage\b/g, storageExpr);
            }

            function buildRuntimeSource(modeKey) {
                const source = getSource(modeKey);
                if (!source) return '';
                const runtimeSource = replaceStorageReference(source, 'window.parent.localStorage');
                const runtimeAddon = `
<style>
    .restart-btn,
    .back-btn {
        position: relative !important;
        overflow: hidden !important;
        border-radius: 16px !important;
        border: 1px solid rgba(255,255,255,0.22) !important;
        box-shadow: 0 10px 24px rgba(0,0,0,0.16) !important;
        text-shadow: 0 1px 2px rgba(0,0,0,0.18) !important;
        transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease !important;
    }

    .restart-btn {
        background:
            linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.03)),
            linear-gradient(145deg, #1f8bff, #005dc8) !important;
    }

    .back-btn {
        background:
            linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02)),
            linear-gradient(145deg, #7b8798, #4b5563) !important;
    }

    .restart-btn:hover,
    .back-btn:hover {
        transform: translateY(-2px) !important;
        box-shadow: 0 14px 28px rgba(0,0,0,0.2) !important;
        filter: saturate(1.05) !important;
    }
</style>`;
                return runtimeSource.replace('</body>', `${runtimeAddon}</body>`);
            }

            function buildPreviewSource(modeKey) {
                const source = getSource(modeKey);
                if (!source) return '';

                const forcedPreview = replaceStorageReference(source, 'window.parent.LivelySamPreviewStorage').replace(
                    /const IS_PREVIEW_MODE = new URLSearchParams\(window\.location\.search\)\.get\('preview'\) === '1';/,
                    "const IS_PREVIEW_MODE = true;"
                );

                const previewAddon = `
<style>
    h1,
    .info-panel,
    .overlay,
    .restart-btn,
    .back-btn {
        display: none !important;
    }

    body {
        justify-content: center !important;
        align-items: center !important;
        overflow: hidden !important;
    }

    #game-1-wrapper,
    #game-2-wrapper {
        width: 100vw !important;
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
    }

    #game-container-g1,
    #game-container-g2 {
        width: 100vw !important;
        height: 100vh !important;
        max-width: none !important;
        max-height: none !important;
    }

    #game-canvas-g1,
    #game-canvas-g2 {
        width: 100% !important;
        height: 100% !important;
    }
</style>
<script>
    (function () {
        let previewTimer = 0;

        function pressSpace() {
            document.dispatchEvent(new KeyboardEvent('keydown', {
                key: ' ',
                code: 'Space',
                bubbles: true
            }));
        }

        function scheduleNext() {
            previewTimer = window.setTimeout(() => {
                pressSpace();
                scheduleNext();
            }, 900 + Math.random() * 700);
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.setTimeout(() => {
                pressSpace();
                scheduleNext();
            }, 260);
        }, { once: true });

        window.addEventListener('beforeunload', () => {
            window.clearTimeout(previewTimer);
        });
    })();
<\/script>`;

                return forcedPreview.replace('</body>', `${previewAddon}</body>`);
            }

            function updateUrl(modeKey) {
                if (isPreviewMode) return;
                const next = new URL(window.location.href);
                next.searchParams.delete('preview');
                next.searchParams.delete('mode');
                if (modeKey) {
                    next.searchParams.set('mode', modeKey);
                }
                window.history.replaceState({}, '', next.toString());
            }

            function showHome() {
                player.hidden = true;
                home.hidden = false;
                frame.removeAttribute('src');
                frame.removeAttribute('srcdoc');
                updateUrl('');
            }

            function openMode(modeKey) {
                const source = buildRuntimeSource(modeKey);
                if (!source) return;
                home.hidden = true;
                player.hidden = false;
                frame.srcdoc = source;
                updateUrl(modeKey);
            }

            function startPreviewLoop() {
                const previewFrame = document.getElementById('preview-base');
                if (previewFrame) {
                    previewFrame.srcdoc = buildPreviewSource('base');
                }
            }

            window.LivelySam = window.LivelySam || {};
            window.LivelySamPreviewStorage = {
                getItem() { return null; },
                setItem() {},
                removeItem() {},
                clear() {},
                key() { return null; },
                get length() { return 0; }
            };
            const outerLeaderboard = getOuterLeaderboard();
            if (outerLeaderboard) {
                window.LivelySam.Leaderboard = outerLeaderboard;
            }
            window.LivelySam.MinigamesHub = window.LivelySam.MinigamesHub || {};
            window.LivelySam.MinigamesHub.closeRunner = showHome;

            triggers.forEach((node) => {
                node.addEventListener('click', () => {
                    if (isPreviewMode) return;
                    openMode(node.dataset.mode);
                });
            });

            document.addEventListener('keydown', (event) => {
                if (event.altKey || event.ctrlKey || event.metaKey) return;
                if (isPreviewMode) return;
                if (event.key === 'Escape' && !player.hidden) {
                    event.preventDefault();
                    showHome();
                    return;
                }
                if (event.key === '1') openMode('base');
                if (event.key === '2') openMode('extended');
                if (event.key === '3') openMode('hard');
            });

            if (isPreviewMode) {
                document.body.classList.add('preview-mode');
            }

            startPreviewLoop();

            const initialMode = params.get('mode');
            if (!isPreviewMode && initialMode && MODES[initialMode]) {
                openMode(initialMode);
            }
        })();
    </script>
