<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dino Run Series</title>
    <style>
        html {
            font-size: clamp(12px, calc(10px + 0.5vw), 16px);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
                Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(-45deg, #e6f7ff, #fff0f0, #f0f8ff, #f0fff0);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            color: #555;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            margin: 0;
            touch-action: none;
            transition: background 0.5s ease;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #series-home,
        #series-player {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #series-home[hidden],
        #series-player[hidden] {
            display: none !important;
        }

        h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 10px;
            transition: color 0.5s ease;
        }

        #series-info {
            display: flex;
            justify-content: space-between;
            width: 600px;
            max-width: 90vw;
            margin-bottom: 5px;
            font-size: 1.15rem;
            font-weight: bold;
            color: #555;
        }

        #series-stage {
            position: relative;
            width: 600px;
            height: 200px;
            max-width: 90vw;
            max-height: 40vh;
            padding: 0;
        }

        .stage-pane {
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 100%;
            border: 0;
            padding: 0;
            background: transparent;
            cursor: pointer;
            border-radius: 18px;
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.1);
        }

        .preview-frame {
            width: 100%;
            height: 100%;
            display: block;
            border: 0;
            background: #fff;
            pointer-events: none;
        }

        #series-actions {
            width: 600px;
            max-width: 90vw;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin-top: 18px;
        }

        .mode-btn {
            position: relative;
            overflow: hidden;
            font-size: 1.08rem;
            font-weight: bold;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.22);
            padding: 15px 0 13px;
            width: 100%;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(0,0,0,0.16);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            line-height: 1.3;
            text-shadow: 0 1px 2px rgba(0,0,0,0.18);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.03)),
                linear-gradient(145deg, #1f8bff, #005dc8);
        }

        .mode-btn::before {
            content: "";
            position: absolute;
            top: 1px;
            left: 1px;
            right: 1px;
            height: 48%;
            border-radius: 15px 15px 12px 12px;
            background: linear-gradient(180deg, rgba(255,255,255,0.28), rgba(255,255,255,0));
            pointer-events: none;
        }

        .mode-btn .mode-btn-title,
        .mode-btn .mode-btn-sub {
            position: relative;
            z-index: 1;
            display: block;
        }

        .mode-btn .mode-btn-title {
            letter-spacing: 0.02em;
        }

        .mode-btn .mode-btn-sub {
            margin-top: 2px;
            font-size: 0.74rem;
            font-weight: 600;
            opacity: 0.92;
            letter-spacing: 0.08em;
        }

        .mode-btn:hover,
        .mode-btn:focus-visible,
        .stage-pane:hover,
        .stage-pane:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(0,0,0,0.2);
            filter: saturate(1.05);
            outline: none;
        }

        .mode-btn[data-mode="extended"] {
            background:
                linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.03)),
                linear-gradient(145deg, #26a7cf, #0c6f9b);
        }

        .mode-btn[data-mode="hard"] {
            background:
                linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.02)),
                linear-gradient(145deg, #da3025, #8a140f);
        }

        #series-hint {
            margin-top: 12px;
            font-size: 0.95rem;
            color: #666;
            text-align: center;
        }

        body.preview-mode h1,
        body.preview-mode #series-info,
        body.preview-mode #series-actions,
        body.preview-mode #series-hint {
            display: none;
        }

        body.preview-mode #series-stage {
            width: 100vw;
            max-width: min(96vw, 980px);
            height: min(34vw, 250px);
            max-height: 48vh;
        }

        #series-player {
            position: fixed;
            inset: 0;
            z-index: 20;
            background: #fff;
        }

        #game-frame {
            width: 100vw;
            height: 100vh;
            border: 0;
            display: block;
            background: #fff;
        }

        @media (max-width: 640px) {
            #series-stage,
            #series-actions,
            #series-info {
                width: 94vw;
                max-width: 94vw;
            }

            #series-actions {
                grid-template-columns: 1fr;
            }

            #series-stage {
                height: 180px;
            }
        }
    </style>
</head>
<body>
    <div id="series-home">
        <h1>DINO RUN SERIES</h1>
        <div id="series-info">
            <div>모드 선택</div>
            <div>3개 게임 통합</div>
        </div>
        <div id="series-stage" aria-label="다이노 시리즈 선택 화면">
            <button type="button" class="stage-pane" data-mode="base" aria-label="Dino Run 실행">

        <div id="series-actions">
            <button type="button" class="mode-btn" data-mode="base">
                <span class="mode-btn-title">DINO RUN</span>

        </div>
        <div id="series-hint">클릭 또는 숫자키 1, 2, 3으로 시작할 수 있습니다.</div>
    </div>

    <div id="series-player" hidden>
        <iframe id="game-frame" title="Dino Run Series Game"></iframe>
    </div>

    <textarea id="source-base" hidden><!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dino Jump 1</title>
    <style>
        /* --- 1. 글로벌 스타일 --- */
        html {
            font-size: clamp(12px, calc(10px + 0.5vw), 16px);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
                Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(-45deg, #e6f7ff, #fff0f0, #f0f8ff, #f0fff0);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            color: #555;

        @keyframes gradientBG {

        h1 { font-size: 2.5rem; color: #333; margin-bottom: 10px; transition: color 0.5s ease; }

        /* --- 버튼 공통 스타일 --- */

        /* --- 2. Game 1 (DinoGame_1) 스타일 --- */
        #game-1-wrapper { 
            display: flex;

        }
        #game-1-wrapper .info-panel {
            display: flex; justify-content: space-between;

        #score-display-g1 { color: #333; transition: color 0.5s ease; }

        body.night-mode #score-display-g1 { color: #eee; }

        #game-1-wrapper .overlay {

<body>

    <div id="game-1-wrapper">
        <h1>DINO RUN</h1>
        <div class="info-panel">
            <div id="score-display-g1">점수: 0</div>
            <div id="highscore-display-g1">최고: 0</div>
        </div>
        <div id="game-container-g1">
            <div id="start-overlay-g1" class="overlay">
                <div>JUMP!</div>
                <p>Spacebar를 눌러 시작(터치, 클릭 가능)</p>
            </div>
            <div id="game-over-overlay-g1" class="overlay">
                <div>게임 오버</div>
                <p id="global-highscore-display-g1"></p>
                <button class="restart-btn">재시작 (Spacebar)</button>
                <button class="back-btn">로비로 돌아가기</button> </div>
            <canvas id="game-canvas-g1" width="600" height="200"></canvas>
        </div>
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            function returnToMinigameHub() {
                try {
                    if (window.parent && window.parent !== window && window.parent.LivelySam?.MinigamesHub?.closeRunner) {
                        window.parent.LivelySam.MinigamesHub.closeRunner();
                        return;
                    }
                } catch {}
                window.location.href = 'index.html';
            }

	    // --- 0. Game 1 URL ---
            const MINIGAME_ID = 'dino-run-1';
            const IS_PREVIEW_MODE = new URLSearchParams(window.location.search).get('preview') === '1';

            function getLeaderboardBridge() {
                if (IS_PREVIEW_MODE) {
                    return null;
                }
                try {
                    if (window.parent && window.parent !== window && window.parent.LivelySam?.Leaderboard) {
                        return window.parent.LivelySam.Leaderboard;
                    }
                } catch {}
                return window.LivelySam?.Leaderboard || null;
            }
            
            // --- 1. 글로벌 변수 및 공통 요소 ---
            let game1Instance = null; 
            const body = document.body;
            const game1Wrapper = document.getElementById('game-1-wrapper');

            // --- 3. Game 1 (DinoGame_1) 실행 함수 ---
            function launchGame1(username) {
                if (game1Instance) {
                    // 이전 인스턴스 정리 (필요시)
                    if (game1Instance.loop) cancelAnimationFrame(game1Instance.loop);
                    document.removeEventListener('keydown', game1Instance.keyHandler);
                    document.removeEventListener('mousedown', game1Instance.mouseHandler);
                    document.removeEventListener('touchstart', game1Instance.touchHandler);
                }
                game1Instance = {}; 
                const gameUsername = username; 
                
                const canvas = game1Wrapper.querySelector('#game-canvas-g1');
                const ctx = canvas.getContext('2d');
                
                const scoreDisplay = game1Wrapper.querySelector('#score-display-g1');
                const highscoreDisplay = game1Wrapper.querySelector('#highscore-display-g1');
                const startOverlay = game1Wrapper.querySelector('#start-overlay-g1');
                const gameOverOverlay = game1Wrapper.querySelector('#game-over-overlay-g1');
                const globalHighscoreDisplay = game1Wrapper.querySelector('#global-highscore-display-g1');
                
                // (수정) 뒤로가기 버튼 리스너 -> 허브로 복귀
                const backBtnG1 = game1Wrapper.querySelector('.back-btn');
                backBtnG1.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    returnToMinigameHub();
                });

                const dinoIcon = '🦖';
                const cactusIcons = ['🌵', '🌵🌵'];
                const iconSize = 30;
                const groundY = canvas.height - 2; 
                const playerX = 50;
                const jumpForce = 12;
                const gravity = 0.7;
                const initialSpeed = 5;
                const speedIncrease = 0.001;
                const nightModeThreshold = 200;

                let player;
                let obstacles = [];
                let stars = []; 
                let score = 0;
                let localHighScore = 0; 
                let globalHighScoreData = { score: 0, name: 'N/A' }; 
                let gameSpeed = initialSpeed;
                let gameState = 'lobby'; 
                let obstacleSpawnTimer = 0;
                let gameLoop; 
                let isNightMode = false;
                let isSubmitting = false; 

                // --- 클래스 정의 (Player, Obstacle, Star) ---
                class Player {
                    constructor(x, y) {
                        this.x = x; this.y = y; 
                        this.width = iconSize; this.height = iconSize;
                        this.dy = 0; this.isJumping = false;
                    }
                    draw() {
                        ctx.save(); 
                        ctx.translate(this.x + (this.width / 2), this.y); 
                        ctx.scale(-1, 1);
                        ctx.fillStyle = isNightMode ? '#eee' : '#555';
                        ctx.font = `${iconSize}px Arial`;
                        ctx.textBaseline = 'bottom'; ctx.textAlign = 'center'; 
                        ctx.fillText(dinoIcon, 0, 5); 
                        ctx.restore(); 
                    }
                    update() {
                        this.dy += gravity; this.y += this.dy;
                        if (this.y > groundY) { this.y = groundY; this.dy = 0; this.isJumping = false; }
                    }
                    jump() { if (!this.isJumping) { this.dy = -jumpForce; this.isJumping = true; } }
                }
                class Obstacle {
                    constructor(x, y, icon) {
                        this.x = x; this.y = y; this.icon = icon;
                        this.width = iconSize * (icon.length / 2); this.height = iconSize;
                    }
                    draw() {
                        ctx.fillStyle = isNightMode ? '#eee' : '#555';
                        ctx.font = `${iconSize}px Arial`;
                        ctx.textBaseline = 'bottom'; ctx.textAlign = 'start';
                        ctx.fillText(this.icon, this.x, this.y+4);
                    }
                    update() { this.x -= gameSpeed; }
                }
                class Star {
                    constructor() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * (canvas.height - 50);
                        this.radius = Math.random() * 1.5;
                        this.opacity = Math.random();
                        this.fadeDirection = (Math.random() > 0.5) ? 'in' : 'out';
                    }
                    draw() {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                        ctx.fill();
                    }
                    update() { 
                        this.x -= (gameSpeed * 0.2);
                        if (this.x < 0) this.x = canvas.width;
                        if (this.fadeDirection === 'in') {
                            this.opacity += 0.005; if (this.opacity > 1) this.fadeDirection = 'out';
                        } else {
                            this.opacity -= 0.005; if (this.opacity < 0) this.fadeDirection = 'in';
                        }
                    }
                }
                // --- 핵심 함수 ---
                async function fetchGlobalHighScore() {
                    const leaderboard = getLeaderboardBridge();
                    if (!leaderboard?.getTopEntry) {
                        return { score: 0, name: 'N/A' };
                    }

                    try {
                        const topEntry = await leaderboard.getTopEntry({ gameId: MINIGAME_ID });
                        if (topEntry) {
                            return {
                                score: topEntry.score || 0,
                                name: topEntry.nickname || 'Unknown'
                            };
                        }
                    } catch (error) {
                        console.error("G1: 최고 점수 불러오기 실패:", error);
                    }

                    return { score: 0, name: 'N/A' }; 
                }
                async function updateGlobalHighScore() {
                    globalHighScoreData = await fetchGlobalHighScore();
                }
                function initGame() {
      localHighScore = localStorage.getItem('minigameLocalHighScore:dino-run-1')
        || localStorage.getItem('dinoLocalHighScore_g1')
        || 0;
                    highscoreDisplay.textContent = `최고: ${Math.floor(localHighScore)}`;
                    player = new Player(playerX, groundY);
                    obstacles = []; stars = [];
                    score = 0; gameSpeed = initialSpeed;
                    gameState = 'ready'; 
                    obstacleSpawnTimer = 100;
                    isNightMode = false; isSubmitting = false; 
                    for (let i=0; i < 50; i++) stars.push(new Star());
                    applyNightMode(false);
                    startOverlay.style.display = 'flex'; 
                    gameOverOverlay.style.display = 'none';
                    if (!game1Instance.loop) { game1Instance.loop = requestAnimationFrame(animate); }
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    player.draw();
                    scoreDisplay.textContent = `점수: 0`;
                }
                function startGame() {
                    if ((gameState === 'ready' || gameState === 'gameOver') && !isSubmitting) {
                        if (gameState === 'gameOver') initGame(); 
                        gameState = 'playing'; 
                        startOverlay.style.display = 'none';
                        gameOverOverlay.style.display = 'none';
                    }
                }
                function spawnObstacle() {
                    const icon = cactusIcons[Math.floor(Math.random() * cactusIcons.length)];
                    obstacles.push(new Obstacle(canvas.width + 50, groundY, icon));
                    obstacleSpawnTimer = (Math.random() * 100 + 50) * (initialSpeed / gameSpeed);
                }
                function applyNightMode(enable) {
                    isNightMode = enable;
                    if (enable) body.classList.add('night-mode');
                    else body.classList.remove('night-mode');
                }
                function animate() {
                    if (!game1Instance) return; 
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    if (isNightMode) { stars.forEach(star => { star.update(); star.draw(); }); }
                    if (gameState === 'playing') {
                        score += 0.1; gameSpeed += speedIncrease;
                        scoreDisplay.textContent = `점수: ${Math.floor(score)}`;
                        const scoreBlock = Math.floor(score / nightModeThreshold);
                        const shouldBeNight = (scoreBlock % 2 === 1); 
                        if (shouldBeNight && !isNightMode) applyNightMode(true);
                        else if (!shouldBeNight && isNightMode) applyNightMode(false);
                        obstacleSpawnTimer--;
                        if (obstacleSpawnTimer <= 0) spawnObstacle();
                        for (let i = obstacles.length - 1; i >= 0; i--) {
                            let obs = obstacles[i]; obs.update(); obs.draw();
                            if (obs.x + obs.width < 0) obstacles.splice(i, 1);
                        }
                        player.update(); player.draw();
                        checkCollisions();
                    } else { 
                        player.draw();
                        obstacles.forEach(obs => obs.draw());
                    }
                    game1Instance.loop = requestAnimationFrame(animate); 
                }
                function checkCollisions() {
                    for (let obs of obstacles) {
                        const padding = 5; 
                        let playerTop = player.y - player.height;
                        let playerBottom = player.y;
                        let obsTop = obs.y - obs.height;
                        let obsBottom = obs.y;
                        if (player.x < obs.x + obs.width - padding &&
                            player.x + player.width - padding > obs.x &&
                            playerTop < obsBottom && 
                            playerBottom > obsTop)   
                        {
                            triggerGameOver(); break;
                        }
                    }
                }
                function triggerGameOver() {
                    gameState = 'gameOver';
                    gameOverOverlay.style.display = 'flex';
                    const finalScore = Math.floor(score);
                    if (finalScore > localHighScore) {
                        localHighScore = finalScore;
          localStorage.setItem('minigameLocalHighScore:dino-run-1', localHighScore);
                        highscoreDisplay.textContent = `최고: ${localHighScore}`;
                    }
                    
                    const pElement = gameOverOverlay.querySelector('p#global-highscore-display-g1');
                    pElement.textContent = ''; 

                    if (finalScore >= 200) {
                        isSubmitting = true; 
                        pElement.textContent = '200점 이상! 점수 전송 중...';
                        submitAndFetchScores(finalScore, pElement); 
                    } else {
                        isSubmitting = false; 
                        pElement.textContent = '200점 미만은 기록되지 않습니다.';
                    }
                }
                async function submitScore(finalScore) {
                    const leaderboard = getLeaderboardBridge();
                    if (!leaderboard?.submitScore) {
                        throw new Error('Firebase leaderboard bridge unavailable');
                    }

                    await leaderboard.submitScore({
                        gameId: MINIGAME_ID,
                        nickname: gameUsername,
                        score: finalScore
                    });
                }
                async function fetchAndDisplayGlobalScore(pElement, prefixText = '') {
                    const leaderboard = getLeaderboardBridge();
                    if (!leaderboard?.getTopEntry) {
                        pElement.textContent = prefixText + '명예의 전당 연결을 사용할 수 없습니다.';
                        return;
                    }

                    try {
                        const topEntry = await leaderboard.getTopEntry({ gameId: MINIGAME_ID });
                        if (topEntry) {
                            globalHighScoreData.score = topEntry.score || 0;
                            globalHighScoreData.name = topEntry.nickname || gameUsername;

                            const rawName = topEntry.nickname || gameUsername;
                            const maskedName = leaderboard.maskNickname
                                ? leaderboard.maskNickname(rawName)
                                : (rawName.substring(0, 2) + '*'.repeat(Math.max(0, rawName.length - 2)));

                            pElement.textContent = prefixText + `역대 최고 점수: ${globalHighScoreData.score} (${maskedName})`;
                        } else {
                            pElement.textContent = prefixText + '아직 등록된 기록이 없습니다.';
                        }
                    } catch (error) {
                        console.error("G1 최고 점수 불러오기 실패:", error);
                        pElement.textContent = prefixText + '최고 점수 연결 오류';
                    }
                }
                async function submitAndFetchScores(finalScore, pElement) {
                    let prefixText = '';

                    try {
                        await submitScore(finalScore);
                        prefixText = '점수 등록 완료! ';
                    } catch (error) {
                        console.error("G1 점수 전송 중 오류:", error);
                        prefixText = '점수 등록 실패. ';
                    } finally {
                        await fetchAndDisplayGlobalScore(pElement, prefixText);
                        isSubmitting = false;
                    }
                }
                
                // --- 이벤트 리스너 ---
                function handleGameAction() {
                    if (gameState === 'playing') player.jump();
                    else startGame(); 
                }
                function handleInput(e) {
                    if (e.key === ' ' || e.code === 'Space') {
                        e.preventDefault(); handleGameAction(); 
                    }
                }
                function handleMouseInput(e) {
                    if (e.target.closest('.back-btn')) { // (수정)
                        return;
                    }
                    e.preventDefault(); handleGameAction();
                }
                function handleTouchInput(e) {
                    if (e.target.closest('.back-btn')) { // (수정)
                        return;
                    }
                    e.preventDefault(); handleGameAction(); 
                }
                
                game1Instance.keyHandler = handleInput;
                game1Instance.mouseHandler = handleMouseInput;
                game1Instance.touchHandler = handleTouchInput;

                document.addEventListener('keydown', game1Instance.keyHandler);
                document.addEventListener('mousedown', game1Instance.mouseHandler); 
                document.addEventListener('touchstart', game1Instance.touchHandler, { passive: false }); 
                
                updateGlobalHighScore(); 
                initGame(); 
            }
            
            function resolveGameNickname() {
                try {
                    const parentNickname = window.parent && window.parent !== window && window.parent.LivelySam?.MinigamesHub?.getNickname?.();
                    if (parentNickname) return String(parentNickname).trim();
                } catch {}
                try {
                    const nickname = localStorage.getItem('minigameNickname');
                    if (nickname) return String(nickname).trim();
                } catch {}
                try {
                    const legacyNickname = localStorage.getItem('j_game_username');
                    if (legacyNickname) return String(legacyNickname).trim();
                } catch {}
                return 'Guest';
            }

            // --- (수정) 5. 자동 실행 로직 ---
            // 허브 닉네임 원문을 우선 사용합니다.
            const gameUsername = resolveGameNickname();
            console.log(gameUsername + "님이 Game 1을 시작합니다.");

            // launchGame1 함수를 즉시 호출합니다.
            launchGame1(gameUsername);

        }); 
    </script>
</body>
</html>

<html lang="ko">
<head>

        /* --- 3. Game 2 (DinoGame_2) 스타일 --- */
        #game-2-wrapper {

        #game-2-wrapper .overlay {

    </style>

<body>

    <div id="game-2-wrapper">
        <h1>DINO RUN 2</h1>
        <div class="info-panel">
            <div id="score-display-g2">점수: 0</div>
            <div id="highscore-display-g2">최고: 0</div>
        </div>
        <div id="game-container-g2">
            <div id="start-overlay-g2" class="overlay">
                <div>JUMP!</div>
                <p>Spacebar를 눌러 시작(터치, 클릭 가능)</p>
            </div>
            <div id="game-over-overlay-g2" class="overlay">
                <div>게임 오버</div>
                <p id="global-highscore-display-g2"></p>
                <button class="restart-btn">재시작 (Spacebar)</button>
                <button class="back-btn">로비로 돌아가기</button> </div>
            <canvas id="game-canvas-g2" width="600" height="200"></canvas>
        </div>
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            function returnToMinigameHub() {
                try {
                    if (window.parent && window.parent !== window && window.parent.LivelySam?.MinigamesHub?.closeRunner) {
                        window.parent.LivelySam.MinigamesHub.closeRunner();
                        return;
                    }
                } catch {}
                window.location.href = 'index.html';
            }

	    // --- 0. Game 2 URL ---
            const MINIGAME_ID = 'dino-run-2';
            const IS_PREVIEW_MODE = new URLSearchParams(window.location.search).get('preview') === '1';

            function getLeaderboardBridge() {
                if (IS_PREVIEW_MODE) {
                    return null;
                }
                try {
                    if (window.parent && window.parent !== window && window.parent.LivelySam?.Leaderboard) {
                        return window.parent.LivelySam.Leaderboard;
                    }
                } catch {}
                return window.LivelySam?.Leaderboard || null;
            }

            // --- 1. 글로벌 변수 및 공통 요소 ---
            let game2Instance = null; 
            const body = document.body;
            const game2Wrapper = document.getElementById('game-2-wrapper');
            
            // --- 4. Game 2 (DinoGame_2) 실행 함수 ---
            function launchGame2(username) {
                if (game2Instance) {
                    // 이전 인스턴스 정리 (필요시)
                    if (game2Instance.loop) cancelAnimationFrame(game2Instance.loop);
                    document.removeEventListener('keydown', game2Instance.keyHandler);
                    document.removeEventListener('mousedown', game2Instance.mouseHandler);
                    document.removeEventListener('touchstart', game2Instance.touchHandler);
                }
                game2Instance = {}; 
                const gameUsername = username; 
                
                const canvas = game2Wrapper.querySelector('#game-canvas-g2');
                const ctx = canvas.getContext('2d');
                
                const scoreDisplay = game2Wrapper.querySelector('#score-display-g2');
                const highscoreDisplay = game2Wrapper.querySelector('#highscore-display-g2');
                const startOverlay = game2Wrapper.querySelector('#start-overlay-g2');
                const gameOverOverlay = game2Wrapper.querySelector('#game-over-overlay-g2');
                const globalHighscoreDisplay = game2Wrapper.querySelector('#global-highscore-display-g2'); 
                
                // (수정) 뒤로가기 버튼 리스너 -> index.html로 이동
                const backBtnG2 = game2Wrapper.querySelector('.back-btn');
                backBtnG2.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    returnToMinigameHub();
                });

                const dinoIcon = '🦖';
                const cactusIcons = ['🌵', '🌵', '🌵', '🌵🌵', '🌵🌵', '🌵🌵🌵'];
                const meatIcon = '🥩'; 
                const birdIcon = '🕊️'; 

                const iconSize = 30;
                const groundY = canvas.height - 2; 
                const playerX = 50;
                const jumpForce = 12; 
                const gravity = 0.7;
                
                const initialSpeed = 6.354;
                const speedIncrease = 0.0012; 
                const nightModeThreshold = 200;

                let player;
                let obstacles = [], stars = [], items = [], hazards = [], effects = [], weatherParticles = []; 
                let score = 0, localHighScore = 0; 
                let globalHighScoreData = { score: 0, name: 'N/A' }; 
                let gameSpeed = initialSpeed;
                let gameState = 'lobby'; 
                let obstacleSpawnTimer = 0, itemSpawnTimer = 0, hazardSpawnTimer = 0;
                let lastWeatherSpawn = 0, scoreMilestone = 500; 
                let gameLoop; 
                let isNightMode = false, isSubmitting = false; 
                let combo = 0;

                // --- 클래스 정의 (Player, Obstacle, Item, Hazard, Effect, Star, WeatherParticle) ---
                class Player {
                    constructor(x, y) {
                        this.x = x; this.y = y; this.width = iconSize; this.height = iconSize;
                        this.dy = 0; this.isJumping = false; this.jumpForce = jumpForce; 
                    }
                    draw() {
                        ctx.save(); ctx.translate(this.x + (this.width / 2), this.y); ctx.scale(-1, 1);
                        ctx.fillStyle = isNightMode ? '#eee' : '#555'; ctx.font = `${iconSize}px Arial`;
                        ctx.textBaseline = 'bottom'; ctx.textAlign = 'center'; ctx.fillText(dinoIcon, 0, 5); ctx.restore(); 
                    }
                    update() {
                        this.dy += gravity; this.y += this.dy;
                        if (this.y > groundY) { this.y = groundY; this.dy = 0; this.isJumping = false; }
                    }
                    jump() { if (!this.isJumping) { this.dy = -this.jumpForce; this.isJumping = true; } }
                }
                class Obstacle { 
                    constructor(x, y, icon) {
                        this.x = x; this.y = y; this.icon = icon;
                        this.width = iconSize * (icon.length / 2); this.height = iconSize;
                    }
                    draw() {
                        ctx.fillStyle = isNightMode ? '#eee' : '#555'; ctx.font = `${iconSize}px Arial`;
                        ctx.textBaseline = 'bottom'; ctx.textAlign = 'start'; ctx.fillText(this.icon, this.x, this.y+4);
                    }
                    update() { this.x -= gameSpeed; }
                }
                class Item { 
                    constructor(x, y, icon, data, size) {
                        this.x = x; this.y = y; this.icon = icon; this.type = data.type; this.effect = data.effect;
                        this.value = data.value; this.size = size || iconSize; 
                        this.width = this.size; this.height = this.size; this.isHit = false; 
                    }
                    draw() {
                        ctx.fillStyle = isNightMode ? '#eee' : '#555'; ctx.font = `${this.size}px Arial`; 
                        ctx.textBaseline = 'bottom'; ctx.textAlign = 'start'; ctx.fillText(this.icon, this.x, this.y + 4);
                    }
                    update() { this.x -= gameSpeed; }
                }
                class Hazard { 
                    constructor(x, y, icon, points) {
                        this.x = x; this.baseY = y; this.y = y; this.icon = icon; this.points = points;
                        this.width = iconSize; this.height = iconSize;
                        this.animationTimer = Math.random() * 20; this.iconFrames = ['🕊️', '🦢']; this.isHit = false; 
                    }
                    draw() {
                        ctx.fillStyle = isNightMode ? '#eee' : '#555'; ctx.font = `${iconSize}px Arial`;
                        ctx.textBaseline = 'bottom'; ctx.textAlign = 'start'; ctx.fillText(this.icon, this.x, this.y); 
                    }
                    update() {
                        this.x -= gameSpeed; this.animationTimer++;
                        this.y = this.baseY + Math.sin(this.animationTimer * 0.1) * 5; 
                        this.icon = this.iconFrames[Math.floor(this.animationTimer / 10) % this.iconFrames.length];
                    }
                }
                class Effect {
                    constructor(x, y, text, color) {
                        this.x = x; this.y = y; this.text = text; this.color = color;
                        this.opacity = 1.0; this.duration = 60; 
                    }
                    update() { this.y -= 0.5; this.opacity -= 1.0 / this.duration; this.duration--; }
                    draw() {
                        ctx.save(); ctx.globalAlpha = this.opacity; ctx.fillStyle = this.color;
                        ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center';
                        ctx.fillText(this.text, this.x, this.y); ctx.restore();
                    }
                }
                class Star { 
                    constructor() {
                        this.x = Math.random() * canvas.width; this.y = Math.random() * (canvas.height - 50);
                        this.radius = Math.random() * 1.5; this.opacity = Math.random();
                        this.fadeDirection = (Math.random() > 0.5) ? 'in' : 'out';
                    }
                    draw() {
                        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`; ctx.fill();
                    }
                    update() { 
                        this.x -= (gameSpeed * 0.2); 
                        if (this.x < 0) this.x = canvas.width;
                        if (this.fadeDirection === 'in') { this.opacity += 0.005; if (this.opacity > 1) this.fadeDirection = 'out';
                        } else { this.opacity -= 0.005; if (this.opacity < 0) this.fadeDirection = 'in'; }
                    }
                }
                class WeatherParticle { 
                    constructor() {
                        this.x = Math.random() * canvas.width; this.y = -10; this.icon = '❄️'; 
                        this.speed = Math.random() * 1 + 1; this.size = 5 + Math.random() * 5; 
                    }
                    update() {
                        this.y += this.speed; this.x -= (gameSpeed * 0.1); 
                        if (this.x < -10) this.x = canvas.width + 10;
                    }
                    draw() { ctx.font = `${this.size}px Arial`; ctx.fillText(this.icon, this.x, this.y); }
                }
                
                // --- 핵심 함수 ---
                function drawGround() {
                    ctx.beginPath(); ctx.moveTo(0, groundY + 1); ctx.lineTo(canvas.width, groundY + 1);
                    ctx.strokeStyle = isNightMode ? '#aaa' : '#555'; ctx.lineWidth = 3; ctx.stroke();
                }
                async function fetchGlobalHighScore() {
                    const leaderboard = getLeaderboardBridge();
                    if (!leaderboard?.getTopEntry) {
                        return { score: 0, name: 'N/A' };
                    }

                    try {
                        const topEntry = await leaderboard.getTopEntry({ gameId: MINIGAME_ID });
                        if (topEntry) {
                            return {
                                score: topEntry.score || 0,
                                name: topEntry.nickname || 'Unknown'
                            };
                        }
                    } catch (error) {
                        console.error("G2: 최고 점수 불러오기 실패:", error);
                    }

                    return { score: 0, name: 'N/A' }; 
                }
                async function updateGlobalHighScore() {
                    globalHighScoreData = await fetchGlobalHighScore();
                }
                function initGame() {
      localHighScore = localStorage.getItem('minigameLocalHighScore:dino-run-2')
        || localStorage.getItem('dinoLocalHighScore_g2')
        || 0;
                    highscoreDisplay.textContent = `최고: ${Math.floor(localHighScore)}`;
                    player = new Player(playerX, groundY);
                    obstacles = []; stars = []; items = []; 
                    hazards = []; effects = []; weatherParticles = []; 
                    score = 0; gameSpeed = initialSpeed; gameState = 'ready'; 
                    obstacleSpawnTimer = 95; itemSpawnTimer = 400; hazardSpawnTimer = 180; 
                    scoreMilestone = 500; isNightMode = false; isSubmitting = false; combo = 0;
                    for (let i=0; i < 50; i++) stars.push(new Star());
                    applyNightMode(false); body.classList.remove('dazzling'); 
                    startOverlay.style.display = 'flex'; gameOverOverlay.style.display = 'none';
                    if (!game2Instance.loop) { game2Instance.loop = requestAnimationFrame(animate); }
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    drawGround(); player.draw();
                    scoreDisplay.textContent = `점수: 0`;
                }
                function startGame() {
                    if ((gameState === 'ready' || gameState === 'gameOver') && !isSubmitting) {
                        if (gameState === 'gameOver') initGame(); 
                        gameState = 'playing'; 
                        startOverlay.style.display = 'none';
                        gameOverOverlay.style.display = 'none';
                    }
                }
                function spawnObstacle() { 
                    const icon = cactusIcons[Math.floor(Math.random() * cactusIcons.length)]; 
                    obstacles.push(new Obstacle(canvas.width + 50, groundY, icon));
                    obstacleSpawnTimer = (Math.random() * 100 + 70) * (initialSpeed / gameSpeed);
                }
                function spawnItem() { 
                    const meatData = { type: 'points', effect: 'score', value: 10 };
                    items.push(new Item(canvas.width + 100, groundY, meatIcon, meatData, 25)); 
                    itemSpawnTimer = (Math.random() * 285 + 225) * (initialSpeed / gameSpeed); 
                }
                function spawnHazard() { 
                    const birdY = (Math.random() > 0.5) ? groundY - 35 : groundY - 65; 
                    hazards.push(new Hazard(canvas.width + 50, birdY, birdIcon, -50)); 
                    hazardSpawnTimer = (Math.random() * 210 + 170) * (initialSpeed / gameSpeed);
                }
                function applyNightMode(enable) {
                    isNightMode = enable;
                    if (enable) body.classList.add('night-mode');
                    else body.classList.remove('night-mode');
                }
                function triggerDazzlingEffect() {
                    body.classList.add('dazzling');
                    setTimeout(() => { body.classList.remove('dazzling'); }, 5000); 
                }
                function animate() {
                    if (!game2Instance) return; 
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    drawGround();
                    for (let i = weatherParticles.length - 1; i >= 0; i--) {
                        let p = weatherParticles[i]; p.update(); p.draw();
                        if (p.y > canvas.height + 10) weatherParticles.splice(i, 1); 
                    }
                    if (isNightMode) { stars.forEach(star => { star.update(); star.draw(); }); }
                    if (gameState === 'playing') {
                        score += 0.1; gameSpeed += speedIncrease; 
                        scoreDisplay.textContent = `점수: ${Math.floor(score)}`;
                        const scoreBlockWeather = Math.floor(score / 100);
                        const shouldShowLeaves = (scoreBlockWeather % 2 === 1); 
                        if (shouldShowLeaves) {
                            lastWeatherSpawn++;
                            if (lastWeatherSpawn > 20) { weatherParticles.push(new WeatherParticle()); lastWeatherSpawn = 0; }
                        } else { if (weatherParticles.length > 0) weatherParticles = []; }
                        if (score > scoreMilestone) { triggerDazzlingEffect(); scoreMilestone += 500; }
                        const scoreBlock = Math.floor(score / nightModeThreshold);
                        const shouldBeNight = (scoreBlock % 2 === 1); 
                        if (shouldBeNight && !isNightMode) applyNightMode(true);
                        else if (!shouldBeNight && isNightMode) applyNightMode(false);
                        obstacleSpawnTimer--; if (obstacleSpawnTimer <= 0) spawnObstacle();
                        itemSpawnTimer--; if (itemSpawnTimer <= 0) spawnItem(); 
                        hazardSpawnTimer--; if (hazardSpawnTimer <= 0) spawnHazard();
                        for (let i = obstacles.length - 1; i >= 0; i--) {
                            let obs = obstacles[i]; obs.update(); obs.draw();
                            if (obs.x + obs.width < 0) obstacles.splice(i, 1);
                        }
                        for (let i = items.length - 1; i >= 0; i--) {
                            let item = items[i]; item.update(); item.draw();
                            if (item.x + item.width < 0) items.splice(i, 1);
                        }
                        for (let i = hazards.length - 1; i >= 0; i--) {
                            let haz = hazards[i]; haz.update(); haz.draw();
                            if (haz.x + haz.width < 0) hazards.splice(i, 1);
                        }
                        player.update(); player.draw();
                        for (let i = effects.length - 1; i >= 0; i--) {
                            let effect = effects[i]; effect.update(); effect.draw();
                            if (effect.duration <= 0) effects.splice(i, 1);
                        }
                        checkCollisions(); 
                    } else { 
                        player.draw(); obstacles.forEach(obs => obs.draw());
                        items.forEach(item => item.draw()); hazards.forEach(haz => haz.draw());
                        effects.forEach(effect => effect.draw()); weatherParticles.forEach(p => p.draw());
                    }
                    game2Instance.loop = requestAnimationFrame(animate); 
                }
                function isColliding(player, obj, padding) {
                    let playerTop = player.y - player.height; let playerBottom = player.y;
                    let objTop = obj.y - obj.height; let objBottom = obj.y;
                    if (obj instanceof Hazard) { objTop = obj.y - obj.height; objBottom = obj.y; }       
                    else { objTop = obj.y - obj.height; objBottom = obj.y; }
                    return ( player.x < obj.x + obj.width - padding &&
                             player.x + player.width - padding > obj.x &&
                             playerTop < objBottom && playerBottom > objTop );
                }
                function showEffect(x, y, text, color) { effects.push(new Effect(x, y, text, color)); }
                function checkCollisions() {
                    const padding = 5; 
                    for (let i = obstacles.length - 1; i >= 0; i--) {
                        let obs = obstacles[i];
                        if (isColliding(player, obs, padding)) {
                            showEffect(player.x, player.y - player.height, '쿵!', '#ff3300');
                            triggerGameOver(); return; 
                        }
                    }
                    for (let i = items.length - 1; i >= 0; i--) {
                        let item = items[i];
                        if (!item.isHit && isColliding(player, item, padding)) {
                            item.isHit = true; 
                            if (item.type === 'points') {
                                combo++; const pointsEarned = 10 * combo; score += pointsEarned; 
                                showEffect(player.x, player.y - player.height, `+${pointsEarned} (x${combo})`, '#00cc66');
                            }
                            scoreDisplay.textContent = `점수: ${Math.floor(score)}`; items.splice(i, 1); 
                        }
                    }
                    for (let i = hazards.length - 1; i >= 0; i--) {
                        let haz = hazards[i];
                        if (!haz.isHit && isColliding(player, haz, padding)) {
                            haz.isHit = true; score += haz.points; combo = 0; 
                            if (score < 0) { 
                                score = 0; scoreDisplay.textContent = `점수: 0`;
                                showEffect(player.x, player.y - player.height, 'GAME OVER', '#ff3300');
                                triggerGameOver(); return; 
                            }
                            scoreDisplay.textContent = `점수: ${Math.floor(score)}`;
                            showEffect(player.x, player.y - player.height, `${haz.points}`, '#ff3300');
                            hazards.splice(i, 1); 
                        }
                    }
                }
                function triggerGameOver() {
                    if (gameState === 'gameOver') return; 
                    gameState = 'gameOver';
                    gameOverOverlay.style.display = 'flex';
                    body.classList.remove('dazzling'); 
                    const finalScore = Math.floor(score);
                    if (finalScore > localHighScore) {
                        localHighScore = finalScore;
          localStorage.setItem('minigameLocalHighScore:dino-run-2', localHighScore);
                        highscoreDisplay.textContent = `최고: ${localHighScore}`;
                    }
                    
                    const pElement = gameOverOverlay.querySelector('p#global-highscore-display-g2');
                    pElement.textContent = ''; 

                    if (finalScore >= 200) {
                        isSubmitting = true; 
                        pElement.textContent = '200점 이상! 점수 전송 중...';
                        submitAndFetchScores(finalScore, pElement); 
                    } else {
                        isSubmitting = false; 
                        pElement.textContent = '200점 미만은 기록되지 않습니다.';
                    }
                }
                async function submitScore(finalScore) {
                    const leaderboard = getLeaderboardBridge();
                    if (!leaderboard?.submitScore) {
                        throw new Error('Firebase leaderboard bridge unavailable');
                    }

                    await leaderboard.submitScore({
                        gameId: MINIGAME_ID,
                        nickname: gameUsername,
                        score: finalScore
                    });
                }
                async function fetchAndDisplayGlobalScore(pElement, prefixText = '') {
                    const leaderboard = getLeaderboardBridge();
                    if (!leaderboard?.getTopEntry) {
                        pElement.textContent = prefixText + '명예의 전당 연결을 사용할 수 없습니다.';
                        return;
                    }

                    try {
                        const topEntry = await leaderboard.getTopEntry({ gameId: MINIGAME_ID });
                        if (topEntry) {
                            globalHighScoreData.score = topEntry.score || 0;
                            globalHighScoreData.name = topEntry.nickname || gameUsername;

                            const rawName = topEntry.nickname || gameUsername;
                            const maskedName = leaderboard.maskNickname
                                ? leaderboard.maskNickname(rawName)
                                : (rawName.substring(0, 2) + '*'.repeat(Math.max(0, rawName.length - 2)));

                            pElement.textContent = prefixText + `역대 최고 점수: ${globalHighScoreData.score} (${maskedName})`;
                        } else {
                            pElement.textContent = prefixText + '아직 등록된 기록이 없습니다.';
                        }
                    } catch (error) {
                        console.error("G2 최고 점수 불러오기 실패:", error);
                        pElement.textContent = prefixText + '최고 점수 연결 오류';
                    }
                }
                async function submitAndFetchScores(finalScore, pElement) { 
                    let prefixText = '';

                    try {
                        await submitScore(finalScore);
                        prefixText = '점수 등록 완료! ';
                    } catch (error) {
                        console.error("G2 점수 전송 중 오류:", error);
                        prefixText = '점수 등록 실패. ';
                    } finally {
                        await fetchAndDisplayGlobalScore(pElement, prefixText);
                        isSubmitting = false;
                    }
                }
                
                // --- 이벤트 리스너 ---
                function handleGameAction() {
                    if (gameState === 'playing') player.jump();
                    else startGame(); 
                }
                function handleInput(e) {
                    if (e.key === ' ' || e.code === 'Space') {
                        e.preventDefault(); handleGameAction(); 
                    }
                }
                function handleMouseInput(e) {
                    if (e.target.closest('.back-btn')) { // (수정)
                        return;
                    }
                    e.preventDefault(); handleGameAction();
                }
                function handleTouchInput(e) {
                    if (e.target.closest('.back-btn')) { // (수정)
                        return;
                    }
                    e.preventDefault(); handleGameAction(); 
                }
                
                game2Instance.keyHandler = handleInput;
                game2Instance.mouseHandler = handleMouseInput;
                game2Instance.touchHandler = handleTouchInput;

                document.addEventListener('keydown', game2Instance.keyHandler);
                document.addEventListener('mousedown', game2Instance.mouseHandler); 
                document.addEventListener('touchstart', game2Instance.touchHandler, { passive: false }); 
                
                updateGlobalHighScore(); 
                initGame(); 
            }

            
            function resolveGameNickname() {
                try {
                    const parentNickname = window.parent && window.parent !== window && window.parent.LivelySam?.MinigamesHub?.getNickname?.();
                    if (parentNickname) return String(parentNickname).trim();
                } catch {}
                try {
                    const nickname = localStorage.getItem('minigameNickname');
                    if (nickname) return String(nickname).trim();
                } catch {}
                try {
                    const legacyNickname = localStorage.getItem('j_game_username');
                    if (legacyNickname) return String(legacyNickname).trim();
                } catch {}
                return 'Guest';
            }

            // --- (수정) 5. 자동 실행 로직 ---
            // 허브 닉네임 원문을 우선 사용합니다.
            const gameUsername = resolveGameNickname();
            console.log(gameUsername + "님이 Game 2를 시작합니다.");
            
            // launchGame2 함수를 즉시 호출합니다.
            launchGame2(gameUsername);

        }); 
    </script>
</body>
</html>

        /* --- 2. Game 1 (DinoGame_1) 스타일 --- */

<body>

    <div id="game-1-wrapper">
        <h1>DINO RUN Hard</h1>
        <div class="info-panel">
            <div id="score-display-g1">점수: 0</div>
            <div id="highscore-display-g1">최고: 0</div>
        </div>
        <div id="game-container-g1">
            <div id="start-overlay-g1" class="overlay">
                <div>JUMP!</div>
                <p>Spacebar를 눌러 시작(터치, 클릭 가능)</p>
            </div>
            <div id="game-over-overlay-g1" class="overlay">
                <div>게임 오버</div>
                <p id="global-highscore-display-g1"></p>
                <button class="restart-btn">재시작 (Spacebar)</button>
                <button class="back-btn">로비로 돌아가기</button> </div>
            <canvas id="game-canvas-g1" width="600" height="200"></canvas>
        </div>
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            function returnToMinigameHub() {
                try {
                    if (window.parent && window.parent !== window && window.parent.LivelySam?.MinigamesHub?.closeRunner) {
                        window.parent.LivelySam.MinigamesHub.closeRunner();
                        return;
                    }
                } catch {}
                window.location.href = 'index.html';
            }

	    // --- 0. Game 1 URL ---
            const MINIGAME_ID = 'dino-run-hard';
            const IS_PREVIEW_MODE = new URLSearchParams(window.location.search).get('preview') === '1';

            function getLeaderboardBridge() {
                if (IS_PREVIEW_MODE) {
                    return null;
                }
                try {
                    if (window.parent && window.parent !== window && window.parent.LivelySam?.Leaderboard) {
                        return window.parent.LivelySam.Leaderboard;
                    }
                } catch {}
                return window.LivelySam?.Leaderboard || null;
            }
            
            // --- 1. 글로벌 변수 및 공통 요소 ---
            let game1Instance = null; 
            const body = document.body;
            const game1Wrapper = document.getElementById('game-1-wrapper');

            // --- 3. Game 1 (DinoGame_1) 실행 함수 ---
            function launchGame1(username) {
                if (game1Instance) {
                    // 이전 인스턴스 정리 (필요시)
                    if (game1Instance.loop) cancelAnimationFrame(game1Instance.loop);
                    document.removeEventListener('keydown', game1Instance.keyHandler);
                    document.removeEventListener('mousedown', game1Instance.mouseHandler);
                    document.removeEventListener('touchstart', game1Instance.touchHandler);
                }
                game1Instance = {}; 
                const gameUsername = username; 
                
                const canvas = game1Wrapper.querySelector('#game-canvas-g1');
                const ctx = canvas.getContext('2d');
                
                const scoreDisplay = game1Wrapper.querySelector('#score-display-g1');
                const highscoreDisplay = game1Wrapper.querySelector('#highscore-display-g1');
                const startOverlay = game1Wrapper.querySelector('#start-overlay-g1');
                const gameOverOverlay = game1Wrapper.querySelector('#game-over-overlay-g1');
                const globalHighscoreDisplay = game1Wrapper.querySelector('#global-highscore-display-g1');
                
                // (수정) 뒤로가기 버튼 리스너 -> 허브로 복귀
                const backBtnG1 = game1Wrapper.querySelector('.back-btn');
                backBtnG1.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    returnToMinigameHub();
                });

                const dinoIcon = '🦖';
                const cactusIcons = ['🌵', '🌵🌵'];
                const iconSize = 30;
                const groundY = canvas.height - 2; 
                const playerX = 50;
                const jumpForce = 12;
                const gravity = 0.7;
                const initialSpeed = 15;
                const speedIncrease = 0.002;
                const nightModeThreshold = 200;

                let player;
                let obstacles = [];
                let stars = []; 
                let score = 0;
                let localHighScore = 0; 
                let globalHighScoreData = { score: 0, name: 'N/A' }; 
                let gameSpeed = initialSpeed;
                let gameState = 'lobby'; 
                let obstacleSpawnTimer = 0;
                let gameLoop; 
                let isNightMode = false;
                let isSubmitting = false; 

                // --- 클래스 정의 (Player, Obstacle, Star) ---
                class Player {
                    constructor(x, y) {
                        this.x = x; this.y = y; 
                        this.width = iconSize; this.height = iconSize;
                        this.dy = 0; this.isJumping = false;
                    }
                    draw() {
                        ctx.save(); 
                        ctx.translate(this.x + (this.width / 2), this.y); 
                        ctx.scale(-1, 1);
                        ctx.fillStyle = isNightMode ? '#FF6B6B' : '#CC0000';
                        ctx.font = `${iconSize}px Arial`;
                        ctx.textBaseline = 'bottom'; ctx.textAlign = 'center'; 
                        ctx.fillText(dinoIcon, 0, 5); 
                        ctx.restore(); 
                    }
                    update() {
                        this.dy += gravity; this.y += this.dy;
                        if (this.y > groundY) { this.y = groundY; this.dy = 0; this.isJumping = false; }
                    }
                    jump() { if (!this.isJumping) { this.dy = -jumpForce; this.isJumping = true; } }
                }
                class Obstacle {
                    constructor(x, y, icon) {
                        this.x = x; this.y = y; this.icon = icon;
                        this.width = iconSize * (icon.length / 2); this.height = iconSize;
                    }
                    draw() {
                        ctx.fillStyle = isNightMode ? '#FF6B6B' : '#CC0000';
                        ctx.font = `${iconSize}px Arial`;
                        ctx.textBaseline = 'bottom'; ctx.textAlign = 'start';
                        ctx.fillText(this.icon, this.x, this.y+4);
                    }
                    update() { this.x -= gameSpeed; }
                }
                class Star {
                    constructor() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * (canvas.height - 50);
                        this.radius = Math.random() * 1.5;
                        this.opacity = Math.random();
                        this.fadeDirection = (Math.random() > 0.5) ? 'in' : 'out';
                    }
                    draw() {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                        ctx.fill();
                    }
                    update() { 
                        this.x -= (gameSpeed * 0.2);
                        if (this.x < 0) this.x = canvas.width;
                        if (this.fadeDirection === 'in') {
                            this.opacity += 0.005; if (this.opacity > 1) this.fadeDirection = 'out';
                        } else {
                            this.opacity -= 0.005; if (this.opacity < 0) this.fadeDirection = 'in';
                        }
                    }
                }
                // --- 핵심 함수 ---
                async function fetchGlobalHighScore() {
                    const leaderboard = getLeaderboardBridge();
                    if (!leaderboard?.getTopEntry) {
                        return { score: 0, name: 'N/A' };
                    }

                    try {
                        const topEntry = await leaderboard.getTopEntry({ gameId: MINIGAME_ID });
                        if (topEntry) {
                            return {
                                score: topEntry.score || 0,
                                name: topEntry.nickname || 'Unknown'
                            };
                        }
                    } catch (error) {
                        console.error("G1 Hard: 최고 점수 불러오기 실패:", error);
                    }

                    return { score: 0, name: 'N/A' }; 
                }
                async function updateGlobalHighScore() {
                    globalHighScoreData = await fetchGlobalHighScore();
                }
                function initGame() {
      localHighScore = localStorage.getItem('minigameLocalHighScore:dino-run-hard') || 0;
                    highscoreDisplay.textContent = `최고: ${Math.floor(localHighScore)}`;
                    player = new Player(playerX, groundY);
                    obstacles = []; stars = [];
                    score = 0; gameSpeed = initialSpeed;
                    gameState = 'ready'; 
                    obstacleSpawnTimer = 100;
                    isNightMode = false; isSubmitting = false; 
                    for (let i=0; i < 50; i++) stars.push(new Star());
                    applyNightMode(false);
                    startOverlay.style.display = 'flex'; 
                    gameOverOverlay.style.display = 'none';
                    if (!game1Instance.loop) { game1Instance.loop = requestAnimationFrame(animate); }
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    player.draw();
                    scoreDisplay.textContent = `점수: 0`;
                }
                function startGame() {
                    if ((gameState === 'ready' || gameState === 'gameOver') && !isSubmitting) {
                        if (gameState === 'gameOver') initGame(); 
                        gameState = 'playing'; 
                        startOverlay.style.display = 'none';
                        gameOverOverlay.style.display = 'none';
                    }
                }
                function spawnObstacle() {
                    const icon = cactusIcons[Math.floor(Math.random() * cactusIcons.length)];
                    obstacles.push(new Obstacle(canvas.width + 50, groundY, icon));
                    obstacleSpawnTimer = (Math.random() * 100 + 50) * (initialSpeed / gameSpeed);
                }
                function applyNightMode(enable) {
                    isNightMode = enable;
                    if (enable) body.classList.add('night-mode');
                    else body.classList.remove('night-mode');
                }
                function animate() {
                    if (!game1Instance) return; 
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    if (isNightMode) { stars.forEach(star => { star.update(); star.draw(); }); }
                    if (gameState === 'playing') {
                        score += 0.1; gameSpeed += speedIncrease;
                        scoreDisplay.textContent = `점수: ${Math.floor(score)}`;
                        const scoreBlock = Math.floor(score / nightModeThreshold);
                        const shouldBeNight = (scoreBlock % 2 === 1); 
                        if (shouldBeNight && !isNightMode) applyNightMode(true);
                        else if (!shouldBeNight && isNightMode) applyNightMode(false);
                        obstacleSpawnTimer--;
                        if (obstacleSpawnTimer <= 0) spawnObstacle();
                        for (let i = obstacles.length - 1; i >= 0; i--) {
                            let obs = obstacles[i]; obs.update(); obs.draw();
                            if (obs.x + obs.width < 0) obstacles.splice(i, 1);
                        }
                        player.update(); player.draw();
                        checkCollisions();
                    } else { 
                        player.draw();
                        obstacles.forEach(obs => obs.draw());
                    }
                    game1Instance.loop = requestAnimationFrame(animate); 
                }
                function checkCollisions() {
                    for (let obs of obstacles) {
                        const padding = 5; 
                        let playerTop = player.y - player.height;
                        let playerBottom = player.y;
                        let obsTop = obs.y - obs.height;
                        let obsBottom = obs.y;
                        if (player.x < obs.x + obs.width - padding &&
                            player.x + player.width - padding > obs.x &&
                            playerTop < obsBottom && 
                            playerBottom > obsTop)   
                        {
                            triggerGameOver(); break;
                        }
                    }
                }
                function triggerGameOver() {
                    gameState = 'gameOver';
                    gameOverOverlay.style.display = 'flex';
                    const finalScore = Math.floor(score);
                    if (finalScore > localHighScore) {
                        localHighScore = finalScore;
          localStorage.setItem('minigameLocalHighScore:dino-run-hard', localHighScore);
                        highscoreDisplay.textContent = `최고: ${localHighScore}`;
                    }
                    
                    const pElement = gameOverOverlay.querySelector('p#global-highscore-display-g1');
                    pElement.textContent = ''; 

                    if (finalScore >= 200) {
                        isSubmitting = true; 
                        pElement.textContent = '200점 이상! 점수 전송 중...';
                        submitAndFetchScores(finalScore, pElement); 
                    } else {
                        isSubmitting = false; 
                        pElement.textContent = '200점 미만은 기록되지 않습니다.';
                    }
                }
                async function submitScore(finalScore) {
                    const leaderboard = getLeaderboardBridge();
                    if (!leaderboard?.submitScore) {
                        throw new Error('Firebase leaderboard bridge unavailable');
                    }

                    await leaderboard.submitScore({
                        gameId: MINIGAME_ID,
                        nickname: gameUsername,
                        score: finalScore
                    });
                }
                async function fetchAndDisplayGlobalScore(pElement, prefixText = '') {
                    const leaderboard = getLeaderboardBridge();
                    if (!leaderboard?.getTopEntry) {
                        pElement.textContent = prefixText + '명예의 전당 연결을 사용할 수 없습니다.';
                        return;
                    }

                    try {
                        const topEntry = await leaderboard.getTopEntry({ gameId: MINIGAME_ID });
                        if (topEntry) {
                            globalHighScoreData.score = topEntry.score || 0;
                            globalHighScoreData.name = topEntry.nickname || gameUsername;

                            const rawName = topEntry.nickname || gameUsername;
                            const maskedName = leaderboard.maskNickname
                                ? leaderboard.maskNickname(rawName)
                                : (rawName.substring(0, 2) + '*'.repeat(Math.max(0, rawName.length - 2)));

                            pElement.textContent = prefixText + `역대 최고 점수: ${globalHighScoreData.score} (${maskedName})`;
                        } else {
                            pElement.textContent = prefixText + '아직 등록된 기록이 없습니다.';
                        }
                    } catch (error) {
                        console.error("G1 Hard: 최고 점수 불러오기 실패:", error);
                        pElement.textContent = prefixText + '최고 점수 연결 오류';
                    }
                }
                async function submitAndFetchScores(finalScore, pElement) { 
                    let prefixText = '';

                    try {
                        await submitScore(finalScore);
                        prefixText = '점수 등록 완료! ';
                    } catch (error) {
                        console.error("G1 Hard: 점수 전송 중 오류:", error);
                        prefixText = '점수 등록 실패. ';
                    } finally {
                        await fetchAndDisplayGlobalScore(pElement, prefixText);
                        isSubmitting = false;
                    }
                }
                
                // --- 이벤트 리스너 ---
                function handleGameAction() {
                    if (gameState === 'playing') player.jump();
                    else startGame(); 
                }
                function handleInput(e) {
                    if (e.key === ' ' || e.code === 'Space') {
                        e.preventDefault(); handleGameAction(); 
                    }
                }
                function handleMouseInput(e) {
                    if (e.target.closest('.back-btn')) { // (수정)
                        return;
                    }
                    e.preventDefault(); handleGameAction();
                }
                function handleTouchInput(e) {
                    if (e.target.closest('.back-btn')) { // (수정)
                        return;
                    }
                    e.preventDefault(); handleGameAction(); 
                }
                
                game1Instance.keyHandler = handleInput;
                game1Instance.mouseHandler = handleMouseInput;
                game1Instance.touchHandler = handleTouchInput;

                document.addEventListener('keydown', game1Instance.keyHandler);
                document.addEventListener('mousedown', game1Instance.mouseHandler); 
                document.addEventListener('touchstart', game1Instance.touchHandler, { passive: false }); 
                
                updateGlobalHighScore(); 
                initGame(); 
            }
            
            function resolveGameNickname() {
                try {
                    const parentNickname = window.parent && window.parent !== window && window.parent.LivelySam?.MinigamesHub?.getNickname?.();
                    if (parentNickname) return String(parentNickname).trim();
                } catch {}
                try {
                    const nickname = localStorage.getItem('minigameNickname');
                    if (nickname) return String(nickname).trim();
                } catch {}
                try {
                    const legacyNickname = localStorage.getItem('j_game_username');
                    if (legacyNickname) return String(legacyNickname).trim();
                } catch {}
                return 'Guest';
            }

            // --- (수정) 5. 자동 실행 로직 ---
            // 허브 닉네임 원문을 우선 사용합니다.
            const gameUsername = resolveGameNickname();
            console.log(gameUsername + "님이 Game 1을 시작합니다.");

            // launchGame1 함수를 즉시 호출합니다.
            launchGame1(gameUsername);

        }); 
    </script>
</body>
