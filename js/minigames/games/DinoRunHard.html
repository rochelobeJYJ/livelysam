<!DOCTYPE html>
<html lang="ko">
<head>

    <style>
        /* --- 1. 글로벌 스타일 --- */
        html {
            font-size: clamp(12px, calc(10px + 0.5vw), 16px);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
                Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(-90deg, #fff2ff, #fffff2);
            background-size: 400% 400%;
            animation: gradientBG 1s ease infinite;
            color: #555;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            margin: 0;
            touch-action: none; 
            transition: background 0.5s ease;
            overflow: hidden; 
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        body.night-mode {
            background: #000000;
            color: #ccc;
        }
        body.night-mode h1,
        body.night-mode h2 {
            color: #eee;
        }
        @keyframes dazzlingBG {
            0% { background-position: 0% 50%; filter: hue-rotate(0deg) saturate(1.5); }
            25% { background-position: 50% 50%; filter: hue-rotate(90deg) saturate(2); }
            50% { background-position: 100% 50%; filter: hue-rotate(180deg) saturate(1.5); }
            75% { background-position: 50% 50%; filter: hue-rotate(270deg) saturate(2); }
            100% { background-position: 0% 50%; filter: hue-rotate(360deg) saturate(1.5); }
        }
        body.dazzling {
            animation: dazzlingBG 5s ease infinite; 
            background: linear-gradient(-45deg, #e6f7ff, #fff0f0, #f0f8ff, #f0fff0);
            background-size: 400% 400%;
        }
        body.preview-mode #game-1-wrapper > h1,
        body.preview-mode #game-1-wrapper .info-panel,
        body.preview-mode #start-overlay-g1,
        body.preview-mode #game-over-overlay-g1 {
            display: none !important;
        }
        body.preview-mode #game-container-g1 {
            width: min(600px, 100vw);
            max-width: 100vw;
            max-height: none;
        }
        body.preview-mode {
            justify-content: flex-start;
            align-items: center;
            padding: 0;
        }
        body.preview-mode #game-1-wrapper {
            width: 100%;
            transform: translateY(-32px);
        }
        
        h1 { font-size: 2.5rem; color: #cc0000; margin-bottom: 10px; transition: color 0.5s ease; }
        h2 { font-size: 3rem; color: #333; margin: 0 0 10px 0; }
        h3 { font-size: 1.5rem; color: #333; margin: 10px 0; border-bottom: 2px solid #ccc; padding-bottom: 5px;}
        body.night-mode h3 { color: #eee; border-color: #555;}

        /* --- 버튼 공통 스타일 --- */
        .restart-btn, .back-btn {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            border: none;
            padding: 14px 0;

            border-radius: 12px;

            box-shadow: 0 5px 15px rgba(0,0,0,0.15);

        .restart-btn:hover, .back-btn:hover {

        }
        
        .restart-btn {

        .back-btn {

        /* --- 2. Game 1 (DinoGame_1) 스타일 --- */
        #game-1-wrapper { 
            display: flex;
            flex-direction: column; 
            align-items: center; 
        }
        body.is-ready-screen #game-1-wrapper > h1,
        #game-1-wrapper > h1 {
            width: 600px;
            max-width: 90vw;

        body.is-ready-screen #game-1-wrapper .info-panel,
        #game-1-wrapper .info-panel {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            width: 600px;
            max-width: 90vw;
            margin-bottom: 12px;
            font-size: 1rem;
            font-weight: 700;

        body.is-ready-screen #game-1-wrapper .info-panel > div,
        #game-1-wrapper .info-panel > div {
            padding: 10px 14px;
            border-radius: 999px;

        body.is-ready-screen #highscore-display-g1,
        #highscore-display-g1 {

        }
        #score-display-g1 { color: #991b1b; transition: color 0.5s ease; }
        #highscore-display-g1 { color: #b45309; transition: color 0.5s ease; }
        body.night-mode #game-1-wrapper .info-panel > div {
            background: rgba(22, 18, 25, 0.72);
            color: #fecaca;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);

        #game-container-g1 {
            position: relative; width: 600px; height: 200px;
            max-width: 90vw; max-height: 40vh;
        }
        body.is-ready-screen #game-container-g1 {
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
            background:
                radial-gradient(circle at 80% 18%, rgba(255, 170, 120, 0.28) 0 24px, transparent 25px),
                radial-gradient(120px 48px at 16% 100%, rgba(72, 26, 26, 0.92) 98%, transparent 100%),
                radial-gradient(180px 60px at 54% 100%, rgba(98, 33, 33, 0.94) 98%, transparent 100%),
                radial-gradient(140px 52px at 86% 100%, rgba(59, 20, 20, 0.92) 98%, transparent 100%),
                linear-gradient(180deg, #1f0d18 0%, #5d1327 42%, #9a3412 43%, #2f1414 100%);
        }
        #game-canvas-g1 {
            background-color: transparent;
            border-bottom: 3px solid #555;

        body.is-ready-screen #game-canvas-g1 {

        }
        .night-mode #game-canvas-g1 { border-color: #aaa; }
        
        #game-1-wrapper .overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;

        }
        body.is-ready-screen #start-overlay-g1 {

        }
        #game-1-wrapper .ready-card {

        #game-1-wrapper .ready-chip {

        #game-1-wrapper .ready-card strong {

        #game-1-wrapper .ready-controls {

        body.night-mode #game-1-wrapper .overlay { color: #eee; }
        body.night-mode #game-1-wrapper .overlay p { color: #aaa; }
        #start-overlay-g1 { display: none; }
        #game-over-overlay-g1 { display: none; }
        #global-highscore-display-g1 {
            font-size: 1.2rem; color: #007aff;
            margin-top: 10px; font-weight: bold;
        }
        body.night-mode #global-highscore-display-g1 { color: #33aaff; }

        body {
            padding: 24px;
            box-sizing: border-box;
        }

        body * {
            box-sizing: border-box;
        }

        #game-container-g1 {
            height: 252px;
            max-height: 52vh;
        }

        #game-canvas-g1 {
            display: block;
            border-bottom: 3px solid rgba(120, 76, 62, 0.42);

        }

        body.is-ready-screen #game-canvas-g1 {

        }

        body.night-mode #game-canvas-g1 {

        #game-1-wrapper .result-card {
            width: min(350px, calc(100% - 32px));

            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.18);

        #game-1-wrapper .result-card strong {

        #game-1-wrapper .result-score {

        #game-1-wrapper .result-actions {

        @media (max-width: 680px) {

<body>

    <div id="game-1-wrapper">
        <h1>DINO RUN Hard</h1>
        <div class="info-panel">
            <div id="score-display-g1">점수: 0</div>
            <div id="highscore-display-g1">최고: 0</div>
        </div>
        <div id="game-container-g1">
            <div id="start-overlay-g1" class="overlay">
                <div class="ready-card">
                    <span class="ready-chip">HARD MODE</span>
                    <strong>초고속 하드 코스</strong>
                    <p>더 빠른 속도로 몰아치는 하드 모드의 시작 화면을 바로 보여줍니다.</p>
                    <span class="ready-controls">SPACE · CLICK · TOUCH</span>
                </div>
            </div>
            <div id="game-over-overlay-g1" class="overlay">
                <div>게임 오버</div>
                <p id="global-highscore-display-g1"></p>
                <button class="restart-btn">재시작 (Spacebar)</button>
                <button class="back-btn">로비로 돌아가기</button> </div>
            <canvas id="game-canvas-g1" width="600" height="252"></canvas>
        </div>
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            function returnToMinigameHub() {
                try {
                    if (window.parent && window.parent !== window && window.parent.LivelySam?.MinigamesHub?.closeRunner) {
                        window.parent.LivelySam.MinigamesHub.closeRunner();
                        return;
                    }
                } catch {}
                window.location.href = 'index.html';
            }

	    // --- 0. Game 1 URL ---
            const MINIGAME_ID = 'dino-run-hard';
            const IS_PREVIEW_MODE = new URLSearchParams(window.location.search).get('preview') === '1';

            function getLeaderboardBridge() {
                if (IS_PREVIEW_MODE) {
                    return null;
                }
                try {
                    if (window.parent && window.parent !== window && window.parent.LivelySam?.Leaderboard) {
                        return window.parent.LivelySam.Leaderboard;
                    }
                } catch {}
                return window.LivelySam?.Leaderboard || null;
            }
            
            // --- 1. 글로벌 변수 및 공통 요소 ---
            let game1Instance = null; 
            const body = document.body;
            const game1Wrapper = document.getElementById('game-1-wrapper');
            if (IS_PREVIEW_MODE) {
                body.classList.add('preview-mode');
            }

            function cleanupGame1Instance() {
                if (!game1Instance) {
                    return;
                }
                if (game1Instance.loop) {
                    cancelAnimationFrame(game1Instance.loop);
                    game1Instance.loop = 0;
                }
                document.removeEventListener('keydown', game1Instance.keyHandler);
                document.removeEventListener('mousedown', game1Instance.mouseHandler);
                document.removeEventListener('touchstart', game1Instance.touchHandler);
            }

            // --- 3. Game 1 (DinoGame_1) 실행 함수 ---
            function launchGame1(username) {
                cleanupGame1Instance();
                game1Instance = {}; 
                const gameUsername = username; 
                
                const canvas = game1Wrapper.querySelector('#game-canvas-g1');
                const ctx = canvas.getContext('2d');
                
                const scoreDisplay = game1Wrapper.querySelector('#score-display-g1');
                const highscoreDisplay = game1Wrapper.querySelector('#highscore-display-g1');
                const startOverlay = game1Wrapper.querySelector('#start-overlay-g1');
                const gameOverOverlay = game1Wrapper.querySelector('#game-over-overlay-g1');
                startOverlay.innerHTML = `
                    <div class="ready-card">
                        <span class="ready-chip">HARD MODE</span>
                        <strong>\uACE0\uC18D \uD558\uB4DC \uCF54\uC2A4</strong>
                        <p>\uC18D\uB3C4\uC640 \uC7A5\uC560\uBB3C \uBC00\uB3C4\uAC00 \uD55C\uCC38 \uAC15\uD654\uB41C \uD558\uB4DC Dino Run\uC785\uB2C8\uB2E4.</p>
                        <span class="ready-controls">SPACE / CLICK / TOUCH</span>
                    </div>
                `;
                gameOverOverlay.innerHTML = `
                    <div class="result-card">
                        <span class="ready-chip">RUN OVER</span>
                        <strong>\uD558\uB4DC \uD14C\uB9C8\uB97C \uB2E4\uC2DC \uB6AB\uC5B4\uBCF4\uC138\uC694</strong>
                        <div id="final-score-display-g1" class="result-score">\uC774\uBC88 \uC810\uC218: 0</div>
                        <p id="global-highscore-display-g1"></p>
                        <div class="result-actions">
                            <button class="restart-btn" type="button">\uB2E4\uC2DC \uC2DC\uC791</button>
                            <button class="back-btn" type="button">\uBAA9\uB85D \uB3CC\uC544\uAC00\uAE30</button>
                        </div>
                        <div class="result-hint">SPACEBAR \uB85C \uBC14\uB85C \uC7AC\uC2DC\uC791</div>
                    </div>
                `;
                const finalScoreDisplay = game1Wrapper.querySelector('#final-score-display-g1');
                const globalHighscoreDisplay = game1Wrapper.querySelector('#global-highscore-display-g1');
                
                // (수정) 뒤로가기 버튼 리스너 -> 허브로 복귀
                const backBtnG1 = game1Wrapper.querySelector('.back-btn');
                backBtnG1.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    returnToMinigameHub();
                });

                const dinoIcon = '🦖';
                const cactusIcons = ['🌵', '🌵🌵'];
                const iconSize = 30;
                const groundY = canvas.height - 2; 
                const playerX = IS_PREVIEW_MODE ? 92 : 50;
                const jumpForce = 12;
                const gravity = 0.7;
                const initialSpeed = 15;
                const speedIncrease = 0.002;
                const nightModeThreshold = 200;
                const ambientClouds = [
                    { baseX: 118, y: 34, scale: 0.92, alpha: 0.42, depth: 0.08 },
                    { baseX: 322, y: 28, scale: 0.7, alpha: 0.28, depth: 0.06 },
                    { baseX: 542, y: 42, scale: 0.84, alpha: 0.36, depth: 0.1 }
                ];
                const backgroundSpikes = [
                    { baseX: 128, scale: 0.84, depth: 0.16 },
                    { baseX: 362, scale: 1.04, depth: 0.24 },
                    { baseX: 556, scale: 0.78, depth: 0.3 }
                ];

                let player;
                let obstacles = [];
                let stars = []; 
                let score = 0;
                let localHighScore = 0; 
                let globalHighScoreData = { score: 0, name: 'N/A' }; 
                let gameSpeed = initialSpeed;
                let gameState = 'lobby'; 
                let obstacleSpawnTimer = 0;
                let gameLoop; 
                let isNightMode = false;
                let isSubmitting = false; 
                let sceneTick = 0;

                // --- 클래스 정의 (Player, Obstacle, Star) ---
                class Player {
                    constructor(x, y) {
                        this.x = x; this.y = y; 
                        this.width = iconSize; this.height = iconSize;
                        this.dy = 0; this.isJumping = false;
                    }
                    draw() {
                        ctx.save(); 
                        ctx.translate(this.x + (this.width / 2), this.y); 
                        ctx.scale(-1, 1);
                        ctx.fillStyle = isNightMode ? '#FF6B6B' : '#CC0000';
                        ctx.font = `${iconSize}px Arial`;
                        ctx.textBaseline = 'bottom'; ctx.textAlign = 'center'; 
                        ctx.fillText(dinoIcon, 0, 5); 
                        ctx.restore(); 
                    }
                    update() {
                        this.dy += gravity; this.y += this.dy;
                        if (this.y > groundY) { this.y = groundY; this.dy = 0; this.isJumping = false; }
                    }
                    jump() { if (!this.isJumping) { this.dy = -jumpForce; this.isJumping = true; } }
                }
                class Obstacle {
                    constructor(x, y, icon) {
                        this.x = x; this.y = y; this.icon = icon;
                        this.width = iconSize * (icon.length / 2); this.height = iconSize;
                    }
                    draw() {
                        ctx.fillStyle = isNightMode ? '#FF6B6B' : '#CC0000';
                        ctx.font = `${iconSize}px Arial`;
                        ctx.textBaseline = 'bottom'; ctx.textAlign = 'start';
                        ctx.fillText(this.icon, this.x, this.y+4);
                    }
                    update() { this.x -= gameSpeed; }
                }
                class Star {
                    constructor() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * (canvas.height - 50);
                        this.radius = Math.random() * 1.5;
                        this.opacity = Math.random();
                        this.fadeDirection = (Math.random() > 0.5) ? 'in' : 'out';
                    }
                    draw() {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                        ctx.fill();
                    }
                    update() { 
                        this.x -= (gameSpeed * 0.2);
                        if (this.x < 0) this.x = canvas.width;
                        if (this.fadeDirection === 'in') {
                            this.opacity += 0.005; if (this.opacity > 1) this.fadeDirection = 'out';
                        } else {
                            this.opacity -= 0.005; if (this.opacity < 0) this.fadeDirection = 'in';
                        }
                    }
                }
                // --- 핵심 함수 ---
                function drawCloud(x, y, scale, alpha = 0.4) {
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = isNightMode ? 'rgba(241, 245, 249, 0.12)' : 'rgba(255, 224, 214, 0.26)';
                    ctx.beginPath();
                    ctx.arc(x, y, 10 * scale, Math.PI * 0.5, Math.PI * 1.5);
                    ctx.arc(x + 12 * scale, y - 6 * scale, 13 * scale, Math.PI, Math.PI * 1.85);
                    ctx.arc(x + 26 * scale, y, 11 * scale, Math.PI * 1.5, Math.PI * 0.5);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }

                function drawDuneBand(baseY, amplitude, color, speed, alpha = 1) {
                    const offset = sceneTick * speed;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.moveTo(0, canvas.height);
                    for (let x = 0; x <= canvas.width + 24; x += 24) {
                        const y = baseY + Math.sin((x + offset) / 88) * amplitude;
                        ctx.lineTo(x, y);
                    }
                    ctx.lineTo(canvas.width, canvas.height);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }

                function drawRockSpire(x, y, scale, color, alpha = 1) {
                    ctx.save();
                    ctx.translate(x, y);
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.moveTo(-12 * scale, 0);
                    ctx.lineTo(-5 * scale, -26 * scale);
                    ctx.lineTo(0, -18 * scale);
                    ctx.lineTo(7 * scale, -34 * scale);
                    ctx.lineTo(14 * scale, 0);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }

                function drawBackdrop() {
                    const skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                    if (isNightMode) {
                        skyGradient.addColorStop(0, '#120f1c');
                        skyGradient.addColorStop(0.56, '#241b31');
                        skyGradient.addColorStop(1, '#4b3436');
                    } else {
                        skyGradient.addColorStop(0, '#fbf4f1');
                        skyGradient.addColorStop(0.46, '#edd8d1');
                        skyGradient.addColorStop(0.47, '#d7b28b');
                        skyGradient.addColorStop(1, '#b47154');
                    }

                    ctx.fillStyle = skyGradient;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    if (isNightMode) {
                        ctx.save();
                        ctx.fillStyle = 'rgba(248, 250, 252, 0.74)';
                        ctx.beginPath();
                        ctx.arc(canvas.width - 84, 34, 15, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.globalCompositeOperation = 'destination-out';
                        ctx.beginPath();
                        ctx.arc(canvas.width - 77, 30, 14, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    } else {
                        ctx.save();
                        ctx.fillStyle = 'rgba(255, 239, 231, 0.64)';
                        ctx.beginPath();
                        ctx.arc(canvas.width - 84, 38, 18, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();

                        ambientClouds.forEach((cloud) => {
                            const span = canvas.width + 100;
                            const x = ((cloud.baseX - (sceneTick * cloud.depth)) % span + span) % span - 50;
                            drawCloud(x, cloud.y, cloud.scale, cloud.alpha);
                        });
                    }

                    drawDuneBand(canvas.height - 86, 8, isNightMode ? '#593f47' : '#b98362', 0.14, isNightMode ? 0.34 : 0.36);
                    drawDuneBand(canvas.height - 62, 12, isNightMode ? '#402b32' : '#8f5a4c', 0.28, isNightMode ? 0.72 : 0.66);

                    const spireColor = isNightMode ? '#7c6871' : '#7a503f';
                    backgroundSpikes.forEach((spire) => {
                        const span = canvas.width + 90;
                        const x = ((spire.baseX - (sceneTick * spire.depth)) % span + span) % span - 45;
                        drawRockSpire(x, groundY + 1, spire.scale, spireColor, isNightMode ? 0.22 : 0.16);
                    });

                    ctx.save();
                    ctx.strokeStyle = isNightMode ? 'rgba(226, 232, 240, 0.58)' : 'rgba(104, 68, 55, 0.34)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(0, groundY + 0.5);
                    ctx.lineTo(canvas.width, groundY + 0.5);
                    ctx.stroke();
                    ctx.restore();
                }

                async function fetchGlobalHighScore() {
                    const leaderboard = getLeaderboardBridge();
                    if (!leaderboard?.getTopEntry) {
                        return { score: 0, name: 'N/A' };
                    }

                    try {
                        const topEntry = await leaderboard.getTopEntry({ gameId: MINIGAME_ID });
                        if (topEntry) {
                            return {
                                score: topEntry.score || 0,
                                name: topEntry.nickname || 'Unknown'
                            };
                        }
                    } catch (error) {
                        console.error("G1 Hard: 최고 점수 불러오기 실패:", error);
                    }

                    return { score: 0, name: 'N/A' }; 
                }
                async function updateGlobalHighScore() {
                    globalHighScoreData = await fetchGlobalHighScore();
                }
                function setThumbnailShowcaseScene() {
                    obstacles = [
                        new Obstacle(canvas.width - 176, groundY, cactusIcons[1])
                    ];
                    obstacleSpawnTimer = 84;
                }
                function setReadyPreviewScene() {
                    obstacles = [
                        new Obstacle(canvas.width - 232, groundY, cactusIcons[1]),
                        new Obstacle(canvas.width - 134, groundY, cactusIcons[1])
                    ];
                    obstacleSpawnTimer = 102;
                }
                function initGame() {
      localHighScore = localStorage.getItem('minigameLocalHighScore:dino-run-hard') || 0;
                    highscoreDisplay.textContent = `최고: ${Math.floor(localHighScore)}`;
                    player = new Player(playerX, groundY);
                    obstacles = []; stars = [];
                    score = 0; gameSpeed = initialSpeed;
                    gameState = IS_PREVIEW_MODE ? 'preview' : 'ready';
                    obstacleSpawnTimer = 100;
                    isNightMode = false; isSubmitting = false; sceneTick = 0;
                    for (let i=0; i < 50; i++) stars.push(new Star());
                    applyNightMode(false);
                    if (IS_PREVIEW_MODE) {
                        setThumbnailShowcaseScene();
                        body.classList.remove('is-ready-screen');
                        startOverlay.style.display = 'none';
                    } else {
                        setReadyPreviewScene();
                        body.classList.add('is-ready-screen');
                        startOverlay.style.display = 'flex';
                    }
                    gameOverOverlay.style.display = 'none';
                    if (!game1Instance.loop) { game1Instance.loop = requestAnimationFrame(animate); }
                    drawBackdrop();
                    obstacles.forEach(obs => obs.draw());
                    player.draw();
                    scoreDisplay.textContent = `점수: 0`;
                }
                function startGame() {
                    if ((gameState === 'ready' || gameState === 'gameOver') && !isSubmitting) {
                        if (gameState === 'gameOver') initGame(); 
                        body.classList.remove('is-ready-screen');
                        obstacles = [];
                        gameState = 'playing'; 
                        startOverlay.style.display = 'none';
                        gameOverOverlay.style.display = 'none';
                    }
                }
                function spawnObstacle() {
                    const icon = cactusIcons[Math.floor(Math.random() * cactusIcons.length)];
                    obstacles.push(new Obstacle(canvas.width + 50, groundY, icon));
                    obstacleSpawnTimer = (Math.random() * 100 + 50) * (initialSpeed / gameSpeed);
                }
                function applyNightMode(enable) {
                    isNightMode = enable;
                    if (enable) body.classList.add('night-mode');
                    else body.classList.remove('night-mode');
                }
                function updateObstacleField() {
                    obstacleSpawnTimer--;
                    if (obstacleSpawnTimer <= 0) spawnObstacle();
                    for (let i = obstacles.length - 1; i >= 0; i--) {
                        let obs = obstacles[i]; obs.update(); obs.draw();
                        if (obs.x + obs.width < 0) obstacles.splice(i, 1);
                    }
                }
                function runPreviewAutoplay() {
                    const nextObstacle = obstacles.find((obstacle) => obstacle.x + obstacle.width >= player.x + 8);
                    if (!player.isJumping && nextObstacle) {
                        const distance = nextObstacle.x - player.x;
                        if (distance <= 90 && distance >= 42) {
                            player.jump();
                        }
                    }
                }
                function animate() {
                    if (!game1Instance) return; 
                    sceneTick += (gameState === 'playing' || gameState === 'preview') ? gameSpeed * 0.48 : 0.32;
                    drawBackdrop();
                    if (isNightMode) { stars.forEach(star => { star.update(); star.draw(); }); }
                    if (gameState === 'playing') {
                        score += 0.1; gameSpeed += speedIncrease;
                        scoreDisplay.textContent = `점수: ${Math.floor(score)}`;
                        const scoreBlock = Math.floor(score / nightModeThreshold);
                        const shouldBeNight = (scoreBlock % 2 === 1); 
                        if (shouldBeNight && !isNightMode) applyNightMode(true);
                        else if (!shouldBeNight && isNightMode) applyNightMode(false);
                        updateObstacleField();
                        player.update(); player.draw();
                        checkCollisions();
                    } else if (gameState === 'preview') {
                        runPreviewAutoplay();
                        updateObstacleField();
                        player.update();
                        player.draw();
                    } else { 
                        player.draw();
                        obstacles.forEach(obs => obs.draw());
                    }
                    game1Instance.loop = requestAnimationFrame(animate); 
                }
                function checkCollisions() {
                    for (let obs of obstacles) {
                        const padding = 5; 
                        let playerTop = player.y - player.height;
                        let playerBottom = player.y;
                        let obsTop = obs.y - obs.height;
                        let obsBottom = obs.y;
                        if (player.x < obs.x + obs.width - padding &&
                            player.x + player.width - padding > obs.x &&
                            playerTop < obsBottom && 
                            playerBottom > obsTop)   
                        {
                            triggerGameOver(); break;
                        }
                    }
                }
                function triggerGameOver() {
                    gameState = 'gameOver';
                    gameOverOverlay.style.display = 'flex';
                    const finalScore = Math.floor(score);
                    finalScoreDisplay.textContent = `\uC774\uBC88 \uC810\uC218: ${finalScore}`;
                    if (finalScore > localHighScore) {
                        localHighScore = finalScore;
          localStorage.setItem('minigameLocalHighScore:dino-run-hard', localHighScore);
                        highscoreDisplay.textContent = `최고: ${localHighScore}`;
                    }
                    
                    const pElement = gameOverOverlay.querySelector('p#global-highscore-display-g1');
                    pElement.textContent = ''; 

                    if (finalScore >= 200) {
                        isSubmitting = true; 
                        pElement.textContent = '200점 이상! 점수 전송 중...';
                        pElement.textContent = '\uAE30\uB85D\uC744 \uC800\uC7A5\uD558\uB294 \uC911\uC785\uB2C8\uB2E4.';
                        submitAndFetchScores(finalScore, pElement); 
                    } else {
                        isSubmitting = false; 
                        pElement.textContent = '\u0032\u0030\u0030\uC810 \uBBF8\uB9CC \uAE30\uB85D\uC740 \uC800\uC7A5\uB418\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.';
                        pElement.textContent = '200점 미만은 기록되지 않습니다.';
                    }
                    if (finalScore < 200) {
                        pElement.textContent = '\u0032\u0030\u0030\uC810 \uBBF8\uB9CC \uAE30\uB85D\uC740 \uC800\uC7A5\uB418\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.';
                    }
                }
                async function submitScore(finalScore) {
                    const leaderboard = getLeaderboardBridge();
                    if (!leaderboard?.submitScore) {
                        throw new Error('Firebase leaderboard bridge unavailable');
                    }

                    await leaderboard.submitScore({
                        gameId: MINIGAME_ID,
                        nickname: gameUsername,
                        score: finalScore
                    });
                }
                async function fetchAndDisplayGlobalScore(pElement, prefixText = '') {
                    const leaderboard = getLeaderboardBridge();
                    if (!leaderboard?.getTopEntry) {
                        pElement.textContent = prefixText + '명예의 전당 연결을 사용할 수 없습니다.';
                        return;
                    }

                    try {
                        const topEntry = await leaderboard.getTopEntry({ gameId: MINIGAME_ID });
                        if (topEntry) {
                            globalHighScoreData.score = topEntry.score || 0;
                            globalHighScoreData.name = topEntry.nickname || gameUsername;

                            const rawName = topEntry.nickname || gameUsername;
                            const maskedName = leaderboard.maskNickname
                                ? leaderboard.maskNickname(rawName)
                                : (rawName.substring(0, 2) + '*'.repeat(Math.max(0, rawName.length - 2)));

                            pElement.textContent = prefixText + `역대 최고 점수: ${globalHighScoreData.score} (${maskedName})`;
                        } else {
                            pElement.textContent = prefixText + '아직 등록된 기록이 없습니다.';
                        }
                    } catch (error) {
                        console.error("G1 Hard: 최고 점수 불러오기 실패:", error);
                        pElement.textContent = prefixText + '최고 점수 연결 오류';
                    }
                }
                async function submitAndFetchScores(finalScore, pElement) { 
                    let prefixText = '';

                    try {
                        await submitScore(finalScore);
                        prefixText = '점수 등록 완료! ';
                    } catch (error) {
                        console.error("G1 Hard: 점수 전송 중 오류:", error);
                        prefixText = '점수 등록 실패. ';
                    } finally {
                        if (!prefixText.includes('\uC2E4\uD328')) {
                            prefixText = '\uAE30\uB85D \uC800\uC7A5 \uC644\uB8CC. ';
                        } else {
                            prefixText = '\uAE30\uB85D \uC800\uC7A5 \uC2E4\uD328. ';
                        }
                        await fetchAndDisplayGlobalScore(pElement, prefixText);
                        isSubmitting = false;
                    }
                }
                
                // --- 이벤트 리스너 ---
                function handleGameAction() {
                    if (gameState === 'playing') player.jump();
                    else startGame(); 
                }
                function handleInput(e) {
                    if (e.key === ' ' || e.code === 'Space') {
                        e.preventDefault(); handleGameAction(); 
                    }
                }
                function handleMouseInput(e) {
                    if (e.target.closest('.back-btn')) { // (수정)
                        return;
                    }
                    e.preventDefault(); handleGameAction();
                }
                function handleTouchInput(e) {
                    if (e.target.closest('.back-btn')) { // (수정)
                        return;
                    }
                    e.preventDefault(); handleGameAction(); 
                }
                
                game1Instance.keyHandler = handleInput;
                game1Instance.mouseHandler = handleMouseInput;
                game1Instance.touchHandler = handleTouchInput;

                document.addEventListener('keydown', game1Instance.keyHandler);
                document.addEventListener('mousedown', game1Instance.mouseHandler); 
                document.addEventListener('touchstart', game1Instance.touchHandler, { passive: false }); 
                
                updateGlobalHighScore(); 
                initGame(); 
            }

            window.addEventListener('beforeunload', cleanupGame1Instance);
            
            function resolveGameNickname() {
                try {
                    const parentNickname = window.parent && window.parent !== window && window.parent.LivelySam?.MinigamesHub?.getNickname?.();
                    if (parentNickname) return String(parentNickname).trim();
                } catch {}
                try {
                    const nickname = localStorage.getItem('minigameNickname');
                    if (nickname) return String(nickname).trim();
                } catch {}
                try {
                    const legacyNickname = localStorage.getItem('j_game_username');
                    if (legacyNickname) return String(legacyNickname).trim();
                } catch {}
                return 'Guest';
            }

            // --- (수정) 5. 자동 실행 로직 ---
            // 허브 닉네임 원문을 우선 사용합니다.
            const gameUsername = resolveGameNickname();
            console.log(gameUsername + "님이 Game 1을 시작합니다.");

            // launchGame1 함수를 즉시 호출합니다.
            launchGame1(gameUsername);

        }); 
    </script>
</body>
</html>
