name: Release Prep

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-prep.yml"
      - "version.json"
      - "index.html"
      - "LivelyInfo.json"
      - "LivelyProperties.json"
      - "js/**"
      - "tools/**"
      - "release/**"

permissions:
  contents: write

jobs:
  audit:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtual environment
        shell: powershell
        run: |
          python -m venv venv
          .\venv\Scripts\python.exe -m pip install --upgrade pip pyinstaller

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Sync release metadata
        shell: powershell
        run: .\tools\sync_release_metadata.ps1 -Root .

      - name: Build launcher executables
        shell: powershell
        run: .\tools\build_livelysam_launcher_exe.ps1 -Root .

      - name: Build installer
        shell: powershell
        run: .\tools\build_installer.ps1 -Root .

      - name: Publish local update manifests
        shell: powershell
        run: |
          $versionInfo = Get-Content -LiteralPath .\version.json -Raw -Encoding UTF8 | ConvertFrom-Json
          $installerPath = Join-Path (Resolve-Path '.').Path ("dist\installer\" + $versionInfo.installerBaseName + "-" + $versionInfo.version + ".exe")
          $publishedAt = [DateTime]::UtcNow.ToString('o')

          .\tools\publish_release_manifest.ps1 `
            -Root . `
            -Channel stable `
            -InstallerPath $installerPath `
            -ReleaseTag $versionInfo.releaseTag `
            -PublishedAt $publishedAt | Out-Null

          .\tools\publish_release_manifest.ps1 `
            -Root . `
            -Channel beta `
            -InstallerPath $installerPath `
            -ReleaseTag $versionInfo.releaseTag `
            -PublishedAt $publishedAt | Out-Null

      - name: Run release audit
        shell: powershell
        run: .\tools\run_release_audit.ps1

      - name: Upload release-prep artifacts
        uses: actions/upload-artifact@v4
        with:
          name: livelysam-release-prep
          path: |
            dist/launcher/*.exe
            dist/installer/*.exe
            release/installer/*.iss
            release/installer/*.inc
            release/updates/*.json

      - name: Resolve release metadata
        if: ${{ github.event_name == 'push' && startsWith(github.event.head_commit.message, 'Release ') }}
        id: release_meta
        shell: powershell
        run: |
          $versionInfo = Get-Content -LiteralPath .\version.json -Raw -Encoding UTF8 | ConvertFrom-Json
          $releaseTag = [string]$versionInfo.releaseTag
          if ([string]::IsNullOrWhiteSpace($releaseTag)) {
            $releaseTag = "v$($versionInfo.version)"
          }
          $channel = if ($releaseTag -match '-(alpha|beta|rc)') { 'beta' } else { 'stable' }
          $isPrerelease = if ($channel -eq 'beta') { 'true' } else { 'false' }
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "channel=$channel" >> $env:GITHUB_OUTPUT
          "is_prerelease=$isPrerelease" >> $env:GITHUB_OUTPUT

      - name: Create or update GitHub Release
        if: ${{ steps.release_meta.outputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: powershell
        run: |
          $tag = "${{ steps.release_meta.outputs.release_tag }}"
          $title = "LivelySam $tag"
          $releaseExists = $true
          gh release view $tag --repo $env:GITHUB_REPOSITORY | Out-Null
          if ($LASTEXITCODE -ne 0) {
            $releaseExists = $false
          }
          if (-not $releaseExists) {
            $args = @("release", "create", $tag, "--repo", $env:GITHUB_REPOSITORY, "--title", $title, "--generate-notes")
            if ("${{ steps.release_meta.outputs.is_prerelease }}" -eq "true") {
              $args += "--prerelease"
            }
            & gh @args
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create GitHub release for $tag."
            }
          }

      - name: Upload release assets
        if: ${{ steps.release_meta.outputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: powershell
        run: |
          $versionInfo = Get-Content -LiteralPath .\version.json -Raw -Encoding UTF8 | ConvertFrom-Json
          $installerPath = Join-Path (Resolve-Path '.').Path ("dist\installer\" + $versionInfo.installerBaseName + "-" + $versionInfo.version + ".exe")
          $manifestPath = Join-Path (Resolve-Path '.').Path ("release\updates\latest-" + "${{ steps.release_meta.outputs.channel }}" + ".json")
          gh release upload "${{ steps.release_meta.outputs.release_tag }}" $installerPath $manifestPath --repo $env:GITHUB_REPOSITORY --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to upload release assets."
          }
